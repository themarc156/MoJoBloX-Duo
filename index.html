});

    // --- 2. SAVE DATA (GEFILTERT) ---

window.saveData = async () => {
    if (currentUser === 'diff') return;
    const container = document.getElementById('blocklist-container');
    if (!container) return;

    // 1. Wir erstellen ein schnelles Nachschlagewerk (Map), 
    // um die vollen Objektdaten anhand der ID zu finden.
    const allItems = [...(dataDJ1 || []), ...(dataDJ2 || [])];
    const itemMap = new Map(allItems.map(i => [i.id, i]));

    // 2. Wir schauen uns das DOM an (den aktuellen, sortierten Zustand)
    const elements = container.querySelectorAll('.block-item');
    const myFilteredList = [];

    // 3. Wir gehen nur durch die Elemente, die DIR gehören
    elements.forEach(el => {
        const owner = el.getAttribute('data-owner');
        const id = el.getAttribute('data-id');

        // Wir nehmen nur die Items, die DU erstellt hast
        if (owner === currentUser) {
            const originalItem = itemMap.get(id);
            if (originalItem) {
                myFilteredList.push(originalItem);
            }
        }
    });

    // 4. In Firebase speichern
    const docName = currentUser === 'dj1' ? "set1_dj1" : "set1_dj2";
    
    try {
        await setDoc(doc(db, "mojoblox", docName), {
            blocklist: myFilteredList,
            timestamp: Date.now()
        });
        console.log(`Daten für ${currentUser} wurden in der neuen Reihenfolge gespeichert.`);
    } catch (e) {
        console.error("Fehler beim Speichern:", e);
    }
};

    // --- 3. BUILD DATA (MIT OWNER-ERKENNUNG) ---

    window.buildCurrentData = () => {
        const container = document.getElementById('blocklist-container');
        const data = { blocklist: [], timestamp: Date.now() };
        
        container.childNodes.forEach(node => {
            if(node.nodeType !== 1) return;
            
            if(node.classList.contains('block-item')) {
                // Wer ist der Besitzer laut CSS Klasse?
                let owner = node.classList.contains('owner-gunnar') ? 'dj2' : 'dj1';

                const list = node.querySelector('.block-sortable-list');
                const songObjects = Array.from(list.querySelectorAll('.song-card')).map(card => {
                    const details = card.querySelector('.song-details');
                    const isOff = card.querySelector('.crossfade-toggle-btn').classList.contains('disabled');
                    const cfTime = isOff ? 0 : (parseInt(card.querySelector('.crossfade-time-display').innerText) || 5);
                    return { 
                        title: details.querySelector('.song-title-text').innerText, 
                        artist: details.querySelector('.song-artist-text')?.innerText || '',
                        cf: cfTime
                    };
                });

                const titleEl = node.querySelector('strong');
                let rawTitle = titleEl.innerText;
                const countSpan = titleEl.querySelector('.block-song-count');
                if (countSpan) rawTitle = rawTitle.replace(countSpan.innerText, '').trim();

                data.blocklist.push({ 
                    type: 'block', 
                    id: node.id, 
                    t: rawTitle, 
                    s: songObjects, 
                    cIdx: node.dataset.colorIndex || 0,
                    createdBy: owner 
                });

            } else if(node.classList.contains('song-card')) {
                const details = node.querySelector('.song-details');
                const isOff = node.querySelector('.crossfade-toggle-btn').classList.contains('disabled');
                const cfTime = isOff ? 0 : (parseInt(node.querySelector('.crossfade-time-display').innerText) || 5);
                data.blocklist.push({ 
                    type: 'single', 
                    title: details.querySelector('.song-title-text').innerText,
                    artist: details.querySelector('.song-artist-text')?.innerText || '',
                    cf: cfTime
                });
            }
        });
        return data;
    };

    // --- 4. TEMPLATES & VORLAGEN ---

    window.saveCurrentAsTemplate = async () => {
        const templateName = prompt("Name für dieses Set:");
        if (!templateName?.trim()) return;

        const data = window.buildCurrentData();
        data.templateName = templateName.trim();
        data.owner = currentUser; 

        try {
            await setDoc(doc(db, "mojoblox_templates", `${currentUser}_${Date.now()}`), data);
            alert("Vorlage gespeichert!");
        } catch (e) { console.error(e); }
    };

    window.loadSavedTemplatesList = async () => {
        const container = document.getElementById('saved-lists-container');
        if (!container) return;
        container.innerHTML = 'Lade...';
        
        try {
            const q = query(collection(db, "mojoblox_templates"), where("owner", "==", currentUser));
            const querySnapshot = await getDocs(q);
            container.innerHTML = '';

            if (querySnapshot.empty) {
                container.innerHTML = '<div class="dropdown-item">Keine Vorlagen</div>';
                return;
            }

            querySnapshot.forEach((docSnap) => {
                const td = docSnap.data();
                const div = document.createElement('div');
                div.className = 'dropdown-item';
                div.innerHTML = `
                    <span onclick="window.loadTemplateToCurrent('${docSnap.id}')">📂 ${td.templateName}</span>
                    <span class="delete-saved" onclick="window.deleteTemplate(event, '${docSnap.id}')">✕</span>
                `;
                container.appendChild(div);
            });
        } catch (e) { console.error(e); }
    };

    window.loadTemplateToCurrent = async (docId) => {
        if (!confirm("Aktuelles Live-Set mit dieser Vorlage überschreiben?")) return;
        try {
            const docSnap = await getDoc(doc(db, "mojoblox_templates", docId));
            if (docSnap.exists()) {
                const targetDoc = currentUser === 'dj1' ? "set1_dj1" : "set1_dj2";
                await setDoc(doc(db, "mojoblox", targetDoc), {
                    blocklist: docSnap.data().blocklist,
                    timestamp: Date.now()
                });
                alert("Vorlage geladen!");
            }
        } catch (e) { console.error(e); }
    };


    window.deleteTemplate = async (event, docId, name) => {
        event.stopPropagation(); 
        if (!confirm(`Möchtest du das gespeicherte Set "${name}" wirklich löschen?`)) return;
        
        try {
            await deleteDoc(doc(db, "mojoblox_templates", docId));
            window.loadSavedTemplatesList(); 
        } catch (e) { console.error(e); }
    }

    function extractAllSongsWithMetadata(blocklist) {
        let songs = [];
        if (!blocklist) return songs;
        blocklist.forEach(item => {
            if (item.type === 'block' && item.s) {
                item.s.forEach(song => {
                    const sTitle = (typeof song === 'string') ? song : (song.title || '');
                    const sArtist = (typeof song === 'object' && song.artist) ? song.artist : '';
                    songs.push({ title: sTitle, artist: sArtist, parentType: 'block' });
                });
            }
            if (item.type === 'single' && item.title) {
                songs.push({ title: item.title, artist: item.artist || '', parentType: 'single' });
            }
        });
        return songs;
    }

    function extractAllSongs(blocklist) { return extractAllSongsWithMetadata(blocklist).map(s => s.title); }

    window.generatePDFExport = () => {
        const pdfContainer = document.getElementById('pdf-template');
        pdfContainer.innerHTML = ''; 

        const buildSongListHTML = (list) => {
            if (!list || list.length === 0) return '<p><i>Keine Songs</i></p>';
            let blockHtml = ''; let singleHtml = '';
            let hasBlocks = false; let hasSingles = false;

            list.forEach((item) => {
                if (item.type === 'single') {
                    hasSingles = true;
                    singleHtml += `<div class="pdf-song-item">${item.title}${item.artist ? ` <span style="font-size:10px; color:#666;">(${item.artist})</span>` : ''}</div>`;
                } else if (item.type === 'block') {
                    hasBlocks = true;
                    let html = `<div class="pdf-keep-together">`;
                    html += `<div class="pdf-block-title">${item.t}</div>`;
                    if (item.s && item.s.length > 0) {
                        item.s.forEach(s => {
                            const sTitle = (typeof s === 'string') ? s : (s.title || '');
                            const sArtist = (typeof s === 'object' && s.artist) ? s.artist : '';
                            html += `<div class="pdf-song-item" style="padding-left:10px;">- ${sTitle}${sArtist ? ` <span style="font-size:10px; color:#666;">(${sArtist})</span>` : ''}</div>`;
                        });
                    } else html += `<div class="pdf-song-item" style="padding-left:10px; opacity:0.5;"><i>(Leerer Block)</i></div>`;
                    html += `</div>`;
                    blockHtml += html;
                }
            });

            let finalHtml = '';
            if (hasBlocks) finalHtml += `<h2>Songs in Blöcken</h2><div class="pdf-auto-columns">${blockHtml}</div>`;
            if (hasSingles) finalHtml += `<h2>Lose Songs</h2><div class="pdf-auto-columns">${singleHtml}</div>`;
            return finalHtml || '<p><i>Keine Songs</i></p>';
        };

        const buildDiffColumnContent = (onlyList) => {
            if (onlyList.length === 0) return '<p><i>Keine</i></p>';
            let blockSongs = onlyList.filter(s => s.parentType === 'block');
            let singleSongs = onlyList.filter(s => s.parentType === 'single');
            let html = '';
            const getDisplayString = (s) => s.artist ? `${s.title} <span style="font-size:10px; color:#666;">(${s.artist})</span>` : s.title;
            
            if (blockSongs.length > 0) { html += `<h3>In Blöcken:</h3>`; blockSongs.forEach(s => html += `<div class="pdf-song-item">${getDisplayString(s)}</div>`); }
            if (singleSongs.length > 0) { html += `<h3>Lose Songs:</h3>`; singleSongs.forEach(s => html += `<div class="pdf-song-item">${getDisplayString(s)}</div>`); }
            return html;
        };

        let page1 = document.createElement('div'); page1.className = 'pdf-page';
        page1.innerHTML = `<h1>Setliste - Marc</h1>` + buildSongListHTML(dataDJ1.blocklist);
        pdfContainer.appendChild(page1);

        let page2 = document.createElement('div'); page2.className = 'pdf-page';
        page2.innerHTML = `<h1>Setliste - Gunnar</h1>` + buildSongListHTML(dataDJ2.blocklist);
        pdfContainer.appendChild(page2);

        const songsWithMetaDJ1 = extractAllSongsWithMetadata(dataDJ1.blocklist);
        const songsWithMetaDJ2 = extractAllSongsWithMetadata(dataDJ2.blocklist);
        const onlyDJ1 = songsWithMetaDJ1.filter(s => !songsWithMetaDJ2.some(s2 => s2.title.toLowerCase().trim() === s.title.toLowerCase().trim()));
        const onlyDJ2 = songsWithMetaDJ2.filter(s => !songsWithMetaDJ1.some(s1 => s1.title.toLowerCase().trim() === s.title.toLowerCase().trim()));

        let page3 = document.createElement('div'); page3.className = 'pdf-page';
        page3.innerHTML = `<h1>Differenzen</h1>`;
        page3.innerHTML += `
            <div class="pdf-columns-container">
                <div><h2>Nur bei Marc:</h2>${buildDiffColumnContent(onlyDJ1)}</div>
                <div><h2>Nur bei Gunnar:</h2>${buildDiffColumnContent(onlyDJ2)}</div>
            </div>`;
        pdfContainer.appendChild(page3);

        const opt = { margin: 10, filename: 'MoJoBloX_Duo_Setlisten.pdf', image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2, useCORS: true }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } };
        pdfContainer.style.display = 'block';
        setTimeout(() => { html2pdf().set(opt).from(pdfContainer).save().then(() => { pdfContainer.style.display = 'none'; }).catch(err => { console.error(err); pdfContainer.style.display = 'none'; }); }, 500);
    };

    window.executeQuickAdd = async (songTitle, songArtist, originalOwner) => {
        const targetUser = (originalOwner === 'dj1') ? 'dj2' : 'dj1';
        const docName = targetUser === 'dj1' ? "set1_dj1" : "set1_dj2";
        try {
            const docRef = doc(db, "mojoblox", docName);
            const docSnap = await getDoc(docRef);
            let targetData = docSnap.exists() ? docSnap.data() : { blocklist: [] };
            if (extractAllSongs(targetData.blocklist).some(s => s.toLowerCase().trim() === songTitle.toLowerCase().trim())) { alert("Dieser Song existiert bereits in der Zielliste!"); return; }
            targetData.blocklist.push({ type: 'single', title: songTitle, artist: songArtist || '', cf: DEFAULT_CROSSFADE });
            targetData.timestamp = Date.now();
            await setDoc(docRef, targetData);
        } catch (error) { console.error(error); }
    };

    window.renderCurrentState = () => {
        const bContainer = document.getElementById('blocklist-container');
        const songsWithMetaDJ1 = extractAllSongsWithMetadata(dataDJ1.blocklist);
        const songsWithMetaDJ2 = extractAllSongsWithMetadata(dataDJ2.blocklist);
        const songsDJ1 = songsWithMetaDJ1.map(s => s.title);
        const songsDJ2 = songsWithMetaDJ2.map(s => s.title);
        const safeTracks = songsDJ1.filter(s => songsDJ2.some(s2 => s2.toLowerCase().trim() === s.toLowerCase().trim()));
        const onlyDJ1 = songsWithMetaDJ1.filter(s => !songsDJ2.some(s2 => s2.toLowerCase().trim() === s.title.toLowerCase().trim()));
        const onlyDJ2 = songsWithMetaDJ2.filter(s => !songsDJ1.some(s1 => s1.toLowerCase().trim() === s.title.toLowerCase().trim()));
        
        document.getElementById('cnt-dj1').innerText = `${songsDJ1.length} Songs`;
        document.getElementById('cnt-dj2').innerText = `${songsDJ2.length} Songs`;
        document.getElementById('cnt-diff').innerText = `${onlyDJ1.length + onlyDJ2.length} Diff.`;

        if (currentUser === 'diff') {
            bContainer.innerHTML = '';
            if (onlyDJ1.length === 0 && onlyDJ2.length === 0) { bContainer.innerHTML = '<p style="text-align:center; opacity:0.5;">Keine Differenzen. Ihr habt exakt die gleichen Songs!</p>'; return; }

            const renderDiffCard = (songObj, owner) => {
                const icon = songObj.parentType === 'block' ? '📁' : '🎵';
                if (currentDiffFilter === 'blocks' && songObj.parentType !== 'block') return '';
                if (currentDiffFilter === 'singles' && songObj.parentType !== 'single') return '';
                return `<div class="song-card" style="border-left: 3px solid ${owner === 'dj1' ? 'var(--accent-color)' : 'var(--dj2-color)'};">
                            <div class="song-details"><span class="song-title-text">${songObj.title}</span>${songObj.artist ? `<span class="song-artist-text">${songObj.artist}</span>` : ''}</div>
                            <div style="display:flex; align-items:center; gap:10px; margin-left:auto;"><span class="song-type-icon">${icon}</span>${!userStates['diff'].isLocked ? `<button class="diff-takeover-btn" onclick="window.executeQuickAdd('${songObj.title.replace(/'/g, "\\'")}', '${songObj.artist ? songObj.artist.replace(/'/g, "\\'") : ''}', '${owner}')">+</button>` : ''}</div>
                        </div>`;
            };

            let htmlDJ1 = ''; onlyDJ1.forEach(s => htmlDJ1 += renderDiffCard(s, 'dj1'));
            if (htmlDJ1 !== '') {
                const isCollapsed = diffCollapsedState['onlyMarc'];
                bContainer.innerHTML += `<div class="diff-section-header" onclick="window.toggleDiffSection('onlyMarc', this)"><span class="collapse-icon" style="transform: ${isCollapsed ? 'rotate(-90deg)' : 'rotate(0deg)'}">▼</span><span>Nur bei Marc:</span></div><div id="onlyMarc" class="diff-section-content ${isCollapsed ? 'collapsed' : ''}">${htmlDJ1}</div>`;
            }

            let htmlDJ2 = ''; onlyDJ2.forEach(s => htmlDJ2 += renderDiffCard(s, 'dj2'));
            if (htmlDJ2 !== '') {
                const isCollapsed = diffCollapsedState['onlyGunnar'];
                bContainer.innerHTML += `<div class="diff-section-header" onclick="window.toggleDiffSection('onlyGunnar', this)"><span class="collapse-icon" style="transform: ${isCollapsed ? 'rotate(-90deg)' : 'rotate(0deg)'}">▼</span><span>Nur bei Gunnar:</span></div><div id="onlyGunnar" class="diff-section-content ${isCollapsed ? 'collapsed' : ''}">${htmlDJ2}</div>`;
            }
            return;
        }

        const activeData = currentUser === 'dj1' ? dataDJ1 : dataDJ2;
        if (!activeData || !activeData.blocklist || activeData.blocklist.length === 0) { bContainer.innerHTML = '<p style="text-align:center; opacity:0.5;">Noch keine Einträge.</p>'; return; }

        bContainer.innerHTML = ''; 

// Ein Set, um Dubletten während des Ladevorgangs zu verhindern
const renderedIds = new Set();

activeData.blocklist.forEach((item) => {
    if (item.type === 'block') {
        // ID sicherstellen
        if (!item.id) item.id = 'blf-' + Math.random().toString(36).substr(2, 9);
        
        // PRÜFUNG: Wenn diese ID schon geladen wurde, überspringen wir diesen Eintrag
        if (renderedIds.has(item.id)) return;
        renderedIds.add(item.id);
        
        // Block zeichnen (mit Übergabe des Erstellers für die richtige Spalte)
        window.addBlockToBlocklistUI(item.t, item.s, item.cIdx || 0, item.id, item.createdBy);
        
    } else if (item.type === 'single') {
        // Bei Einzelsongs nutzen wir Titel+Interpret als eindeutigen Schlüssel
        const songKey = `single-${item.title}-${item.artist || ''}`;
        if (renderedIds.has(songKey)) return;
        renderedIds.add(songKey);

        const songCard = document.createElement('div'); 
        songCard.className = 'song-card';
        
        const cfTime = item.cf !== undefined ? item.cf : DEFAULT_CROSSFADE;
        const disabledClass = cfTime === 0 ? 'disabled' : '';
        
        songCard.innerHTML = `
            <div class="song-details" onclick="window.editSongPrompt(this)">
                <span class="song-title-text">${item.title}</span>
                ${item.artist ? `<span class="song-artist-text">${item.artist}</span>` : ''}
            </div>
            <div class="crossfade-btn-group">
                <span class="crossfade-toggle-btn ${disabledClass}">🔀</span>
                <span class="crossfade-time-display">${cfTime}s</span>
            </div>
            <span class="play-preview-btn">▶️</span>
            <span class="delete-btn" onclick="window.deleteSongCard(this)">×</span>
        `;
        
        const playBtn = songCard.querySelector('.play-preview-btn');
        playBtn.addEventListener('click', (e) => window.playPreview(e, item.title, item.artist || ''));
        
        window.setupCrossfadeEvents(songCard);
        bContainer.appendChild(songCard);
    }
});

        document.querySelectorAll('.song-title-text').forEach(el => {
            const title = el.innerText.trim().toLowerCase();
            const card = el.closest('.song-card');
            
            if (safeTracks.some(st => st.toLowerCase().trim() === title)) {
                 card.classList.add('match-found');
                if (!card.querySelector('.safe-tag')) { 
                    const tag = document.createElement('span'); 
                    tag.className = 'safe-tag'; 
                    tag.innerText = '★'; 
                    el.after(tag); 
                }
            }

            if (activePlayBtn) {
                const activeCard = activePlayBtn.closest('.song-card');
                if (activeCard) {
                    const activeTitle = activeCard.querySelector('.song-title-text').innerText;
                    if (activeTitle === el.innerText) {
                        card.classList.add('is-playing');
                        activePlayBtn = card.querySelector('.play-preview-btn');
                        activePlayBtn.innerText = '⏹️';
                        activePlayBtn.classList.add('playing');
                    }
                }
            }
        });

        if (userStates[currentUser].cleanMode) document.body.classList.add('clean-mode');
        initBlocklistMasterSortable();
        window.applyUserStatesToUI();
    }; 

    


            // =================================================================
    // NEU: ZENTRALE EVENT-DELEGATION MIT OFFSET-POPUP & FIXES
    // =================================================================
    
    const bContainerForPopup = document.getElementById('blocklist-container');
    const popup = document.getElementById('crossfade-popup');
    const popupVal = document.getElementById('popup-val-display');
    const guide = document.getElementById('vertical-guide');
    const guideMarker = document.getElementById('guide-marker');
    
    let isDragging = false;
    let startY = 0;
    let currentCardForPopup = null;
    let guideLeftPos = 0; // Merken uns die X-Position der Leiste

    // Der feste Bereich in Pixeln für die Skala von 0s bis 16s
    const TOTAL_HEIGHT = 200; 

    bContainerForPopup.addEventListener('touchstart', function(e) {
        if (userStates[currentUser].editMode) return;
        
        const cfGroup = e.target.closest('.crossfade-btn-group');
        if (!cfGroup) return;
        
        const cardElement = cfGroup.closest('.song-card');
        const display = cardElement.querySelector('.crossfade-time-display');
        currentCardForPopup = cardElement;

        const touch = e.touches[0];
        
        longPressTimer = setTimeout(() => {
            isDragging = true;
            
            let currentVal = parseInt(display.innerText) || DEFAULT_CROSSFADE;
            
            // Scrollen der Seite für die Dauer des Slidens blockieren
            document.body.classList.add('lock-scroll');
            
            // Führungslinie links neben der Button-Gruppe positionieren
            const groupRect = cfGroup.getBoundingClientRect();
            guideLeftPos = groupRect.left - 20;
            
            guide.style.left = guideLeftPos + 'px'; 
            guide.style.top = (touch.clientY - (TOTAL_HEIGHT / 2)) + 'px';
            guide.style.height = TOTAL_HEIGHT + 'px';
            
            // Berechnen, wo der Marker anhand des aktuellen Wertes stehen muss
            const percent = 100 - (currentVal / 16 * 100);
            guideMarker.style.top = percent + '%';
            
            // Die Start-Y Position für die Wisch-Berechnung kalibrieren
            startY = touch.clientY + (percent - 50) * (TOTAL_HEIGHT / 100);
            
            guide.classList.add('active');
            
            // Popup FEST links neben der Leiste andocken (auf Höhe des Fingers)
            popup.style.left = guideLeftPos + 'px';
            popup.style.top = touch.clientY + 'px';
            popupVal.innerText = currentVal + 's';
            popup.classList.add('active');
            
            if (window.navigator.vibrate) window.navigator.vibrate(50);
        }, 600); 
    }, { passive: true });

    bContainerForPopup.addEventListener('touchmove', function(e) {
        if (!isDragging) {
            clearTimeout(longPressTimer);
            return;
        }
        
        const touch = e.touches[0];
        
        // Das Popup bleibt auf der X-Achse der Leiste, folgt auf der Y-Achse aber dem Finger
        popup.style.left = guideLeftPos + 'px';
        popup.style.top = touch.clientY + 'px';
        
        const diffY = startY - touch.clientY; 
        
        // Prozentuale Position auf der Leiste berechnen (0 bis 100)
        let percent = 50 - ((diffY / TOTAL_HEIGHT) * 100);
        if (percent < 0) percent = 0;
        if (percent > 100) percent = 100;
        
        guideMarker.style.top = percent + '%';
        
        // Wert anhand der Prozent-Position auf der Skala ermitteln
        let newVal = 16 - Math.round((percent / 100) * 16);
        
        if (newVal < 0) newVal = 0;
        if (newVal > 16) newVal = 16;
        
        popupVal.innerText = newVal + 's';
        
        if (currentCardForPopup) {
            const display = currentCardForPopup.querySelector('.crossfade-time-display');
            const toggleBtn = currentCardForPopup.querySelector('.crossfade-toggle-btn');
            if (display) display.innerText = newVal + 's';
            
            if (toggleBtn) {
                if (newVal === 0) {
                    toggleBtn.classList.add('disabled');
                } else {
                    toggleBtn.classList.remove('disabled');
                }
            }
        }
    }, { passive: true });

    bContainerForPopup.addEventListener('touchend', () => {
        clearTimeout(longPressTimer);
        if (isDragging) {
            isDragging = false;
            popup.classList.remove('active');
            guide.classList.remove('active');
            
            document.body.classList.remove('lock-scroll');
            
            window.saveData(); 
            currentCardForPopup = null;
        }
    });

    bContainerForPopup.addEventListener('touchcancel', () => {
        clearTimeout(longPressTimer);
        if (isDragging) {
            isDragging = false;
            popup.classList.remove('active');
            guide.classList.remove('active');
            
            document.body.classList.remove('lock-scroll');
            
            currentCardForPopup = null;
        }
    });



</script>
