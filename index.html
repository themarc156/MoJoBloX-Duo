<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>DJ-Tool Pro</title>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --panel-bg: #1a1a1a;
            --border-color: #333;
            --accent: #ff9800;
            --text: #e0e0e0;
        }

        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg-color); color: var(--text); margin: 0; padding: 15px; height: 100vh; box-sizing: border-box; }
        .app-container { display: flex; flex-direction: column; height: 100%; gap: 15px; }

        /* Header */
        .header-row { display: flex; align-items: flex-end; gap: 20px; padding-bottom: 5px; }
        .dj-header-group { flex: 1; display: flex; flex-direction: column; gap: 8px; }
        h2 { text-align: center; color: var(--accent); margin: 0; font-size: 1.1em; letter-spacing: 1px; text-transform: uppercase; }

        .toolbar-panel { 
        display: flex; 
        /* justify-content: center; <-- Entfernen */
        gap: 6px; 
        background: var(--panel-bg); 
        padding: 10px; 
        border-radius: 8px; 
        border: 1px solid var(--border-color);
        box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        width: 100%; /* Sicherstellen, dass die Toolbar voll ausnutzt */
        box-sizing: border-box;
    }

    .toolbar-panel button { 
        flex: 1; /* <-- Das bewirkt, dass die Buttons den Platz teilen */
        background: #2a2a2a; 
        border: 1px solid #444; 
        color: white; 
        padding: 6px 0; /* Padding angepasst, da flex:1 die Breite steuert */
        border-radius: 4px; 
        cursor: pointer; 
        transition: all 0.2s ease;
    }
        .toolbar-panel button:hover { background: #444; border-color: #666; }
        .toolbar-panel button:active { background: var(--accent); transform: translateY(1px); }

        .logo-center { width: 80px; display: flex; justify-content: center; flex-shrink: 0; }
        .logo-center img { width: 90px; height: auto; filter: drop-shadow(0 0 5px rgba(255,152,0,0.2)); }

        /* Content */
        .content-row { display: flex; flex: 1; gap: 15px; min-height: 0; }
        .dj-column { flex: 1; display: flex; flex-direction: column; gap: 10px; min-height: 0; }
        .content-area { flex: 1; background: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 8px; overflow-y: auto; padding: 10px; min-height: 200px; }
        
        /* Song & Block Design */
        .block { background: #252525; margin: 10px 0; border-radius: 5px; border: 1px solid #444; }
        .block-header { height: 25px; display: flex; align-items: center; padding: 0 8px; cursor: grab; gap: 10px; }
        
        .song-list { min-height: 50px; padding: 5px; border: 1px dashed transparent; }
        .song-list.drag-over { border-color: var(--accent); }
        
        .song-item { background: #333; height: 25px; margin: 5px 0; border-radius: 3px; cursor: grab; display: flex; align-items: center; padding: 0 8px; gap: 10px; }
        .song-item.dragging { opacity: 0.5; border: 1px dashed var(--accent); }
        
        .song-info { flex-grow: 1; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; font-size: 0.85em; }
        .controls-wrapper { display: flex; gap: 5px; align-items: center; }
        
        .play-btn { background: #444; color: var(--accent); border: none; width: 25px; height: 15px; cursor: pointer; border-radius: 3px; font-size: 0.7em; }
        .delete-btn { display: none; background: #ff4444; color: white; border: none; padding: 0px 8px; cursor: pointer; height: 15px; font-size: 0.8em; }
        
        /* Hier wird die Klasse aktiv */
        .col-dj.edit-mode .delete-btn { display: block; }
        
        .toggle-btn { background: none; border: none; color: white; cursor: pointer; font-size: 0.8em; padding: 5px; }

        /* FLAT VIEW */
        .col-dj.flat-view .block-header { display: none; }
        .col-dj.flat-view .block { background: transparent; border: none; margin: 0; }
        .col-dj.flat-view .song-list { display: block !important; padding: 0; }

        .header-main {
    display: flex;
    align-items: center; /* Zentriert Namen, Icon und Statuspunkt */
    gap: 10px;           /* Abstand zwischen den Elementen */
    margin-bottom: 5px;  /* Abstand zur Toolbar darunter */
}

.folder-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 1.2rem;
    padding: 0;
}

.song-count {
    margin-left: 10px;
    font-size: 0.9rem;
    color: #666;
    font-weight: bold;
}

/* Scrollbar für Chrome, Edge und Safari */
.content-area::-webkit-scrollbar {
    width: 8px; /* Schmaler machen */
}

.content-area::-webkit-scrollbar-track {
    background: #1a1a1a; /* Gleiche Hintergrundfarbe wie dein Panel */
}

.content-area::-webkit-scrollbar-thumb {
    background: #444; /* Dunkler Griff */
    border-radius: 4px; /* Abgerundete Ecken */
}

.content-area::-webkit-scrollbar-thumb:hover {
    background: #666; /* Heller beim Drüberfahren, damit man ihn findet */
}

/* Scrollbar für Firefox (Standard-Standard) */
.content-area {
    scrollbar-width: thin;
    scrollbar-color: #444 #1a1a1a;
}

.block-count {
    margin-left: auto; /* Schiebt den Counter nach rechts neben den Titel */
    margin-right: 10px;
    background: #333;
    padding: 2px 6px;
    border-radius: 10px;
    font-size: 0.75em;
    color: var(--accent);
    font-weight: bold;
}

/* Zeigt an, dass der Text im Edit-Modus klickbar ist */
.col-dj.edit-mode .block-title {
    cursor: text;
    border: 1px dashed #666;
    padding: 0 4px;
    border-radius: 3px;
}

/* Optional: Hintergrund beim Hover im Edit-Modus */
.col-dj.edit-mode .block-title:hover {
    background: #444;
}

.fade-btn {
    background: #444; 
    color: var(--accent); 
    border: none; 
    padding: 2px 6px; 
    cursor: pointer; 
    border-radius: 3px;
}

    </style>
</head>
<body>

<div class="app-container">
    <div class="header-row">
        <div class="dj-header-group">
            <div class="header-main">
                <h2>DJ Marc</h2>
                <button class="folder-btn" onclick="selectMusicFolder('marc')" title="Musikordner wählen">📂</button>
                <span id="status-marc" title="Ordner-Status">⚪</span>
                <span id="count-marc" class="song-count">0 Songs</span>
            </div>
            <div class="toolbar-panel">
                <input type="file" id="inputMarc" style="display:none" multiple accept="audio/*" onchange="addSongs(this, 'content-dj1')">
                <button onclick="document.getElementById('inputMarc').click()">🎵+</button>
                <button onclick="addBlock('content-dj1')">📁+</button>
                <button onclick="toggleEditMode('col-dj1')">✏️</button>
                <button onclick="saveAsTemplate('dj1')">💾</button>
                <button onclick="toggleFlatView('col-dj1')">👁️</button>
                <button onclick="toggleAllBlocks('col-dj1')">↕️</button>
            </div>
        </div>

        <div class="logo-center"><img src="icon.png" alt="Logo"></div>

        <div class="dj-header-group">
            <div class="header-main">
                <h2>DJ Gunnar</h2>
                <button class="folder-btn" onclick="selectMusicFolder('gunnar')" title="Musikordner wählen">📂</button>
                <span id="status-gunnar" title="Ordner-Status">⚪</span>
                <span id="count-gunnar" class="song-count">0 Songs</span>
            </div>
            <div class="toolbar-panel">
                <input type="file" id="inputGunnar" style="display:none" multiple accept="audio/*" onchange="addSongs(this, 'content-dj2')">
                <button onclick="document.getElementById('inputGunnar').click()">🎵+</button>
                <button onclick="addBlock('content-dj2')">📁+</button>
                <button onclick="toggleEditMode('col-dj2')">✏️</button>
                <button onclick="saveAsTemplate('dj2')">💾</button>
                <button onclick="toggleFlatView('col-dj2')">👁️</button>
                <button onclick="toggleAllBlocks('col-dj2')">↕️</button>
            </div>
        </div>
    </div>

    <div class="content-row">
        <div class="dj-column col-dj" id="col-dj1">
            <div id="content-dj1" class="content-area" ondragover="handleDragOver(event)"></div>
        </div>
        <div class="dj-column col-dj" id="col-dj2">
            <div id="content-dj2" class="content-area" ondragover="handleDragOver(event)"></div>
        </div>
    </div>
</div>

<script type="module">
    let draggedElement = null;

// Firebase Imports
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// Firebase Config
const firebaseConfig = { 
    apiKey: "AIzaSyDCZXd7ghAG7CbAwlushzifcCznLslLack", 
    authDomain: "mymojoblox.firebaseapp.com", 
    projectId: "mymojoblox", 
    storageBucket: "mymojoblox.firebasestorage.app", 
    messagingSenderId: "191559552869", 
    appId: "1:191559552869:web:0f212fc5f6fb7338621b8c" 
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);



// Laden-Funktion
window.loadDJData = async (djId) => {
    const docRef = doc(db, "mojoblox", `set_${djId}`);
    const docSnap = await getDoc(docRef);
    
    // Mapping: Welches djId gehört zu welchem Benutzer?
    const djKey = (djId === 'dj1') ? 'marc' : 'gunnar'; 
    
    if (docSnap.exists()) {
        const data = docSnap.data();
        const container = document.getElementById(`content-${djId}`);
        container.innerHTML = ''; // Vorher leeren
        
        // Durch alle Items (Blöcke ODER Songs) in der DB loopen
        data.blocklist.forEach(item => {
            
            if (item.type === 'block') {
                // --- BLOCK RENDERN ---
                const div = document.createElement('div');
                div.className = 'block';
                div.draggable = true;
                div.id = item.id || 'block-' + Date.now();
                div.ondragstart = (e) => { draggedElement = e.target; e.target.classList.add('dragging'); };
                div.ondragend = (e) => { e.target.classList.remove('dragging'); };
                
                div.innerHTML = `
                <div class="block-header">
                    <button class="toggle-btn" onclick="toggleSingleBlock(this)">▼</button>
<span class="block-title" contenteditable="false" onblur="handleTitleChange(this)">${item.title}</span>
                    <span class="block-count">0</span>
                    <button class="delete-btn" onclick="deleteItem(this.closest('.block'))">❌</button>
                </div>
                <div class="song-list" ondragover="handleDragOver(event)"></div>`;
                
                const songList = div.querySelector('.song-list');
                // Songs im Block hinzufügen
                item.songs.forEach(song => {
                    songList.appendChild(createSongElementFromData(song.title, djKey));
                });
                
                container.appendChild(div);
                
                // --- WICHTIG: Block-Zähler initialisieren ---
                updateBlockCount(div);

            } else if (item.type === 'song') {
                // --- LOSEN SONG RENDERN ---
                container.appendChild(createSongElementFromData(item.title, djKey));
            }
        });

        // --- Gesamtzähler nach dem Laden aktualisieren ---
        updateSongCount(djKey);

        console.log(`Set für ${djId} geladen (Mapping zu ${djKey}).`);
    }
};

// Hilfsfunktion zum Erstellen der Song-Elemente beim Laden
function createSongElementFromData(title, djKey) {
    const div = document.createElement('div');
    div.className = 'song-item';
    div.draggable = true;
    div.ondragstart = (e) => { draggedElement = e.target; e.target.classList.add('dragging'); };
    div.ondragend = (e) => { e.target.classList.remove('dragging'); };
    
    // Standard-Fade (kann später durch Datenbank-Wert ersetzt werden)
    const fadeTime = 0; 

    div.innerHTML = `
        <div class="song-info" title="${title}">${title}</div>
        <div class="controls-wrapper">
            <input type="number" class="fade-input" value="${fadeTime}" style="display:none">
            
            <button class="fade-btn" onclick="openFadeOverlay(this)" title="Fade-In einstellen">⏱</button>
            
            <button class="test-transition-btn" onclick="testTransition(this)" title="Übergang testen">🔁</button>
            <button class="play-btn" onclick="toggleSong(this, '${title}', '${djKey}')">▶</button>
            <button class="delete-btn" onclick="deleteItem(this.closest('.song-item'))">❌</button>
        </div>`;
    return div;
}



// Hilfsfunktion zum Auslesen der aktuellen Daten pro DJ
function getDOMData(djId) {
    const container = document.getElementById(`content-${djId}`);
    const data = { blocklist: [], timestamp: Date.now() };

    container.querySelectorAll(':scope > .block, :scope > .song-item').forEach(el => {
        if (el.classList.contains('block')) {
            const songs = Array.from(el.querySelectorAll('.song-item')).map(song => ({
                // Sicherer Zugriff mit ?. und Fallback-Wert
                title: song.querySelector('.song-info')?.innerText || "Unbekannter Titel",
                // Fade-Time aus dem versteckten Input mitnehmen
                fadeTime: song.querySelector('.fade-input')?.value || 0 
            }));
            data.blocklist.push({
                type: 'block',
                id: el.id,
                title: el.querySelector('strong')?.innerText || "Unbenannt",
                songs: songs
            });
        } else if (el.classList.contains('song-item')) {
            data.blocklist.push({
                type: 'song',
                // Sicherer Zugriff mit ?.
                title: el.querySelector('.song-info')?.innerText || "Unbekannter Titel",
                fadeTime: el.querySelector('.fade-input')?.value || 0
            });
        }
    });
    return data;
}

// Die zentrale Sync-Funktion
async function syncToFirebase(djId) {
    const data = getDOMData(djId);
    try {
        await setDoc(doc(db, "mojoblox", `set_${djId}`), data);
        console.log(`Auto-Save für ${djId} erfolgreich.`);
    } catch (e) { console.error("Sync-Fehler:", e); }
}

    function toggleFlatView(colId) { document.getElementById(colId).classList.toggle('flat-view'); }
function toggleEditMode(colId) {
    const column = document.getElementById(colId);
    
    // 1. Die CSS-Klasse umschalten
    column.classList.toggle('edit-mode');
    
    // 2. Prüfen, ob wir uns jetzt im Edit-Modus befinden
    const isEditing = column.classList.contains('edit-mode');
    
    // 3. Alle Titel in dieser Spalte finden und bearbeitbar machen
    const titles = column.querySelectorAll('.block-title');
    titles.forEach(title => {
        title.contentEditable = isEditing;
    });
}    
    function toggleAllBlocks(colId) {
        const container = document.getElementById(colId);
        const lists = container.querySelectorAll('.song-list');
        const shouldExpand = lists.length > 0 && lists[0].style.display === 'none';
        lists.forEach(l => {
            l.style.display = shouldExpand ? 'block' : 'none';
            const btn = l.previousElementSibling.querySelector('.toggle-btn');
            if (btn) btn.textContent = shouldExpand ? '▼' : '▶';
        });
    }

    function toggleSingleBlock(btn) {
        const list = btn.parentElement.nextElementSibling;
        const isHidden = list.style.display === 'none';
        list.style.display = isHidden ? 'block' : 'none';
        btn.textContent = isHidden ? '▼' : '▶';
    }

    function addSongs(input, targetId) {
    const container = document.getElementById(targetId);
    const djId = targetId.replace('content-', ''); 
    const djKey = (djId === 'dj1') ? 'marc' : 'gunnar';

    Array.from(input.files)
        .filter(f => f.type.startsWith('audio/'))
        .forEach(file => {
            const fileName = file.name.replace(/\.[^/.]+$/, ""); // Name ohne Endung

            // --- HIER DIE PRÜFUNG ---
            if (isSongAlreadyPresent(targetId, fileName)) {
                console.warn(`Song "${fileName}" bereits in der Liste. Wird übersprungen.`);
                return; // Abbruch für diesen spezifischen Song
            }

            // Hinzufügen, wenn nicht gefunden
            container.appendChild(createSongElementFromData(fileName, djKey));
        });

    input.value = ""; // Input leeren

    // Auto-Save triggern
    updateSongCount(djKey);
    syncToFirebase(djId);
}

    function addBlock(targetId) {
    const name = prompt("Name des Blocks:");
    if (!name) return;
    
    const container = document.getElementById(targetId);
    const div = document.createElement('div');
    div.className = 'block';
    div.draggable = true;
    div.ondragstart = (e) => { draggedElement = e.target; e.target.classList.add('dragging'); };
    div.ondragend = (e) => { e.target.classList.remove('dragging'); };
    
    // HTML mit dem neuen Counter-Span
    div.innerHTML = `
        <div class="block-header">
            <button class="toggle-btn" onclick="toggleSingleBlock(this)">▼</button>
            <strong>${name}</strong>
            <span class="block-count">0</span>
            <button class="delete-btn" onclick="deleteItem(this.closest('.block'))">❌</button>
        </div>
        <div class="song-list" ondragover="handleDragOver(event)"></div>`;
    
    container.appendChild(div);

    // --- WICHTIG: Zähler initialisieren ---
    updateBlockCount(div);

    // Auto-Save
    const djId = targetId.replace('content-', ''); 
    syncToFirebase(djId);
}

// Funktion zum Speichern eines Snapshots als Vorlage
window.saveAsTemplate = async (djId) => {
    const templateName = prompt("Name für dieses Set-Preset (z.B. 'Party 2026'):");
    if (!templateName || templateName.trim() === '') return;

    // Wir nutzen hier dieselbe Logik wie beim Auto-Save, um die Daten zu holen
    const data = getDOMData(djId); 
    data.templateName = templateName.trim();
    data.owner = djId; // Speichert den DJ als Besitzer

    try {
        // Speichern in der Collection 'mojoblox_templates'
        await setDoc(doc(db, "mojoblox_templates", `${djId}_${Date.now()}`), data);
        alert(`Preset "${templateName}" erfolgreich gespeichert!`);
    } catch (e) { 
        console.error("Fehler beim Speichern der Vorlage:", e); 
        alert("Fehler beim Speichern.");
    }
};

    function createSongElement(file) {
    const div = document.createElement('div');
    div.className = 'song-item';
    div.draggable = true;
    
    // URL speichern, damit wir sie für den Übergangstest abrufen können
    const url = URL.createObjectURL(file);
    div.dataset.url = url;

    div.ondragstart = (e) => { draggedElement = e.target; e.target.classList.add('dragging'); };
    div.ondragend = (e) => { e.target.classList.remove('dragging'); };
    
    const name = file.name.replace(/\.[^/.]+$/, "");
    
    // Standardwert für Fade (könnte später durch DB-Daten ersetzt werden)
    const fadeTime = 0; 

    div.innerHTML = `
        <div class="song-info" title="${name}">${name}</div>
        <div class="controls-wrapper">
            <div class="fade-control">
                <input type="number" class="fade-input" value="${fadeTime}" min="0" max="10" 
                       onchange="saveFadeTime(this)" title="Fade-In Dauer (Sek.)">
                <span>s</span>
            </div>
            <button class="test-transition-btn" onclick="testTransition(this)" title="Übergang testen">🔁</button>
            <button class="play-btn" onclick="togglePlay(this, '${url}')">▶</button>
            <button class="delete-btn" onclick="deleteItem(this.closest('.song-item'))">❌</button>
        </div>`;
    return div;
}

window.deleteItem = (element) => {
    // 1. Suche den Block, FALLS das gelöschte Element in einem Block liegt
    const parentBlock = element.closest('.block');
    const container = element.closest('.content-area');
    
    // 2. Element löschen
    element.remove();
    
    if (container) {
        const djId = container.id.replace('content-', '');
        const djKey = (djId === 'dj1') ? 'marc' : 'gunnar';
        
        // 3. Sync zur Datenbank
        syncToFirebase(djId);
        
        // 4. Gesamtzähler (DJ) aktualisieren
        updateSongCount(djKey);
        
        // 5. WICHTIG: Block-Zähler aktualisieren, falls der Song in einem Block war
        if (parentBlock) {
            updateBlockCount(parentBlock);
        }
    }
};

    function togglePlay(btn, url) {
        if (!btn.audio) btn.audio = new Audio(url);
        if (btn.audio.paused) { btn.audio.play(); btn.textContent = '■'; } 
        else { btn.audio.pause(); btn.textContent = '▶'; }
    }

    
    // 1. Die visuelle Sortier-Logik (unverändert lassen!)
function handleDragOver(e) {
    e.preventDefault(); 
    e.stopPropagation();
    
    // Visuelles Feedback entfernen
    document.querySelectorAll('.song-list').forEach(list => list.classList.remove('drag-over'));
    
    const container = e.currentTarget;
    container.classList.add('drag-over');
    
    // Hier berechnet der Browser, wo das Element hingehört
    const afterElement = [...container.querySelectorAll(':scope > .song-item, :scope > .block')].reduce((closest, child) => {
        if (child === draggedElement) return closest;
        const box = child.getBoundingClientRect();
        const offset = e.clientY - box.top - box.height / 2;
        return (offset < 0 && offset > closest.offset) ? { offset, element: child } : closest;
    }, { offset: Number.NEGATIVE_INFINITY }).element;
    
    if (afterElement == null) container.appendChild(draggedElement);
    else container.insertBefore(draggedElement, afterElement);
}

// 2. Der Sync-Event-Listener (der "Auto-Save" Button)
document.addEventListener('dragend', (e) => {
    // Visuelle Spuren löschen
    document.querySelectorAll('.song-list').forEach(list => list.classList.remove('drag-over'));
    
    // Herausfinden, in welcher Spalte der Drop stattgefunden hat
    const container = e.target.closest('.content-area');
    if (container) {
        // Die ID ist z.B. 'content-dj1', wir brauchen 'dj1'
        const djId = container.id.replace('content-', ''); 
        
        // Sync auslösen (Jetzt erst wird in die DB geschrieben!)
        syncToFirebase(djId);
    }
});

// Beim Laden der Seite automatisch Daten abrufen
window.addEventListener('DOMContentLoaded', () => {
    loadDJData('dj1');
    loadDJData('dj2');
});

// Hier speichern wir die Bibliotheken (Mapping: Dateiname -> FileHandle)
const djLibraries = {
    marc: new Map(),
    gunnar: new Map()
};

async function selectMusicFolder(djKey) {
    try {
        const dirHandle = await window.showDirectoryPicker();
        const lib = djLibraries[djKey];
        
        lib.clear(); // Alte Bibliothek leeren
        
        for await (const entry of dirHandle.values()) {
            // Nur Audio-Dateien indexieren
            if (entry.kind === 'file' && entry.name.match(/\.(mp3|wav|ogg|flac|m4a)$/i)) {
                const cleanName = entry.name.replace(/\.[^/.]+$/, "");
                lib.set(cleanName, entry);
            }
        }
        
        // Status-Icon auf grün setzen
        const statusSpan = document.getElementById(`status-${djKey}`);
        if(statusSpan) statusSpan.innerText = "🟢";
        
        alert(`Bibliothek für ${djKey} geladen: ${lib.size} Songs gefunden.`);
    } catch (err) {
        console.error("Ordnerzugriff abgebrochen:", err);
    }
}

async function toggleSong(btn, title, djKey) {
    // 1. Prüfen, ob eine Audio-Instanz existiert und ob sie gerade läuft
    const existingAudio = btn.audioInstance;

    if (existingAudio && !existingAudio.paused) {
        // --- STOPPEN ---
        existingAudio.pause();
        existingAudio.currentTime = 0; // Zurück zum Start
        btn.innerText = "▶";          // Icon wieder auf Play
        return; // Funktion hier beenden
    }

    // 2. Falls eine alte Instanz existiert, aufräumen
    if (existingAudio) {
        URL.revokeObjectURL(existingAudio.src);
    }

    // 3. STARTEN
    const lib = djLibraries[djKey];
    if (lib && lib.has(title)) {
        const fileHandle = lib.get(title);
        const file = await fileHandle.getFile();
        const url = URL.createObjectURL(file);
        
        const newAudio = new Audio(url);
        
        // Audio-Objekt DIREKT als Eigenschaft an den Button hängen (NICHT in dataset!)
        btn.audioInstance = newAudio;
        btn.innerText = "⏹"; // Icon auf Stop

        newAudio.play();

        // Wenn der Song von alleine zu Ende ist
        newAudio.onended = () => {
            btn.innerText = "▶";
            URL.revokeObjectURL(url);
            btn.audioInstance = null; // Instanz löschen
        };
    } else {
        alert("Song nicht im gewählten Ordner gefunden. Bitte Ordner prüfen.");
    }
}

function isSongAlreadyPresent(containerId, songTitle) {
    const container = document.getElementById(containerId);
    // Wir suchen alle Elemente mit der Klasse .song-info innerhalb dieses DJ-Containers
    const existingSongs = container.querySelectorAll('.song-info');
    
    // Prüfen, ob einer der gefundenen Songs den gleichen Title hat
    for (let song of existingSongs) {
        if (song.getAttribute('title') === songTitle) {
            return true; // Song wurde gefunden!
        }
    }
    return false; // Song existiert noch nicht
}

function updateSongCount(djId) {
    // Mapping von DJ-Key auf Container-ID
    const containerId = (djId === 'marc') ? 'content-dj1' : 'content-dj2';
    const container = document.getElementById(containerId);
    
    // Zählt alle .song-item Klassen im Container
    const count = container.querySelectorAll('.song-item').length;
    
    // Anzeige aktualisieren
    const display = document.getElementById(`count-${djId}`);
    if (display) {
        display.innerText = `${count} Song${count !== 1 ? 's' : ''}`;
    }
}

function updateBlockCount(blockElement) {
    if (!blockElement) return;
    const list = blockElement.querySelector('.song-list');
    const count = list.querySelectorAll('.song-item').length;
    const counterSpan = blockElement.querySelector('.block-count');
    if (counterSpan) {
        counterSpan.innerText = count;
    }
}

window.handleTitleChange = (element) => {
    // Hol dir die ID der Spalte, um die richtige DB-Struktur zu finden
    const container = element.closest('.content-area');
    if (container) {
        const djId = container.id.replace('content-', '');
        
        // Auto-Save triggern (deine Sync-Funktion sollte den aktuellen 
        // Zustand des gesamten Containers neu in Firebase speichern)
        syncToFirebase(djId); 
        console.log("Block umbenannt und gespeichert.");
    }
};

window.saveFadeTime = (inputElement) => {
    // 1. Wert als Zahl speichern
    let val = parseInt(inputElement.value);
    
    // Sicherheit: Wert zwischen 0 und 10 halten
    if (val < 0) val = 0;
    if (val > 10) val = 10;
    inputElement.value = val;

    // 2. DJ-Kontext finden (um zu wissen, wohin wir syncen sollen)
    const container = inputElement.closest('.content-area');
    if (!container) return;
    
    const djId = container.id.replace('content-', '');
    
    // 3. Datenbank-Sync auslösen
    // Da deine syncToFirebase-Funktion den DOM liest, 
    // ist der neue Wert jetzt automatisch im Sync enthalten.
    syncToFirebase(djId);
    
    console.log(`Fade-Time für Song in ${djId} auf ${val}s gesetzt.`);
};

// Variable außerhalb der Funktion, um laufende Tests zu stoppen
let activeTestAudio1 = null;
let activeTestAudio2 = null;

window.testTransition = async (btn) => {
    // 1. Laufende Tests sofort stoppen, falls der User erneut klickt
    if (activeTestAudio1) activeTestAudio1.pause();
    if (activeTestAudio2) activeTestAudio2.pause();

    const currentItem = btn.closest('.song-item');
    const nextItem = currentItem.nextElementSibling;

    if (!nextItem || !nextItem.classList.contains('song-item')) {
        alert("Kein nachfolgender Song gefunden!");
        return;
    }

    const fadeInput = currentItem.querySelector('.fade-input');
    const fadeTime = parseInt(fadeInput.value) || 0;
    
    // Audio-Objekte erstellen
    const audio1 = new Audio(currentItem.dataset.url);
    const audio2 = new Audio(nextItem.dataset.url);
    
    // Globale Referenzen speichern
    activeTestAudio1 = audio1;
    activeTestAudio2 = audio2;

    await Promise.all([
        new Promise(r => audio1.onloadedmetadata = r),
        new Promise(r => audio2.onloadedmetadata = r)
    ]);

    const startPoint = Math.max(0, audio1.duration - 20);
    audio1.currentTime = startPoint;
    audio1.play();

    const delayBeforeStartSong2 = 20 - fadeTime;

    setTimeout(() => {
        audio2.volume = 0; 
        audio2.play();

        if (fadeTime === 0) {
            // Sofortige Lautstärke, wenn kein Fade gewünscht ist
            audio2.volume = 1;
        } else {
            // Fade-In Logik
            let vol = 0;
            const steps = 20;
            const fadeInterval = setInterval(() => {
                vol += 0.05;
                if (vol >= 1) { vol = 1; clearInterval(fadeInterval); }
                audio2.volume = vol;
            }, (fadeTime * 1000) / steps);
        }

    }, delayBeforeStartSong2 * 1000);
    
    // Aufräumen nach 20 Sekunden
    setTimeout(() => {
        if(activeTestAudio1 === audio1) audio1.pause();
        if(activeTestAudio2 === audio2) audio2.pause();
    }, 20000);
};

let activeFadeInput = null;

// Öffnet das Overlay
window.openFadeOverlay = (btn) => {
    const songItem = btn.closest('.song-item');
    activeFadeInput = songItem.querySelector('.fade-input');
    
    // Slider-Wert setzen
    const val = activeFadeInput.value || 0;
    document.getElementById('fade-slider').value = val;
    document.getElementById('fade-value-display').innerText = val;
    
    document.getElementById('fade-overlay').style.display = 'flex';
};

// Speichert den Wert
window.saveFadeFromOverlay = () => {
    const val = document.getElementById('fade-slider').value;
    if (activeFadeInput) {
        activeFadeInput.value = val;
        // Speichert und synced direkt
        saveFadeTime(activeFadeInput);
    }
    document.getElementById('fade-overlay').style.display = 'none';
};

</script>

<div id="fade-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center;">
