    <style>
        :root {
    --bg-color: #121212;
    --accent-color: #00adb5;
    --lock-color: #ff4d4d;
    --text-color: #eeeeee;
    --card-bg: #2a2a2a;
    --delete-red: #ff4d4d;
    --safe-track-color: #00adb5;
    --dj2-color: #ffaa00;
    --success-green: #2ecc71;
}

/* --- 1. Globales Layout --- */
* { box-sizing: border-box; }
body { 
    font-family: 'Segoe UI', sans-serif; 
    background: var(--bg-color); 
    color: var(--text-color); 
    margin: 0; 
    user-select: none; 
    touch-action: pan-y; 
    overflow-x: hidden; 
    padding-bottom: 70px; 
}
body.lock-scroll { overflow: hidden !important; touch-action: none !important; }

/* --- 2. Header & Top-Bereich --- */
.main-header {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    background: #222;
    padding: 0 12px;
    border-bottom: 2px solid var(--accent-color);
    position: sticky;
    top: 0;
    z-index: 1002;
    height: 44px;
    color: var(--accent-color);
}
.header-side { display: flex; align-items: center; gap: 6px; }
.header-side.right { justify-content: flex-end; }
.header-center { display: flex; align-items: center; gap: 10px; font-weight: bold; justify-self: center; }
.header-btn {
    font-size: 16px; cursor: pointer; background: #333; border-radius: 5px;
    border: 1px solid var(--accent-color); display: flex; align-items: center;
    justify-content: center; width: 28px; height: 28px; color: white;
}
.lock-btn { border-color: var(--lock-color); color: var(--lock-color); }
body.edit-mode #header-btn-left { background: var(--accent-color); color: white; }

/* --- 3. Aktionen & Input-Bereich --- */
.split-action-row { display: flex; gap: 8px; padding: 2px 10px; background: #121212; align-items: center; height: 48px; }
.input-section { display: flex; gap: 8px; margin-bottom: 10px; position: sticky; top: 44px; z-index: 1001; background: var(--bg-color); padding: 8px 0; }

.btn-add-block { 
    background: #1e1e1e; color: var(--accent-color); border: 1px solid var(--accent-color);
    padding: 10px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}
.btn-folder-select {
    background: #252525; color: #aaa; border: 1px solid #444; width: 45px; height: 40px;
    border-radius: 6px; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.btn-folder-select.active { border-color: var(--success-green); color: var(--success-green); background: #1a2e22; }

input[type="text"] { 
    padding: 10px; border-radius: 6px; border: 1px solid #444; background: #252525; color: white;
    flex-grow: 1; outline: none; font-size: 16px;
}
.btn-plus { background: var(--accent-color); color: white; border: none; width: 45px; height: 40px; border-radius: 6px; font-weight: bold; font-size: 22px; cursor: pointer; }

/* --- 4. Listen & Blöcke --- */
#blocklist-container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
    padding: 10px;
}
.block-item { background: #1a1a1a; border: 1px solid #333; border-radius: 6px; overflow: hidden; display: flex; flex-direction: column; }
.block-item.owner-marc { border-top: 3px solid var(--accent-color); }
.block-item.owner-gunnar { border-top: 3px solid var(--dj2-color); }

.block-header { padding: 8px 12px; display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.05); }
.block-content { padding: 4px; }
.block-item.collapsed .block-content { display: none; }

/* --- 5. Songs / Cards --- */
.song-card { 
    background: var(--card-bg); margin-bottom: 2px; padding: 4px 10px; border-radius: 4px;
    display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem;
    border: 1px solid rgba(255,255,255,0.05); cursor: grab; min-height: 28px;
}
.song-details { flex-grow: 1; overflow: hidden; padding-right: 10px; }
.song-title-text { font-weight: bold; font-size: 0.9rem; }
.song-artist-text { font-size: 0.7rem; color: #999; }

body.user-dj1 .song-card.match-found { border: 1.5px solid var(--safe-track-color); }
body.user-dj2 .song-card.match-found { border: 1.5px solid var(--dj2-color); }

/* --- 6. Features & Komponenten --- */
/* Crossfade/Slider/Tools */
.crossfade-btn-group { display: flex; align-items: center; gap: 4px; margin-left: auto; background: rgba(255,255,255,0.03); padding: 2px 6px; border-radius: 4px; }
.crossfade-toggle-btn.disabled { color: #666; opacity: 0.5; }
.delete-btn { display: none; color: var(--delete-red); cursor: pointer; }
body.edit-mode .delete-btn { display: inline-block; }

/* PDF Styles */
#pdf-template { display: none; color: #000; background: #fff; padding: 15px; }

/* --- 7. Animationen & Responsive --- */
@keyframes atmen-cyan {
    0%, 100% { box-shadow: 0 0 5px rgba(0, 173, 181, 0.4); border-color: var(--accent-color); }
    50% { box-shadow: 0 0 20px rgba(0, 173, 181, 0.9); border-color: #00fff2; }
}

@media (max-width: 768px) {
    #blocklist-container { grid-template-columns: 1fr; }
}
    </style>

<script>
    let DEFAULT_CROSSFADE = 8;   
    let directoryHandle = null; 
    let activePlayBtn = null;

    let longPressTimer = null;
    let currentlyEditingSongCard = null; 
    let currentObjectUrl = null; 

    let audio1 = new Audio();
    let audio2 = new Audio();
    let currentPlayer = audio1;
    let nextPlayer = audio2;

    let fadeInInterval = null;
    let nextSongTriggered = false; 
    

window.dataDJ1 = []; 
window.dataDJ2 = [];
window.lastKnownDJ1 = [];
window.lastKnownDJ2 = [];
window.sortableDJ1 = null;
window.sortableDJ2 = null;

window.isAppReady = false; // Wir sind noch nicht bereit

    window.toggleCrossfadeState = function(cardElement) {
        const toggleBtn = cardElement.querySelector('.crossfade-toggle-btn');
        const display = cardElement.querySelector('.crossfade-time-display');
        
        if (!toggleBtn || !display) return;

        if (toggleBtn.classList.contains('disabled')) {
            toggleBtn.classList.remove('disabled');
            let sVal = parseInt(display.innerText);
            if (sVal === 0) display.innerText = DEFAULT_CROSSFADE + 's';
        } else {
            toggleBtn.classList.add('disabled');
            display.innerText = '0s';
        }
        window.saveData();
    };

    window.setupCrossfadeEvents = function(cardElement) {
        const cfGroup = cardElement.querySelector('.crossfade-btn-group');
        if (!cfGroup) return;

        cfGroup.addEventListener('click', (e) => {
            e.stopPropagation();
            if (longPressTimer) clearTimeout(longPressTimer);
            window.toggleCrossfadeState(cardElement);
        });
    };

// In deiner Render-Funktion für die Blöcke:
function renderBlocks() {
    const container = document.getElementById('blocklist-container');
    if (!container) return;
    container.innerHTML = '';

    allBlocks.forEach((block, index) => {
        const blockDiv = document.createElement('div');
        
        // Bestimmung der Klasse basierend auf dem Ersteller
        // Falls 'createdBy' nicht existiert, wird standardmäßig Marc (dj1) genommen
        const userClass = (block.createdBy === 'dj2') ? 'owner-gunnar' : 'owner-marc';
        
        // Klassen zuweisen (inkl. collapsed-Status, falls vorhanden)
        blockDiv.className = `block-item ${userClass} ${block.collapsed ? 'collapsed' : ''}`;
        blockDiv.dataset.index = index; // Wichtig für spätere Zuordnung

        // --- HIER FOLGT DEIN BESTEHENDER CODE FÜR HEADER & SONGS ---
        // Beispielhaft:
        // const header = createBlockHeader(block, index); 
        // const content = createBlockContent(block, index);
        // blockDiv.appendChild(header);
        // blockDiv.appendChild(content);
        
        container.appendChild(blockDiv);
    });
}

    window.triggerFolderSelection = async function() {
        const btn = document.getElementById('btn-folder-select');
        try {
            directoryHandle = await window.showDirectoryPicker();
            btn.classList.add('active');
            alert("Ordner erfolgreich verknüpft! Die Übergänge funktionieren nun mit deinen lokalen Dateien.");
        } catch (err) {
            console.log("Ordnerauswahl abgebrochen oder nicht unterstützt.", err);
            btn.classList.remove('active');
        }
    };

    function findeNaechsteKarte(aktuellerButton) {
        const aktuelleKarte = aktuellerButton.closest('.song-card');
        if (!aktuelleKarte) return null;

        const container = document.getElementById('blocklist-container');
        const alleElemente = Array.from(container.children);
        const alleSongKarten = [];
        
        alleElemente.forEach(element => {
            if (element.classList.contains('song-card')) {
                alleSongKarten.push(element);
            } else if (element.classList.contains('block-item')) {
                const songsImBlock = element.querySelectorAll('.block-sortable-list .song-card');
                songsImBlock.forEach(song => alleSongKarten.push(song));
            }
        });

        const aktuellerIndex = alleSongKarten.indexOf(aktuelleKarte);
        
        if (aktuellerIndex !== -1 && aktuellerIndex < alleSongKarten.length - 1) {
            return alleSongKarten[aktuellerIndex + 1];
        }
        return null; 
    }

    function fadeInPlayer(player, durationSec) {
        if (fadeInInterval) clearInterval(fadeInInterval);
        
        player.volume = 0;
        player.play().catch(e => console.log("Autoplay blockiert oder Datei defekt."));

        const step = 0.02; 
        const intervalTime = (durationSec * 1000) * step; 
        
        fadeInInterval = setInterval(() => {
            if (player.volume < 1 - step) {
                player.volume += step;
            } else {
                player.volume = 1;
                clearInterval(fadeInInterval);
            }
        }, intervalTime);
    }

    window.playPreview = async function(e, title, artist = '', isAutoplayNext = false, forceDisabled = false, forcedCfTime = 8) {
        if (e) e.stopPropagation(); 
        let clickedBtn = e ? e.currentTarget : null;
        let currentCard = clickedBtn ? clickedBtn.closest('.song-card') : null;

        if (isAutoplayNext && !clickedBtn) {
            const alleKarten = document.querySelectorAll('.song-card');
            for (let karte of alleKarten) {
                const titleText = karte.querySelector('.song-title-text').innerText;
                if (titleText === title) {
                    currentCard = karte;
                    clickedBtn = karte.querySelector('.play-preview-btn');
                    break;
                }
            }
        }

        if (!isAutoplayNext && activePlayBtn === clickedBtn) {
            audio1.pause(); audio1.src = ''; audio1.volume = 1;
            audio2.pause(); audio2.src = ''; audio2.volume = 1;
            audio1.ontimeupdate = null; audio2.ontimeupdate = null;
            audio1.onended = null; audio2.onended = null;
            audio1.onloadedmetadata = null; audio2.onloadedmetadata = null;
            if (fadeInInterval) clearInterval(fadeInInterval);
            
            if (currentObjectUrl) { URL.revokeObjectURL(currentObjectUrl); currentObjectUrl = null; }
            
            clickedBtn.innerText = '▶️';
            clickedBtn.classList.remove('playing');
            if (currentCard) currentCard.classList.remove('is-playing');
            
            activePlayBtn = null;
            return;
        }

        if (activePlayBtn && activePlayBtn !== clickedBtn) {
            activePlayBtn.innerText = '▶️';
            activePlayBtn.classList.remove('playing');

            const oldCard = activePlayBtn.closest('.song-card');
            if (oldCard) oldCard.classList.remove('is-playing');
        }

        if (clickedBtn) {
            clickedBtn.innerText = '⏳'; 
            activePlayBtn = clickedBtn;
        }

        let currentCrossfadeTime = isAutoplayNext ? forcedCfTime : DEFAULT_CROSSFADE;
        let isCrossfadeDisabled = isAutoplayNext ? forceDisabled : false;

        if (!isAutoplayNext && currentCard) {
            const timeDisplay = currentCard.querySelector('.crossfade-time-display');
            const toggleBtn = currentCard.querySelector('.crossfade-toggle-btn');
            
            if (timeDisplay) currentCrossfadeTime = parseInt(timeDisplay.innerText) || 0;
            if (toggleBtn && toggleBtn.classList.contains('disabled')) {
                isCrossfadeDisabled = true;
            }
        }
        
        if (currentCrossfadeTime === 0) currentCrossfadeTime = 5; 
        if (currentCrossfadeTime > 20) currentCrossfadeTime = 20; 

        if (directoryHandle) {
            try {
                const searchName = title.toLowerCase().trim();
                let fileToPlay = null;

                for await (const entry of directoryHandle.values()) {
                    if (entry.kind === 'file') {
                        const lowerName = entry.name.toLowerCase();
                        if (lowerName.includes(searchName) && (lowerName.endsWith('.mp3') || lowerName.endsWith('.m4a'))) {
                            fileToPlay = await entry.getFile();
                            break;
                        }
                    }
                }

                if (!fileToPlay) {
                    alert(`Datei für "${title}" wurde im Ordner nicht gefunden.`);
                    if (clickedBtn) clickedBtn.innerText = '▶️';
                    if (currentCard) currentCard.classList.remove('is-playing');
                    activePlayBtn = null;
                    return;
                }

                if (!isAutoplayNext && currentObjectUrl) {
                    URL.revokeObjectURL(currentObjectUrl);
                }

                const url = URL.createObjectURL(fileToPlay);
                currentObjectUrl = url;

                if (isAutoplayNext) {
                    currentPlayer = (currentPlayer === audio1) ? audio2 : audio1;
                    currentPlayer.src = url;
                    
                    if (isCrossfadeDisabled) {
                        if (fadeInInterval) clearInterval(fadeInInterval);
                        currentPlayer.volume = 1;
                        currentPlayer.play().catch(e => console.log("Autoplay blockiert oder gescheitert."));
                    } else {
                        fadeInPlayer(currentPlayer, currentCrossfadeTime);
                    }
                    
                } else {
                    if (fadeInInterval) clearInterval(fadeInInterval);
                    audio1.pause(); audio2.pause();
                    audio1.ontimeupdate = null; audio2.ontimeupdate = null;
                    audio1.onended = null; audio2.onended = null;
                    audio1.onloadedmetadata = null; audio2.onloadedmetadata = null;
                    audio1.volume = 1; audio2.volume = 1;
                    currentPlayer = audio1;
                    nextPlayer = audio2;
                    
                    currentPlayer.src = url;
                }

                nextSongTriggered = false; 

                currentPlayer.onloadedmetadata = () => {
                    if (!isAutoplayNext) {
                        const startPoint = Math.max(0, currentPlayer.duration - 20);
                        currentPlayer.currentTime = startPoint;
                        currentPlayer.play().catch(e => console.log("Abspielen fehlgeschlagen."));
                    } else {
                        currentPlayer.currentTime = 0;
                        currentPlayer.play().catch(e => console.log("Abspielen fehlgeschlagen."));
                    }
                };

                const songSnapshotCard = currentCard;
                const songSnapshotBtn = clickedBtn;

                currentPlayer.onplay = () => {
                    if (songSnapshotBtn) {
                        songSnapshotBtn.innerText = '⏹️';
                        songSnapshotBtn.classList.add('playing');
                    }
                    if (songSnapshotCard) {
                        songSnapshotCard.classList.add('is-playing');
                    }
                };

                currentPlayer.onended = () => {
                    if (songSnapshotBtn) {
                        songSnapshotBtn.innerText = '▶️';
                        songSnapshotBtn.classList.remove('playing');
                    }
                    if (songSnapshotCard) {
                        songSnapshotCard.classList.remove('is-playing');
                    }
                };

                currentPlayer.ontimeupdate = () => {
                    if (isAutoplayNext) {
                        if (currentPlayer.currentTime >= 20) {
                            currentPlayer.pause();
                            currentPlayer.ontimeupdate = null; 
                            
                            if (songSnapshotBtn) {
                                songSnapshotBtn.innerText = '▶️';
                                songSnapshotBtn.classList.remove('playing');
                            }
                            if (songSnapshotCard) {
                                songSnapshotCard.classList.remove('is-playing');
                            }
                            
                            activePlayBtn = null; 
                            return;
                        }
                    } else {
                        const timeLeft = currentPlayer.duration - currentPlayer.currentTime;
                        
                        if (timeLeft <= currentCrossfadeTime && !nextSongTriggered) {
                            nextSongTriggered = true; 
                            
                            const naechsteKarte = findeNaechsteKarte(songSnapshotBtn);
                            if (naechsteKarte) {
                                const naechsterTitle = naechsteKarte.querySelector('.song-title-text').innerText;
                                const naechsterArtistEl = naechsteKarte.querySelector('.song-artist-text');
                                const naechsterArtist = naechsterArtistEl ? naechsterArtistEl.innerText : '';
                                
                                window.playPreview(
                                    null, 
                                    naechsterTitle, 
                                    naechsterArtist, 
                                    true,               
                                    isCrossfadeDisabled,
                                    currentCrossfadeTime
                                );
                            }
                        }

                        if (currentPlayer.volume <= 0.05) {
                            if (songSnapshotBtn && songSnapshotBtn.innerText === '⏹️') {
                                songSnapshotBtn.innerText = '▶️';
                                songSnapshotBtn.classList.remove('playing');
                            }
                            if (songSnapshotCard) {
                                songSnapshotCard.classList.remove('is-playing');
                            }
                        }
                    }
                };
            } catch (err) {
                console.error("Fehler beim Lesen des Ordners:", err);
            }
        } else {
            alert("Bitte verknüpfe zuerst einen Ordner über das Ordner-Symbol links neben dem Suchfeld!");
            if (clickedBtn) clickedBtn.innerText = '▶️';
            activePlayBtn = null;
        }
    };
</script>

<script>
    const folderColors = ['var(--f-none)', 'var(--f-blue)', 'var(--f-red)', 'var(--f-green)', 'var(--f-gold)'];
    let blocklistMasterSortable;
    let currentUser = 'dj1'; 
    let expandedBlockIds = new Set(); 
    let currentDiffFilter = 'all'; 

    let diffCollapsedState = { 'onlyMarc': false, 'onlyGunnar': false };

    let userStates = {
        'dj1': { isLocked: true, editMode: false, allCollapsed: true, cleanMode: false },
        'dj2': { isLocked: true, editMode: false, allCollapsed: true, cleanMode: false },
        'diff': { isLocked: true, editMode: false, allCollapsed: false }
    };

    window.addEventListener('click', function(e) {
        const dropdown = document.getElementById('save-dropdown');
        const saveBtn = document.getElementById('header-btn-save');
        
        if (dropdown && dropdown.classList.contains('active')) {
            if (!dropdown.contains(e.target) && !saveBtn.contains(e.target)) {
                dropdown.classList.remove('active');
            }
        }
    });

    window.toggleDropdown = function() {
        if (currentUser === 'diff') {
            alert("Im Differenz-Modus können keine Sets gespeichert oder geladen werden.");
            return;
        }
        const dropdown = document.getElementById('save-dropdown');
        
        if (!dropdown.classList.contains('active')) {
            if (typeof window.loadSavedTemplatesList === 'function') {
                window.loadSavedTemplatesList(); 
            }
        }
        dropdown.classList.toggle('active');
    };

    window.headerActionLeft = function() {
        if (currentUser === 'diff') {
            if(confirm("Möchtest du die Setlisten jetzt als PDF exportieren?\nEs wird eine Datei mit 3 getrennten Seiten erstellt.")) {
                window.generatePDFExport();
            }
        } else {
            userStates[currentUser].editMode = !userStates[currentUser].editMode;
            window.applyUserStatesToUI();
        }
    };

    window.headerActionRight = function() {
        if (currentUser === 'diff') {
            const marcSection = document.getElementById('onlyMarc');
            const gunnarSection = document.getElementById('onlyGunnar');
            
            let targetCollapse = false;
            if (marcSection) {
                targetCollapse = !marcSection.classList.contains('collapsed');
            } else if (gunnarSection) {
                targetCollapse = !gunnarSection.classList.contains('collapsed');
            }
            
            ['onlyMarc', 'onlyGunnar'].forEach(id => {
                const section = document.getElementById(id);
                if (section) {
                    const header = section.previousElementSibling;
                    const icon = header.querySelector('.collapse-icon');
                    
                    if (targetCollapse) {
                        section.classList.add('collapsed');
                        if (icon) icon.style.transform = "rotate(-90deg)";
                        diffCollapsedState[id] = true;
                    } else {
                        section.classList.remove('collapsed');
                        if (icon) icon.style.transform = "rotate(0deg)";
                        diffCollapsedState[id] = false;
                    }
                }
            });

            window.toggleAllBlocks();
        }

    function initMasterSortables() {
    const el1 = document.getElementById('dj1-list');
    const el2 = document.getElementById('dj2-list');

    // Alte Instanzen zerstören, falls sie existieren
    if (window.sortableDJ1) window.sortableDJ1.destroy();
    if (window.sortableDJ2) window.sortableDJ2.destroy();
    
    // Nur DJ1 und DJ2 dürfen sortieren, 'diff' (Zuschauer) nicht
    if (currentUser === 'diff') return;

    const sortableOptions = {
        group: 'shared-list', // Beide müssen die gleiche Gruppe haben, um zwischen den Listen zu wechseln!
        animation: 150, 
        handle: '.drag-handle, .song-details', 
        ghostClass: 'sortable-ghost',
        disabled: userStates[currentUser].isLocked, 
        onEnd: function(evt) {
            // WICHTIG: Besitzer im DOM sofort aktualisieren!
            // Wenn man einen Block verschiebt, gehört er jetzt dem aktiven User (bzw. 
            // man könnte hier auch logisch prüfen, in welcher Liste er gelandet ist)
            evt.item.setAttribute('data-owner', currentUser);
            
            // Erst danach speichern
            window.saveData(); 
        },
        onMove: function (evt) {
            const isDraggingBlock = evt.dragged.classList.contains('block-item');
            const targetIsNested = evt.to.classList.contains('block-sortable-list');

            // Verhindert, dass Blöcke in andere Blöcke geschoben werden
            if (isDraggingBlock && targetIsNested) {
                return false;
            }
        }
    };

    // Initialisierung für BEIDE Container
    if (el1) window.sortableDJ1 = new Sortable(el1, sortableOptions);
    if (el2) window.sortableDJ2 = new Sortable(el2, sortableOptions);
}

    window.deleteItem = async function(id) {
    if (!id) {
        console.warn("Löschen abgebrochen: Keine ID übergeben.");
        return;
    }
    
    console.log("Lösche Element mit ID:", id);
    
    // Sicherheit: Fallback auf leere Arrays, falls Daten noch nicht geladen sind
    const list1 = window.dataDJ1 || [];
    const list2 = window.dataDJ2 || [];

    let targetDoc = null;
    let newData = null;

    // Suche in DJ1
    if (list1.find(item => item.id === id)) {
        targetDoc = "set1_dj1";
        newData = list1.filter(item => item.id !== id);
    } 
    // Suche in DJ2
    else if (list2.find(item => item.id === id)) {
        targetDoc = "set1_dj2";
        newData = list2.filter(item => item.id !== id);
    }

    // Wenn gefunden: Datenbank-Update
    if (targetDoc && newData) {
        try {
            await updateDoc(doc(db, "mojoblox", targetDoc), {
                blocklist: newData
            });
            console.log("Erfolgreich aus DB gelöscht.");
        } catch (error) {
            console.error("Fehler beim Löschen:", error);
            alert("Löschen fehlgeschlagen: " + error.message);
        }
    } else {
        console.warn("Element mit ID", id, "wurde in den globalen Daten nicht gefunden.");
    }
};

    function renderCombinedUI() {
    const bContainer = document.getElementById('blocklist-container');
    if (!bContainer) return;

    // 1. Daten sicher abrufen
    const list1 = (Array.isArray(window.dataDJ1) && window.dataDJ1.length > 0) 
                  ? window.dataDJ1 
                  : (window.lastKnownDJ1 || []);
                  
    const list2 = (Array.isArray(window.dataDJ2) && window.dataDJ2.length > 0) 
                  ? window.dataDJ2 
                  : (window.lastKnownDJ2 || []);

    // 2. HIER WIRD 'combined' DEFINIERT! (Das fehlte in deinem Snippet)
    const combined = [...list1, ...list2];

    console.log("RENDER DEBUG: DJ1(Global):", list1.length, "DJ2(Global):", list2.length, "Combined:", combined.length);

    bContainer.innerHTML = '';
    const renderedFingerprints = new Set();

    // 3. Sicherheits-Check: Ist die Liste leer?
    if (combined.length === 0) {
        console.log("Render-Abbruch: Keine Daten zum Anzeigen.");
        return;
    }

    combined.forEach((item) => {

                const songKey = `${(song.title || song.t || "").toLowerCase()}-${(song.artist || song.a || "").toLowerCase()}`.replace(/\s+/g, '');
                if (seenInBlock.has(songKey)) return false;
                seenInBlock.add(songKey);
                return true;
            });

        } else if (item.type === 'single') {
            const singleEl = document.createElement('div');
            singleEl.className = 'block-item single-song-card'; 
            singleEl.setAttribute('data-id', item.id || 'no-id');
            singleEl.setAttribute('data-owner', item.createdBy || 'dj1');
            
            // --- HIER DIE ÄNDERUNG ---
            // Wir prüfen, ob eine ID da ist. Wenn nicht, zeigen wir kein "X" an.
            const deleteButtonHtml = item.id 
                ? `<button onclick="deleteItem('${item.id}')" class="btn-sm">❌</button>`

window.saveData = async () => {

    if (!window.isAppReady) {
        console.warn("SICHERHEIT: Speichern abgebrochen: App ist noch nicht bereit.");
        return;
    }

    if (currentUser === 'diff') return;

    // 2. DOM lesen: Wir suchen jetzt in BEIDEN Listen nach .block-item
    const elements = document.querySelectorAll('#dj1-list .block-item, #dj2-list .block-item');
    
    // 3. SICHERHEIT: Wenn wir absolut gar keine Elemente finden, könnte ein Ladefehler vorliegen.
    // Aber Achtung: Wenn du bewusst eine leere Liste speichern willst, wäre das hier zu streng.
    // Falls das UI bei dir "Lade Daten..." zeigt, schützt uns isAppReady oben.
    if (elements.length === 0 && window.isAppReady) {
        console.warn("HINWEIS: Keine Elemente gefunden, speichere leere Liste.");
    }

    const allItems = [...(window.dataDJ1 || []), ...(window.dataDJ2 || [])];
    const itemMap = new Map(allItems.map(i => [i.id, i]));

    const myFilteredList = [];

    elements.forEach(el => {
        const owner = el.getAttribute('data-owner');
        const id = el.getAttribute('data-id');

        // Wir sammeln nur die Items, die dem aktuellen User gehören
        if (owner === currentUser) {
            const originalItem = itemMap.get(id);
            if (originalItem) {
                myFilteredList.push(originalItem);
            }
        }
    });

    const docName = currentUser === 'dj1' ? "set1_dj1" : "set1_dj2";
    
    try {
        await setDoc(doc(db, "mojoblox", docName), {
            blocklist: myFilteredList,
            timestamp: Date.now()
        });
        console.log(`Daten für ${currentUser} wurden erfolgreich in Firebase gespeichert.`);
    } catch (e) {
        console.error("Fehler beim Speichern:", e);
    }
};

    // --- 3. BUILD DATA (MIT OWNER-ERKENNUNG) ---

    window.buildCurrentData = () => {
        const container = document.getElementById('blocklist-container');
        const data = { blocklist: [], timestamp: Date.now() };
        
        container.childNodes.forEach(node => {
            if(node.nodeType !== 1) return;
            
            if(node.classList.contains('block-item')) {
                // Wer ist der Besitzer laut CSS Klasse?
                let owner = node.classList.contains('owner-gunnar') ? 'dj2' : 'dj1';

                const list = node.querySelector('.block-sortable-list');
                const songObjects = Array.from(list.querySelectorAll('.song-card')).map(card => {
                    const details = card.querySelector('.song-details');
                    const isOff = card.querySelector('.crossfade-toggle-btn').classList.contains('disabled');
                    const cfTime = isOff ? 0 : (parseInt(card.querySelector('.crossfade-time-display').innerText) || 5);
                    return { 
                        title: details.querySelector('.song-title-text').innerText, 
                        artist: details.querySelector('.song-artist-text')?.innerText || '',
                        cf: cfTime
                    };
                });

                const titleEl = node.querySelector('strong');
                let rawTitle = titleEl.innerText;
                const countSpan = titleEl.querySelector('.block-song-count');
                if (countSpan) rawTitle = rawTitle.replace(countSpan.innerText, '').trim();

                data.blocklist.push({ 
                    type: 'block', 
                    id: node.id, 
                    t: rawTitle, 
                    s: songObjects, 
                    cIdx: node.dataset.colorIndex || 0,
                    createdBy: owner 
                });

            } else if(node.classList.contains('song-card')) {
                const details = node.querySelector('.song-details');
                const isOff = node.querySelector('.crossfade-toggle-btn').classList.contains('disabled');
                const cfTime = isOff ? 0 : (parseInt(node.querySelector('.crossfade-time-display').innerText) || 5);
                data.blocklist.push({ 
                    type: 'single', 
                    title: details.querySelector('.song-title-text').innerText,
                    artist: details.querySelector('.song-artist-text')?.innerText || '',

        });

    function extractAllSongsWithMetadata(blocklist) {
        let songs = [];
        if (!blocklist) return songs;
        blocklist.forEach(item => {
            if (item.type === 'block' && item.s) {
                item.s.forEach(song => {
                    const sTitle = (typeof song === 'string') ? song : (song.title || '');
                    const sArtist = (typeof song === 'object' && song.artist) ? song.artist : '';
                    songs.push({ title: sTitle, artist: sArtist, parentType: 'block' });
                });
            }
            if (item.type === 'single' && item.title) {
                songs.push({ title: item.title, artist: item.artist || '', parentType: 'single' });
            }
        });
        return songs;
    }

    const bContainerForPopup = document.getElementById('blocklist-container');
    const popup = document.getElementById('crossfade-popup');
    const popupVal = document.getElementById('popup-val-display');
    const guide = document.getElementById('vertical-guide');
    const guideMarker = document.getElementById('guide-marker');
    
    let isDragging = false;
    let startY = 0;
    let currentCardForPopup = null;
    let guideLeftPos = 0; // Merken uns die X-Position der Leiste

    // Der feste Bereich in Pixeln für die Skala von 0s bis 16s
    const TOTAL_HEIGHT = 200; 

    bContainerForPopup.addEventListener('touchstart', function(e) {
        if (userStates[currentUser].editMode) return;
        
        const cfGroup = e.target.closest('.crossfade-btn-group');
        if (!cfGroup) return;
        
        const cardElement = cfGroup.closest('.song-card');
        const display = cardElement.querySelector('.crossfade-time-display');
        currentCardForPopup = cardElement;

        const touch = e.touches[0];
        
        longPressTimer = setTimeout(() => {
            isDragging = true;
            
            let currentVal = parseInt(display.innerText) || DEFAULT_CROSSFADE;
            
            // Scrollen der Seite für die Dauer des Slidens blockieren
            document.body.classList.add('lock-scroll');
            
            // Führungslinie links neben der Button-Gruppe positionieren
            const groupRect = cfGroup.getBoundingClientRect();
            guideLeftPos = groupRect.left - 20;
            
            guide.style.left = guideLeftPos + 'px'; 
            guide.style.top = (touch.clientY - (TOTAL_HEIGHT / 2)) + 'px';
            guide.style.height = TOTAL_HEIGHT + 'px';
            
            // Berechnen, wo der Marker anhand des aktuellen Wertes stehen muss
            const percent = 100 - (currentVal / 16 * 100);
            guideMarker.style.top = percent + '%';
            
            // Die Start-Y Position für die Wisch-Berechnung kalibrieren
            startY = touch.clientY + (percent - 50) * (TOTAL_HEIGHT / 100);
            
            guide.classList.add('active');
            
            // Popup FEST links neben der Leiste andocken (auf Höhe des Fingers)
            popup.style.left = guideLeftPos + 'px';
            popup.style.top = touch.clientY + 'px';
            popupVal.innerText = currentVal + 's';
            popup.classList.add('active');
            
            if (window.navigator.vibrate) window.navigator.vibrate(50);
        }, 600); 
    }, { passive: true });

    bContainerForPopup.addEventListener('touchmove', function(e) {
        if (!isDragging) {
            clearTimeout(longPressTimer);
            return;
        }
        
        const touch = e.touches[0];
        
        // Das Popup bleibt auf der X-Achse der Leiste, folgt auf der Y-Achse aber dem Finger
        popup.style.left = guideLeftPos + 'px';
        popup.style.top = touch.clientY + 'px';
        
        const diffY = startY - touch.clientY; 
        
        // Prozentuale Position auf der Leiste berechnen (0 bis 100)
        let percent = 50 - ((diffY / TOTAL_HEIGHT) * 100);
        if (percent < 0) percent = 0;
        if (percent > 100) percent = 100;
        
        guideMarker.style.top = percent + '%';
        
        // Wert anhand der Prozent-Position auf der Skala ermitteln
        let newVal = 16 - Math.round((percent / 100) * 16);
        
        if (newVal < 0) newVal = 0;
        if (newVal > 16) newVal = 16;
        
        popupVal.innerText = newVal + 's';
        
        if (currentCardForPopup) {
            const display = currentCardForPopup.querySelector('.crossfade-time-display');
            const toggleBtn = currentCardForPopup.querySelector('.crossfade-toggle-btn');
            if (display) display.innerText = newVal + 's';
            
            if (toggleBtn) {
                if (newVal === 0) {
                    toggleBtn.classList.add('disabled');
                } else {
                    toggleBtn.classList.remove('disabled');
                }
            }
        }
    }, { passive: true });

    bContainerForPopup.addEventListener('touchend', () => {
        clearTimeout(longPressTimer);
        if (isDragging) {
            isDragging = false;
            popup.classList.remove('active');
            guide.classList.remove('active');
            
            document.body.classList.remove('lock-scroll');
            
            window.saveData(); 
            currentCardForPopup = null;
        }
    });

    bContainerForPopup.addEventListener('touchcancel', () => {
        clearTimeout(longPressTimer);
        if (isDragging) {
            isDragging = false;
            popup.classList.remove('active');
            guide.classList.remove('active');
            
            document.body.classList.remove('lock-scroll');
            
            currentCardForPopup = null;
        }
    });



</script>

</body>
</html>
