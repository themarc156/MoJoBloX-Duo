<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MoJoBloX Duo</title>

    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/png" href="icon.png">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" crossorigin="anonymous"></script>

    <style>
        :root {
            --bg-color: #121212;
            --accent-color: #00adb5;
            --lock-color: #ff4d4d;
            --text-color: #eeeeee;
            --card-bg: #2a2a2a;
            --delete-red: #ff4d4d;
            --f-none: #1e1e1e; --f-blue: #0a2647; --f-red: #4a0e0e; --f-green: #0e3a1a; --f-gold: #3d3000;
            --safe-track-color: #00adb5;
            --dj2-color: #ffaa00;
            --success-green: #2ecc71;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-color); color: var(--text-color); margin: 0; user-select: none; touch-action: pan-y; overflow-x: hidden; padding-bottom: 70px; }

        header { 
            display: grid; grid-template-columns: 1fr auto 1fr; align-items: center;
            background: #222; padding: 12px; border-bottom: 2px solid var(--accent-color); 
            text-align: center; font-weight: bold; color: var(--accent-color); 
            position: sticky; top: 0; z-index: 1002; transition: border-color 0.3s;
        }

        .header-left-group, .header-right-group { display: flex; gap: 8px; align-items: center; }
        .header-left-group { justify-content: flex-start; }
        .header-right-group { justify-content: flex-end; }
        
        .header-btn {
            font-size: 18px; cursor: pointer; padding: 5px; background: #333;
            border-radius: 5px; border: 1px solid var(--accent-color);
            display: flex; align-items: center; justify-content: center;
        }

        .page { padding: 12px; } 
        
        .input-section { 
            display: flex; gap: 8px; margin-bottom: 10px; position: sticky; 
            top: 48px; z-index: 1001; background: var(--bg-color); padding: 8px 0; 
        }
        
        input[type="text"] { padding: 10px; border-radius: 6px; border: 1px solid #444; background: #252525; color: white; flex-grow: 1; }
        .btn-plus { background: var(--accent-color); color: white; border: none; width: 45px; border-radius: 6px; font-weight: bold; font-size: 22px; }

        .btn-folder-select {
            background: #252525; color: #aaa; border: 1px solid #444; width: 45px;
            border-radius: 6px; display: flex; align-items: center; justify-content: center;
        }
        .btn-folder-select.active { border-color: var(--success-green); color: var(--success-green); }

        .btn-add-block { 
            background: #1e1e1e; color: var(--accent-color); border: 1px solid var(--accent-color); 
            padding: 10px; border-radius: 8px; width: 100%; font-weight: bold; margin-bottom: 15px;
        }

        .song-card { 
            background: var(--card-bg); margin-bottom: 4px; padding: 10px 12px; border-radius: 6px; 
            display: flex; justify-content: space-between; align-items: center; font-size: 0.95rem; 
            border: 1px solid rgba(255,255,255,0.05); cursor: grab; 
        }
        
        .song-details { display: flex; flex-direction: column; flex-grow: 1; overflow: hidden; }
        .song-title-text { font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .song-artist-text { font-size: 0.75rem; color: #aaa; }

        body.user-dj1 .song-card.match-found { border: 1.5px solid var(--safe-track-color); }
        body.user-dj2 .song-card.match-found { border: 1.5px solid var(--dj2-color); }
        
        .block-item { margin-bottom: 4px; border-radius: 8px; overflow: hidden; }
        .block-header { padding: 8px 12px; display: flex; justify-content: space-between; align-items: center; }
        .block-header strong { font-size: 1rem; flex-grow: 1; cursor: pointer; }
        .block-content { padding: 8px; }
        .block-item.collapsed .block-content { display: none; }
        
        .collapse-icon { transition: transform 0.3s; margin-right: 12px; transform: rotate(-90deg); }
        .block-item:not(.collapsed) .collapse-icon { transform: rotate(0deg); }

        .delete-btn { display: none; color: var(--delete-red); cursor: pointer; font-size: 24px; padding: 0 10px; }
        body.edit-mode .delete-btn { display: inline-block; }
        
        .color-dot { display: none; width: 20px; height: 20px; border-radius: 50%; border: 1px solid #fff; cursor: pointer; }
        body.edit-mode .color-dot { display: block; }

        .play-preview-btn { color: var(--accent-color); cursor: pointer; font-size: 18px; padding: 5px 10px; }
        body.edit-mode .play-preview-btn, body.user-diff .play-preview-btn { display: none; }

        footer {
            position: fixed; bottom: 0; left: 0; right: 0; background: #1a1a1a; 
            display: flex; justify-content: space-around; padding: 10px; z-index: 1003;
        }
        .footer-btn {
            background: #252525; color: #aaa; border: 1px solid #444; padding: 6px;
            border-radius: 12px; font-size: 0.85rem; cursor: pointer; min-width: 80px; text-align: center;
        }
        .footer-btn.active { background: var(--accent-color); color: white; }

        .crossfade-btn-group { display: flex; align-items: center; gap: 4px; background: rgba(0,0,0,0.2); padding: 4px 8px; border-radius: 4px; margin-right: 8px; }
        .crossfade-toggle-btn { color: #FF5500; cursor: pointer; }
        .crossfade-toggle-btn.disabled { opacity: 0.3; filter: grayscale(1); }
        .crossfade-time-display { font-size: 0.75rem; color: #ccc; min-width: 25px; text-align: center; }

        .crossfade-popup-slider {
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
            background: #252525; padding: 15px; border-radius: 10px; border: 1px solid var(--accent-color);
            z-index: 2000; display: none; flex-direction: column; width: 240px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .crossfade-popup-slider.active { display: flex; }

        .dropdown-menu {
            display: none; position: absolute; top: 40px; left: 0; background: #252525;
            border: 1px solid var(--accent-color); border-radius: 6px; z-index: 2000; min-width: 200px;
        }
        .dropdown-menu.active { display: block; }
        .dropdown-item { padding: 10px; border-bottom: 1px solid #333; cursor: pointer; display: flex; justify-content: space-between; }

        #pdf-template { display: none; color: #000; background: #fff; padding: 20px; }
        .diff-section-header { opacity: 0.7; margin-top: 15px; display: flex; align-items: center; font-weight: bold; }
        .diff-takeover-btn { background: #333; color: var(--accent-color); border: 1px solid var(--accent-color); border-radius: 4px; padding: 2px 8px; }
    </style>
</head>
<body>

<header>
    <div class="header-left-group">
        <div class="header-btn" id="header-btn-left" onclick="headerActionLeft()">✏️</div>
        <div class="header-btn" id="header-btn-save" onclick="window.toggleDropdown()">💾</div>
        <div class="dropdown-menu" id="save-dropdown">
            <div class="dropdown-item" onclick="saveCurrentAsTemplate()" style="color:var(--accent-color)">📥 Set speichern</div>
            <div id="saved-lists-container"></div>
        </div>
    </div>
    <div class="header-title" onclick="toggleLock()">MoJoBloX Duo <span id="lock-icon">🔒</span></div>
    <div class="header-right-group">
        <div class="header-btn" id="header-btn-eye" onclick="toggleCleanMode()">👁️</div>
        <div class="header-btn" onclick="headerActionRight()">↕️</div>
    </div>
</header>

<div class="page">
    <div class="input-section" id="ui-input-section">
        <div class="btn-folder-select" id="btn-folder-select" onclick="window.triggerFolderSelection()">📁</div>
        <input type="text" id="blocklistInputGlobal" placeholder="Song hinzufügen...">
        <button class="btn-plus" onclick="addSongToTopList()">+</button>
    </div>
    <button class="btn-add-block" id="ui-add-block-btn" onclick="addNewBlockPrompt()">+ NEUER BLOCK</button>
    <div id="takeover-infozone" style="display:none; text-align:center; color:var(--accent-color); padding:10px;">TIPPE AUF (+), UM SONGS ZU ÜBERNEHMEN</div>
    <div id="blocklist-container">Lade Cloud-Daten...</div>
</div>

<div id="crossfade-popup" class="crossfade-popup-slider">
    <div style="display:flex; justify-content:space-between; margin-bottom:10px;">Zeit: <span id="popup-val-display">20s</span></div>
    <input type="range" min="5" max="40" value="20" oninput="updateCrossfadeTime(this.value)">
</div>

<div id="pdf-template"></div>

<footer>
    <div class="footer-btn active" id="btn-user1" onclick="switchUser('dj1')">Marc <br><span id="cnt-dj1" style="font-size:10px">0</span></div>
    <div class="footer-btn" id="btn-diff" onclick="switchUser('diff')">??? <br><span id="cnt-diff" style="font-size:10px">0</span></div>
    <div class="footer-btn" id="btn-user2" onclick="switchUser('dj2')">Gunnar <br><span id="cnt-dj2" style="font-size:10px">0</span></div>
</footer>

<script>
    // --- GLOBALE VARIABLEN & AUDIO ---
    let DEFAULT_CROSSFADE = 20;
    let directoryHandle = null;
    let audio1 = new Audio();
    let audio2 = new Audio();
    let currentPlayer = audio1;
    let nextPlayer = audio2;
    let fadeInInterval = null;
    let nextSongTriggered = false;
    let longPressTimer = null;
    let currentlyEditingCard = null;

    // --- CROSSFADE LOGIK ---
    window.updateCrossfadeTime = function(val) {
        document.getElementById('popup-val-display').innerText = val + 's';
        if (currentlyEditingCard) {
            currentlyEditingCard.querySelector('.crossfade-time-display').innerText = val + 's';
            currentlyEditingCard.querySelector('.crossfade-toggle-btn').classList.remove('disabled');
            window.saveData();
        }
    };

    window.showPopup = function(card) {
        currentlyEditingCard = card;
        const currentVal = parseInt(card.querySelector('.crossfade-time-display').innerText);
        document.querySelector('#crossfade-popup input').value = currentVal || DEFAULT_CROSSFADE;
        document.getElementById('popup-val-display').innerText = (currentVal || DEFAULT_CROSSFADE) + 's';
        document.getElementById('crossfade-popup').classList.add('active');
        setTimeout(() => document.getElementById('crossfade-popup').classList.remove('active'), 5000);
    };

    window.setupCrossfadeEvents = function(card) {
        const group = card.querySelector('.crossfade-btn-group');
        group.addEventListener('touchstart', () => {
            longPressTimer = setTimeout(() => window.showPopup(card), 700);
        });
        group.addEventListener('touchend', () => clearTimeout(longPressTimer));
        group.addEventListener('click', (e) => {
            e.stopPropagation();
            const btn = card.querySelector('.crossfade-toggle-btn');
            btn.classList.toggle('disabled');
            window.saveData();
        });
    };

    window.triggerFolderSelection = async function() {
        try {
            directoryHandle = await window.showDirectoryPicker();
            document.getElementById('btn-folder-select').classList.add('active');
        } catch (e) { console.log("Abgebrochen"); }
    };

    // --- PLAYER ---
    window.playPreview = async function(e, title, isAutoplay = false, forcedCf = 20, forcedDisabled = false) {
        if(e) e.stopPropagation();
        
        let cfTime = forcedCf;
        let cfDisabled = forcedDisabled;
        let currentCard = e ? e.currentTarget.closest('.song-card') : null;

        if(currentCard) {
            cfTime = parseInt(currentCard.querySelector('.crossfade-time-display').innerText);
            cfDisabled = currentCard.querySelector('.crossfade-toggle-btn').classList.contains('disabled');
        }

        if(!directoryHandle) return alert("Ordner wählen!");

        try {
            let file = null;
            for await (const entry of directoryHandle.values()) {
                if(entry.name.toLowerCase().includes(title.toLowerCase())) {
                    file = await entry.getFile(); break;
                }
            }
            if(!file) return;

            const url = URL.createObjectURL(file);
            if(isAutoplay) {
                currentPlayer = (currentPlayer === audio1) ? audio2 : audio1;
                currentPlayer.src = url;
                currentPlayer.volume = cfDisabled ? 1 : 0;
                currentPlayer.play();
                if(!cfDisabled) fadeIn(currentPlayer, cfTime);
            } else {
                audio1.pause(); audio2.pause();
                currentPlayer = audio1; currentPlayer.src = url;
                currentPlayer.onloadedmetadata = () => {
                    currentPlayer.currentTime = Math.max(0, currentPlayer.duration - 25);
                    currentPlayer.play();
                };
            }

            nextSongTriggered = false;
            currentPlayer.ontimeupdate = () => {
                const left = currentPlayer.duration - currentPlayer.currentTime;
                if(left <= cfTime && !nextSongTriggered) {
                    nextSongTriggered = true;
                    playNextInLine(currentCard);
                }
            };
        } catch (err) { console.error(err); }
    };

    function fadeIn(p, dur) {
        let v = 0; p.volume = 0;
        const int = setInterval(() => {
            v += 0.05; if(v >= 1) { p.volume = 1; clearInterval(int); } else { p.volume = v; }
        }, (dur * 1000) / 20);
    }

    function playNextInLine(currentCard) {
        const all = Array.from(document.querySelectorAll('.song-card'));
        const idx = all.indexOf(currentCard);
        if(idx !== -1 && idx < all.length - 1) {
            const next = all[idx+1];
            const title = next.querySelector('.song-title-text').innerText;
            window.playPreview(null, title, true);
        }
    }
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc, collection, query, where, getDocs, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyDCZXd7ghAG7CbAwlushzifcCznLslLack", authDomain: "mymojoblox.firebaseapp.com", 
        projectId: "mymojoblox", storageBucket: "mymojoblox.firebasestorage.app", 
        messagingSenderId: "191559552869", appId: "1:191559552869:web:0f212fc5f6fb7338621b8c" 
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let dataDJ1 = { blocklist: [] };
    let dataDJ2 = { blocklist: [] };
    let currentUser = 'dj1';
    let userStates = { dj1: {isLocked: true, editMode: false}, dj2: {isLocked: true, editMode: false}, diff: {isLocked: true} };

    // --- UI FUNKTIONEN ---
    window.switchUser = (u) => {
        currentUser = u;
        document.querySelectorAll('.footer-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-user' + (u==='dj1'?'1':u==='dj2'?'2':'diff')).classList.add('active');
        window.render();
    };

    window.toggleLock = () => {
        userStates[currentUser].isLocked = !userStates[currentUser].isLocked;
        window.render();
    };

    window.headerActionLeft = () => {
        if(currentUser === 'diff') window.generatePDF();
        else { userStates[currentUser].editMode = !userStates[currentUser].editMode; window.render(); }
    };

    // --- CORE RENDERING ---
    window.render = () => {
        const container = document.getElementById('blocklist-container');
        const state = userStates[currentUser];
        document.body.classList.toggle('edit-mode', state.editMode);
        document.getElementById('lock-icon').innerText = state.isLocked ? "🔒" : "🔓";
        
        const activeData = currentUser === 'dj1' ? dataDJ1 : dataDJ2;
        container.innerHTML = '';

        if(currentUser === 'diff') {
            renderDiffView(container);
        } else {
            activeData.blocklist.forEach(item => {
                if(item.type === 'block') renderBlock(container, item);
                else renderSong(container, item);
            });
        }
        updateCounters();
    };

    function renderSong(target, s, isInsideBlock = false) {
        const div = document.createElement('div');
        div.className = 'song-card';
        const cf = s.cf !== undefined ? s.cf : 20;
        const disabled = cf === 0 ? 'disabled' : '';
        
        div.innerHTML = `
            <div class="song-details">
                <span class="song-title-text">${s.title}</span>
                ${s.artist ? `<span class="song-artist-text">${s.artist}</span>` : ''}
            </div>
            <div class="crossfade-btn-group">
                <span class="crossfade-toggle-btn ${disabled}">🔀</span>
                <span class="crossfade-time-display">${cf === 0 ? 20 : cf}s</span>
            </div>
            <span class="play-preview-btn" onclick="window.playPreview(event, '${s.title.replace(/'/g, "\\'")}')">▶️</span>
            <span class="delete-btn" onclick="this.closest('.song-card').remove(); window.saveData();">×</span>
        `;
        window.setupCrossfadeEvents(div);
        target.appendChild(div);
    }

    function renderBlock(target, b) {
        const div = document.createElement('div');
        div.className = 'block-item collapsed';
        div.style.background = b.cIdx ? ['#1e1e1e','#0a2647','#4a0e0e','#0e3a1a','#3d3000'][b.cIdx] : '#1e1e1e';
        div.innerHTML = `
            <div class="block-header">
                <span class="collapse-icon">▼</span>
                <strong onclick="this.closest('.block-item').classList.toggle('collapsed')">${b.t}</strong>
                <span class="delete-btn" onclick="this.closest('.block-item').remove(); window.saveData();">✕</span>
            </div>
            <div class="block-content"></div>
        `;
        const content = div.querySelector('.block-content');
        b.s.forEach(s => renderSong(content, s, true));
        target.appendChild(div);
    }

    function renderDiffView(container) {
        // Differenz-Logik Marc vs Gunnar
        const s1 = dataDJ1.blocklist.flatMap(i => i.type === 'block' ? i.s.map(x=>x.title) : [i.title]);
        const s2 = dataDJ2.blocklist.flatMap(i => i.type === 'block' ? i.s.map(x=>x.title) : [i.title]);
        
        const only1 = dataDJ1.blocklist.filter(i => !s2.includes(i.title));
        const only2 = dataDJ2.blocklist.filter(i => !s1.includes(i.title));

        container.innerHTML = `<div class="diff-section-header">Nur Marc</div>`;
        only1.forEach(s => renderSong(container, s));
        container.innerHTML += `<div class="diff-section-header">Nur Gunnar</div>`;
        only2.forEach(s => renderSong(container, s));
    }

    function updateCounters() {
        document.getElementById('cnt-dj1').innerText = dataDJ1.blocklist.length;
        document.getElementById('cnt-dj2').innerText = dataDJ2.blocklist.length;
    }

    // --- FIREBASE SYNC ---
    onSnapshot(doc(db, "mojoblox", "set1_dj1"), d => { if(d.exists()) dataDJ1 = d.data(); window.render(); });
    onSnapshot(doc(db, "mojoblox", "set1_dj2"), d => { if(d.exists()) dataDJ2 = d.data(); window.render(); });

    window.saveData = async () => {
        const list = [];
        document.querySelectorAll('#blocklist-container > .song-card, #blocklist-container > .block-item').forEach(el => {
            if(el.classList.contains('song-card')) {
                const isOff = el.querySelector('.crossfade-toggle-btn').classList.contains('disabled');
                list.push({ 
                    type: 'single', 
                    title: el.querySelector('.song-title-text').innerText,
                    cf: isOff ? 0 : parseInt(el.querySelector('.crossfade-time-display').innerText)
                });
            } else {
                const songs = Array.from(el.querySelectorAll('.song-card')).map(s => ({
                    title: s.querySelector('.song-title-text').innerText,
                    cf: s.querySelector('.crossfade-toggle-btn').classList.contains('disabled') ? 0 : parseInt(s.querySelector('.crossfade-time-display').innerText)
                }));
                list.push({ type: 'block', t: el.querySelector('strong').innerText, s: songs });
            }
        });
        await setDoc(doc(db, "mojoblox", currentUser === 'dj1' ? "set1_dj1" : "set1_dj2"), { blocklist: list });
    };

    window.addSongToTopList = () => {
        const val = document.getElementById('blocklistInputGlobal').value;
        if(!val) return;
        dataDJ1.blocklist.unshift({ type: 'single', title: val, cf: 20 }); // Beispielhaft für Sync-Trigger
        window.saveData();
        document.getElementById('blocklistInputGlobal').value = '';
    };

</script>
</body>
</html>
