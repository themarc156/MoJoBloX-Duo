<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MoJoBloX Duo</title>

    <link rel="manifest" href="manifest.json">
    
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/png" href="icon.png">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" crossorigin="anonymous"></script>

    <style>
        :root {
            --bg-color: #121212;
            --accent-color: #00adb5;
            --lock-color: #ff4d4d;
            --text-color: #eeeeee;
            --card-bg: #2a2a2a;
            --delete-red: #ff4d4d;
            --f-none: #1e1e1e; --f-blue: #0a2647; --f-red: #4a0e0e; --f-green: #0e3a1a; --f-gold: #3d3000;
            --safe-track-color: #00adb5;
            --dj2-color: #ffaa00;
            --success-green: #2ecc71;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-color); color: var(--text-color); margin: 0; user-select: none; touch-action: pan-y; overflow-x: hidden; padding-bottom: 70px; }

        /* Wenn aktiv, wird das Scrollen der Liste verhindert */
        body.lock-scroll {
            overflow: hidden !important;
            touch-action: none !important;
        }

header { 
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    background: #222; 
    padding: 6px 12px; /* Reduziert von 12px auf 6px */
    border-bottom: 2px solid var(--accent-color); 
    text-align: center; 
    font-weight: bold; 
    color: var(--accent-color); 
    letter-spacing: 1px;
    position: sticky; 
    top: 0;            
    z-index: 1002;     
    transition: border-color 0.3s;
    height: 44px; /* Feste, flache Höhe */
}

        .header-left-group {
            display: flex;
            gap: 8px;
            justify-content: flex-start;
            align-items: center;
            position: relative; 
        }

        .header-title { 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            gap: 10px;
            justify-self: center; 
        }

        .header-right-group {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            align-items: center;
        }
        
        .header-btn {
    font-size: 16px; /* Etwas kleiner */
    cursor: pointer;
    padding: 4px;
    background: #333;
    border-radius: 5px;
    border: 1px solid var(--accent-color);
    display: flex;
    align-items: center;
    justify-content: center;
    width: 28px; /* Kompaktere Buttons */
    height: 28px;
}

        body.edit-mode #header-btn-left { background: var(--accent-color); color: white; }

        .page { padding: 12px; } 
        
        .input-section { 
            display: flex; 
            gap: 8px; 
            margin-bottom: 10px; 
            position: sticky; 
            top: 44px; 
            z-index: 1001; 
            background: var(--bg-color); 
            padding: 8px 0; 
            align-items: center;
        }
        
        input[type="text"] { padding: 10px; border-radius: 6px; border: 1px solid #444; background: #252525; color: white; outline: none; font-size: 16px; flex-grow: 1; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .btn-plus { background: var(--accent-color); color: white; border: none; width: 45px; height: 40px; border-radius: 6px; font-weight: bold; font-size: 22px; cursor: pointer; }

        .btn-folder-select {
            background: #252525;
            color: #aaa;
            border: 1px solid #444;
            width: 45px;
            height: 40px;
            border-radius: 6px;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: all 0.2s;
        }
        .btn-folder-select.active {
            border-color: var(--success-green);
            color: var(--success-green);
            background: #1a2e22;
        }

        .btn-add-block { 
            background: #1e1e1e; 
            color: var(--accent-color); 
            border: 1px solid var(--accent-color); 
            padding: 10px; 
            border-radius: 8px; 
            width: 100%; 
            font-weight: bold; 
            margin-bottom: 15px; 
            cursor: pointer;
            position: sticky; 
            top: 92px; 
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .song-card { 
    background: var(--card-bg); 
    margin-bottom: 2px; /* Von 4px auf 2px reduziert */
    padding: 4px 10px;  /* Deutlich weniger Padding (oben/unten 4px) */
    border-radius: 4px; 
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
    font-size: 0.85rem; /* Etwas kleinere Grundschrift */
    border: 1px solid rgba(255,255,255,0.05); 
    cursor: grab; 
    min-height: 28px;   /* Flachere Mindesthöhe */
    position: relative; 
}
        .song-card:active { cursor: grabbing; }

.song-details {
    display: flex;
    flex-direction: column;
    gap: 0px; /* Abstand zwischen Titel und Interpret entfernt */
    flex-grow: 1;
    overflow: hidden;
    padding-right: 10px; 
}

        .song-title-text {
    font-weight: bold;
    font-size: 0.9rem;
    line-height: 1.2;
}

.song-artist-text {
    font-size: 0.7rem; /* Interpret noch ein Stück kleiner */
    color: #999;
    line-height: 1.1;
}
        body.edit-mode .song-details { cursor: pointer; }
        body.edit-mode .song-details:hover .song-title-text { text-decoration: underline dotted var(--accent-color); }

        body.user-dj1 .song-card.match-found { border: 1.5px solid var(--safe-track-color) !important; box-shadow: 0 0 5px rgba(0, 173, 181, 0.3); }
        body.user-dj2 .song-card.match-found { border: 1.5px solid var(--dj2-color) !important; box-shadow: 0 0 5px rgba(255, 170, 0, 0.3); }
        
        .color-dot { width: 24px; height: 24px; border-radius: 50%; border: 2px solid #fff; cursor: pointer; }
        .sortable-ghost { opacity: 0.1; background: var(--accent-color) !important; }
        
        #blocklist-container > .song-card { border-left: 4px solid var(--accent-color); }
        body.user-dj2 #blocklist-container > .song-card { border-left: 4px solid var(--dj2-color) !important; }

        .block-item { margin-bottom: 4px; position: relative; border-radius: 8px; overflow: hidden; }
        .block-item.collapsed { background: #1a1a1a !important; }
        .block-item.collapsed .block-header strong { text-decoration: none !important; }
        .block-header { padding: 8px 12px; display: flex; justify-content: space-between; align-items: center; }
        .block-header strong { font-size: 1rem; flex-grow: 1; cursor: pointer; padding: 3px; }
        body.edit-mode .block-header strong { cursor: cell; text-decoration: underline dotted var(--accent-color); }

        .block-song-count { font-size: 0.85rem; opacity: 0.7; margin-left: 4px; font-weight: normal; }
        .block-content { padding: 8px; padding-bottom: 4px; } 
        .block-item.collapsed .block-content { display: none; }
        .block-item:not(.collapsed) .block-content { display: block; }

        .collapse-icon { transition: transform 0.3s; margin-right: 12px; font-size: 1.1rem; cursor: pointer; padding: 3px; transform: rotate(-90deg); }
        .block-item:not(.collapsed) .collapse-icon { transform: rotate(0deg); }
        .block-sortable-list { min-height: 20px; }

        .delete-btn { 
            display: none !important; 
            color: var(--delete-red); 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 24px; 
            padding: 10px 15px; 
            margin: -10px -10px -10px auto; 
            pointer-events: auto !important; 
        }
        body.edit-mode .delete-btn { display: inline-block !important; }
        
        .color-dot { display: none !important; }
        body.edit-mode .color-dot { display: block !important; }

        .play-preview-btn {
            display: inline-block;
            color: var(--accent-color);
            cursor: pointer;
            font-size: 16px;
            padding: 8px 12px;
            margin: -10px auto -10px 5px;
            border-radius: 4px;
            transition: background 0.2s;
            user-select: none;
            -webkit-user-select: none;
        }
        .play-preview-btn:hover {
            background: rgba(255, 255, 255, 0.05);
        }
        .play-preview-btn.playing {
            color: var(--success-green);
        }
        body.edit-mode .play-preview-btn { display: none !important; }
        body.user-diff .play-preview-btn { display: none !important; }

        .drag-handle { cursor: grab; font-size: 18px; color: #666; padding: 5px 8px; margin-left: 12px; }
        .drag-handle:active { cursor: grabbing; }

        footer {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: #1a1a1a; border-top: 1px solid #333;
            display: flex; justify-content: space-around; padding: 10px; z-index: 1003;
        }
        .footer-btn {
            background: #252525; color: #aaa; border: 1px solid #444; padding: 6px 12px;
            border-radius: 15px; font-size: 0.9rem; cursor: pointer; font-weight: bold;
            transition: all 0.2s; min-width: 80px; text-align: center;
            display: flex; flex-direction: column; align-items: center; gap: 2px;
        }
        .footer-btn.active { background: var(--accent-color); color: white; border-color: var(--accent-color); }
        .btn-counter { font-size: 0.7rem; opacity: 0.7; font-weight: normal; }
        .footer-btn.active .btn-counter { opacity: 0.9; }
        
        .safe-tag { 
            color: #fff; 
            font-size: 0.85rem; 
            font-weight: bold; 
            position: absolute;
            right: 155px; 
            top: 50%;
            transform: translateY(-50%);
            white-space: nowrap;
        }

        body.user-dj1 .safe-tag { background: var(--safe-track-color); }
        body.user-dj2 .safe-tag { background: var(--dj2-color); color: #121212; }

        .drop-target-area {
            background: #1e1e1e; border: 2px dashed var(--accent-color); border-radius: 8px;
            padding: 15px; text-align: center; color: var(--accent-color); font-weight: bold; margin-bottom: 15px;
            transition: all 0.3s; position: sticky; top: 48px; z-index: 1001; box-shadow: 0 4px 10px rgba(0,0,0,0.5); 
        }
        
        .song-type-icon { margin-left: auto; margin-right: 10px; opacity: 0.6; font-size: 0.9rem; }
        body.user-diff .song-card { cursor: default !important; user-select: none !important; -webkit-user-drag: none !important; }

        .diff-section-header { display: flex; align-items: center; opacity: 0.7; margin-top: 15px; margin-bottom: 5px; font-size: 0.9rem; cursor: pointer; padding: 4px 0; }
        .diff-section-header .collapse-icon { margin-right: 6px; }
        .diff-section-content { display: block; }
        .diff-section-content.collapsed { display: none; }

        .diff-takeover-btn {
            background: #333; color: var(--accent-color); border: 1px solid var(--accent-color);
            border-radius: 4px; padding: 4px 8px; font-size: 0.8rem; font-weight: bold;
            cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center;
        }
        .diff-takeover-btn:active { transform: scale(0.95); background: var(--accent-color); color: #fff; }

        #pdf-template { display: none; color: #000; background: #fff; padding: 15px; font-family: Arial, sans-serif; }
        #pdf-template h1 { font-size: 20px; border-bottom: 2px solid #000; padding-bottom: 5px; margin-bottom: 10px; }
        #pdf-template h2 { font-size: 15px; margin-top: 15px; border-bottom: 1px solid #999; padding-bottom: 3px; margin-bottom: 8px; color: #333; }
        #pdf-template h3 { font-size: 12px; margin-top: 10px; margin-bottom: 4px; color: #555; text-transform: uppercase; }
        #pdf-template .pdf-page { page-break-before: always; }
        #pdf-template .pdf-page:first-child { page-break-before: auto; }
        
        .pdf-auto-columns { columns: 2; column-gap: 30px; column-fill: auto; height: 240mm; orphans: 1; widows: 1; }
        .pdf-columns-container { display: grid; grid-template-columns: 1fr 1fr; column-gap: 30px; align-items: start; }
        .pdf-song-item { padding: 3px 0; border-bottom: 1px solid #eee; font-size: 12px; color: #333; }
        .pdf-block-title { font-weight: bold; margin-top: 8px; font-size: 13px; text-decoration: underline; color: #000; }
        .pdf-keep-together { break-inside: avoid-column; page-break-inside: avoid; margin-bottom: 10px; }

        body.clean-mode .block-header { display: none !important; }
        body.clean-mode .block-item { background: transparent !important; margin-bottom: 0px; border-radius: 0; overflow: visible; border-bottom: 1px dashed #444; padding-bottom: 6px; margin-top: 6px; }
        body.clean-mode .block-content { padding: 0; }
        body.clean-mode .block-item:last-child { border-bottom: none; }

        .dropdown-menu {
            display: none;
            position: absolute;
            top: 35px;
            left: 0;
            background: #252525;
            border: 1px solid var(--accent-color);
            border-radius: 6px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            z-index: 2000;
            min-width: 190px;
            max-height: 300px;
            overflow-y: auto;
        }
        .dropdown-menu.active { display: block; }
        .dropdown-item {
            padding: 10px 15px;
            font-size: 0.9rem;
            color: #eee;
            cursor: pointer;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .dropdown-item:hover { background: #333; }
        .dropdown-item.action-save { color: var(--accent-color); font-weight: bold; }
        .dropdown-item .delete-saved { color: var(--delete-red); font-size: 1.2rem; padding: 0 5px; }
        .dropdown-item .delete-saved:hover { color: #fff; }

        .crossfade-btn-group {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-left: auto;
            margin-right: 5px;
            background: rgba(255, 255, 255, 0.03);
            padding: 2px 6px;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            user-select: none;
        }
        
        .crossfade-toggle-btn {
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
            color: #FF5500;
            transition: color 0.2s;
            font-size: 14px;
        }
        
        .crossfade-toggle-btn.disabled {
            color: #666 !important;
            opacity: 0.5;
        }

        .crossfade-time-display {
            font-size: 0.75rem;
            font-weight: bold;
            color: #aaa;
            min-width: 24px;
            text-align: center;
            cursor: pointer;
        }

        /* IDEE 1: Senkrechtes Popup am Finger */
                /* IDEE 1: Jetzt fest links neben der Skala positioniert */
        .crossfade-popup-slider {
            position: fixed;
            background: #252525;
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid var(--accent-color);
            z-index: 2000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.15s ease, top 0.05s ease; /* top-transition für flüssiges Mitgleiten */
            transform: translate(-100%, -50%); /* Schiebt das Popup komplett links neben den Ankerpunkt */
            margin-left: -10px; /* Kleiner Abstand zur Linie */
        }
        
        .crossfade-popup-slider.active { opacity: 1; }
        
        .popup-label { font-size: 0.9rem; font-weight: bold; color: #fff; }

        
                /* Senkrechte Führungslinie links vom Button */
        .vertical-scale-guide {
            position: fixed;
            width: 4px;
            background: #444;
            border-radius: 2px;
            z-index: 1999;
            pointer-events: none;
            display: none;
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
        }
        
        .vertical-scale-guide.active { display: block; }
        
        .vertical-scale-marker {
            position: absolute;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--accent-color);
            left: -4px;
            transform: translateY(-50%);
            transition: top 0.1s ease;
        }

        /* AB HIER NEU: Beschriftung der Skala */
        .vertical-scale-guide::before,
        .vertical-scale-guide::after {
            position: absolute;
            left: -35px; /* Schiebt den Text links neben die Linie */
            font-size: 0.75rem;
            font-weight: bold;
            color: #aaa;
            width: 30px;
            text-align: right;
            transform: translateY(-50%);
        }

        .vertical-scale-guide::before {
            content: "16s"; /* Oben an der Leiste */
            top: 0;
        }

        .vertical-scale-guide::after {
            content: "0s"; /* Unten an der Leiste */
            top: 100%;
        }


        body.edit-mode .crossfade-btn-group { display: none !important; }
        body.user-diff .crossfade-btn-group { display: none !important; }

        @keyframes atmen-cyan {
            0% { box-shadow: 0 0 5px rgba(0, 173, 181, 0.4); border-color: var(--accent-color); }
            50% { box-shadow: 0 0 20px rgba(0, 173, 181, 0.9); border-color: #00fff2; }
            100% { box-shadow: 0 0 5px rgba(0, 173, 181, 0.4); border-color: var(--accent-color); }
        }

        @keyframes atmen-orange {
            0% { box-shadow: 0 0 5px rgba(255, 170, 0, 0.4); border-color: var(--dj2-color); }
            50% { box-shadow: 0 0 20px rgba(255, 170, 0, 0.9); border-color: #ffd000; }
            100% { box-shadow: 0 0 5px rgba(255, 170, 0, 0.4); border-color: var(--dj2-color); }
        }

        body.user-dj1 .song-card.is-playing {
            animation: atmen-cyan 2s infinite ease-in-out;
            border: 1px solid var(--accent-color);
        }

        body.user-dj2 .song-card.is-playing {
            animation: atmen-orange 2s infinite ease-in-out;
            border: 1px solid var(--dj2-color);
        }

        /* Container für die Teilung */
/* --- KOMPAKTE AKTIONS-ZEILE (UNTER HEADER) --- */

.split-action-row {
    display: flex;
    gap: 8px;
    padding: 2px 10px;
    background-color: #121212; /* Tiefes Dunkel */
    align-items: center;
    height: 48px; /* Sehr flach und platzsparend */
}

.split-half {
    flex: 1;
    display: flex;
    align-items: center;
}

/* Linker Button: Neuer Block */
.btn-add-block {
    width: 100%;
    height: 32px; /* Einheitliche Höhe */
    background: transparent;
    border: 1px solid #00a0a0;
    color: #00a0a0;
    border-radius: 4px;
    font-size: 10px;
    font-weight: bold;
    cursor: pointer;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* Rechte Seite: Input Gruppe */
.input-section {
    display: flex;
    width: 100%;
    gap: 6px;
    align-items: center;
}

/* Ordner-Button */
.btn-folder-select {
    background: #222;
    border: 1px solid #444;
    height: 32px;
    width: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 4px;
    cursor: pointer;
    font-size: 14px;
}

/* Song Eingabefeld */
#blocklistInputGlobal {
    flex-grow: 1;
    height: 32px;
    background: #1e1e1e;
    border: 1px solid #333;
    color: #ccc;
    padding: 0 8px;
    border-radius: 4px;
    font-size: 13px;
    outline: none;
}

/* Der Plus-Button ganz rechts */
.btn-plus {
    background-color: #00a0a0;
    color: white;
    border: none;
    width: 32px;
    height: 32px;
    border-radius: 4px;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* Der Container, der alle Blöcke hält */
/* --- ZWEI-SPALTEN-LAYOUT FÜR DJ-BLÖCKE --- */
/* --- ZWEI-SPALTEN-LAYOUT: MARC LINKS, GUNNAR RECHTS --- */
#blocklist-container {
    display: grid;
    /* Fest auf 2 Spalten eingestellt - 1fr 1fr sorgt für 50/50 Teilung */
    grid-template-columns: 1fr 1fr; 
    gap: 15px;
    padding: 10px;
    align-items: flex-start;
}

/* Die einzelnen Blöcke (Ordner) */
.block-item {
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 6px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
}

/* Erzwingt, dass Marc-Blöcke in der linken Spalte (1) landen */
.block-item.owner-marc {
    grid-column: 1;
    border-top: 3px solid var(--accent-color);
}

/* Erzwingt, dass Gunnar-Blöcke in der rechten Spalte (2) landen */
.block-item.owner-gunnar {
    grid-column: 2;
    border-top: 3px solid var(--dj2-color);
}

/* Kompakter Block-Header */
.block-header {
    padding: 2px 10px;
    background: rgba(255, 255, 255, 0.05);
    display: flex;
    align-items: center;
    min-height: 30px;
}

.block-header strong {
    font-size: 0.9rem;
    letter-spacing: 0.5px;
}

/* Platzersparnis im Block-Inhalt */
.block-content {
    padding: 4px;
}

/* Mobile Ansicht: Auf dem Handy alles untereinander */
@media (max-width: 768px) {
    #blocklist-container {
        grid-template-columns: 1fr;
    }
    .block-item.owner-marc, 
    .block-item.owner-gunnar {
        grid-column: auto;
    }
}
    </style>
</head>
<body>

<header>
    <div class="header-left-group">
        <div class="header-btn" id="header-btn-left" onclick="headerActionLeft()" title="Aktion links">✏️</div>
        <div class="header-btn" id="header-btn-save" onclick="window.toggleDropdown()" title="Set speichern oder laden">💾</div>
        
        <div class="dropdown-menu" id="save-dropdown">
            <div class="dropdown-item action-save" onclick="saveCurrentAsTemplate()">📥 Aktuelles Set speichern</div>
            <div id="saved-lists-container"></div>
        </div>
    </div>

    <div class="header-title" onclick="toggleLock()">
        MoJoBloX Duo<span id="lock-icon">🔒</span>
    </div>
    
    <div class="header-right-group">
        <div class="header-btn" id="header-btn-eye" onclick="toggleCleanMode()" title="Ansichten filtern">👁️</div>
        <div class="header-btn" id="header-btn-right" onclick="headerActionRight()" title="Auf-/Zuklappen">↕️</div>
    </div>
</header>

<div id="page-blocklist" class="page">

        <div class="split-half">

<script>
    let DEFAULT_CROSSFADE = 8;   
    let directoryHandle = null; 
    let activePlayBtn = null;

    let longPressTimer = null;
    let currentlyEditingSongCard = null; 
    let currentObjectUrl = null; 

    let audio1 = new Audio();
    let audio2 = new Audio();
    let currentPlayer = audio1;
    let nextPlayer = audio2;

    let fadeInInterval = null;
    let nextSongTriggered = false; 
    

window.dataDJ1 = []; 
window.dataDJ2 = [];
window.lastKnownDJ1 = [];
window.lastKnownDJ2 = [];

    window.toggleCrossfadeState = function(cardElement) {
        const toggleBtn = cardElement.querySelector('.crossfade-toggle-btn');
        const display = cardElement.querySelector('.crossfade-time-display');
        
        if (!toggleBtn || !display) return;

        if (toggleBtn.classList.contains('disabled')) {
            toggleBtn.classList.remove('disabled');
            let sVal = parseInt(display.innerText);
            if (sVal === 0) display.innerText = DEFAULT_CROSSFADE + 's';
        } else {
            toggleBtn.classList.add('disabled');
            display.innerText = '0s';
        }
        window.saveData();
    };

    window.setupCrossfadeEvents = function(cardElement) {
        const cfGroup = cardElement.querySelector('.crossfade-btn-group');
        if (!cfGroup) return;

        cfGroup.addEventListener('click', (e) => {
            e.stopPropagation();
            if (longPressTimer) clearTimeout(longPressTimer);
            window.toggleCrossfadeState(cardElement);
        });
    };

// In deiner Render-Funktion für die Blöcke:
function renderBlocks() {
    const container = document.getElementById('blocklist-container');
    if (!container) return;
    container.innerHTML = '';

    allBlocks.forEach((block, index) => {
        const blockDiv = document.createElement('div');
        
        // Bestimmung der Klasse basierend auf dem Ersteller
        // Falls 'createdBy' nicht existiert, wird standardmäßig Marc (dj1) genommen
        const userClass = (block.createdBy === 'dj2') ? 'owner-gunnar' : 'owner-marc';
        
        // Klassen zuweisen (inkl. collapsed-Status, falls vorhanden)
        blockDiv.className = `block-item ${userClass} ${block.collapsed ? 'collapsed' : ''}`;
        blockDiv.dataset.index = index; // Wichtig für spätere Zuordnung

        // --- HIER FOLGT DEIN BESTEHENDER CODE FÜR HEADER & SONGS ---
        // Beispielhaft:
        // const header = createBlockHeader(block, index); 
        // const content = createBlockContent(block, index);
        // blockDiv.appendChild(header);
        // blockDiv.appendChild(content);
        
        container.appendChild(blockDiv);
    });
}

    window.triggerFolderSelection = async function() {
        const btn = document.getElementById('btn-folder-select');
        try {
            directoryHandle = await window.showDirectoryPicker();
            btn.classList.add('active');
            alert("Ordner erfolgreich verknüpft! Die Übergänge funktionieren nun mit deinen lokalen Dateien.");
        } catch (err) {
            console.log("Ordnerauswahl abgebrochen oder nicht unterstützt.", err);
            btn.classList.remove('active');
        }
    };

    function findeNaechsteKarte(aktuellerButton) {
        const aktuelleKarte = aktuellerButton.closest('.song-card');
        if (!aktuelleKarte) return null;

        const container = document.getElementById('blocklist-container');
        const alleElemente = Array.from(container.children);
        const alleSongKarten = [];
        
        alleElemente.forEach(element => {
            if (element.classList.contains('song-card')) {
                alleSongKarten.push(element);
            } else if (element.classList.contains('block-item')) {
                const songsImBlock = element.querySelectorAll('.block-sortable-list .song-card');
                songsImBlock.forEach(song => alleSongKarten.push(song));
            }
        });

        const aktuellerIndex = alleSongKarten.indexOf(aktuelleKarte);
        
        if (aktuellerIndex !== -1 && aktuellerIndex < alleSongKarten.length - 1) {
            return alleSongKarten[aktuellerIndex + 1];
        }
        return null; 
    }

    function fadeInPlayer(player, durationSec) {
        if (fadeInInterval) clearInterval(fadeInInterval);
        
        player.volume = 0;
        player.play().catch(e => console.log("Autoplay blockiert oder Datei defekt."));

        const step = 0.02; 
        const intervalTime = (durationSec * 1000) * step; 
        
        fadeInInterval = setInterval(() => {
            if (player.volume < 1 - step) {
                player.volume += step;
            } else {
                player.volume = 1;
                clearInterval(fadeInInterval);
            }
        }, intervalTime);
    }

    window.playPreview = async function(e, title, artist = '', isAutoplayNext = false, forceDisabled = false, forcedCfTime = 8) {
        if (e) e.stopPropagation(); 
        let clickedBtn = e ? e.currentTarget : null;
        let currentCard = clickedBtn ? clickedBtn.closest('.song-card') : null;

        if (isAutoplayNext && !clickedBtn) {
            const alleKarten = document.querySelectorAll('.song-card');
            for (let karte of alleKarten) {
                const titleText = karte.querySelector('.song-title-text').innerText;
                if (titleText === title) {
                    currentCard = karte;
                    clickedBtn = karte.querySelector('.play-preview-btn');
                    break;
                }
            }
        }

        if (!isAutoplayNext && activePlayBtn === clickedBtn) {
            audio1.pause(); audio1.src = ''; audio1.volume = 1;
            audio2.pause(); audio2.src = ''; audio2.volume = 1;
            audio1.ontimeupdate = null; audio2.ontimeupdate = null;
            audio1.onended = null; audio2.onended = null;
            audio1.onloadedmetadata = null; audio2.onloadedmetadata = null;
            if (fadeInInterval) clearInterval(fadeInInterval);
            
            if (currentObjectUrl) { URL.revokeObjectURL(currentObjectUrl); currentObjectUrl = null; }
            
            clickedBtn.innerText = '▶️';
            clickedBtn.classList.remove('playing');
            if (currentCard) currentCard.classList.remove('is-playing');
            
            activePlayBtn = null;
            return;
        }

        if (activePlayBtn && activePlayBtn !== clickedBtn) {
            activePlayBtn.innerText = '▶️';
            activePlayBtn.classList.remove('playing');

            const oldCard = activePlayBtn.closest('.song-card');
            if (oldCard) oldCard.classList.remove('is-playing');
        }

        if (clickedBtn) {
            clickedBtn.innerText = '⏳'; 
            activePlayBtn = clickedBtn;
        }

        let currentCrossfadeTime = isAutoplayNext ? forcedCfTime : DEFAULT_CROSSFADE;
        let isCrossfadeDisabled = isAutoplayNext ? forceDisabled : false;

        if (!isAutoplayNext && currentCard) {
            const timeDisplay = currentCard.querySelector('.crossfade-time-display');
            const toggleBtn = currentCard.querySelector('.crossfade-toggle-btn');
            
            if (timeDisplay) currentCrossfadeTime = parseInt(timeDisplay.innerText) || 0;
            if (toggleBtn && toggleBtn.classList.contains('disabled')) {
                isCrossfadeDisabled = true;
            }
        }
        
        if (currentCrossfadeTime === 0) currentCrossfadeTime = 5; 
        if (currentCrossfadeTime > 20) currentCrossfadeTime = 20; 

        if (directoryHandle) {
            try {
                const searchName = title.toLowerCase().trim();
                let fileToPlay = null;

                for await (const entry of directoryHandle.values()) {
                    if (entry.kind === 'file') {
                        const lowerName = entry.name.toLowerCase();
                        if (lowerName.includes(searchName) && (lowerName.endsWith('.mp3') || lowerName.endsWith('.m4a'))) {
                            fileToPlay = await entry.getFile();
                            break;
                        }
                    }
                }

                if (!fileToPlay) {
                    alert(`Datei für "${title}" wurde im Ordner nicht gefunden.`);
                    if (clickedBtn) clickedBtn.innerText = '▶️';
                    if (currentCard) currentCard.classList.remove('is-playing');
                    activePlayBtn = null;
                    return;
                }

                if (!isAutoplayNext && currentObjectUrl) {
                    URL.revokeObjectURL(currentObjectUrl);
                }

                const url = URL.createObjectURL(fileToPlay);
                currentObjectUrl = url;

                if (isAutoplayNext) {
                    currentPlayer = (currentPlayer === audio1) ? audio2 : audio1;
                    currentPlayer.src = url;
                    
                    if (isCrossfadeDisabled) {
                        if (fadeInInterval) clearInterval(fadeInInterval);
                        currentPlayer.volume = 1;
                        currentPlayer.play().catch(e => console.log("Autoplay blockiert oder gescheitert."));
                    } else {
                        fadeInPlayer(currentPlayer, currentCrossfadeTime);
                    }
                    
                } else {
                    if (fadeInInterval) clearInterval(fadeInInterval);
                    audio1.pause(); audio2.pause();
                    audio1.ontimeupdate = null; audio2.ontimeupdate = null;
                    audio1.onended = null; audio2.onended = null;
                    audio1.onloadedmetadata = null; audio2.onloadedmetadata = null;
                    audio1.volume = 1; audio2.volume = 1;
                    currentPlayer = audio1;
                    nextPlayer = audio2;
                    
                    currentPlayer.src = url;
                }

                nextSongTriggered = false; 

                currentPlayer.onloadedmetadata = () => {
                    if (!isAutoplayNext) {
                        const startPoint = Math.max(0, currentPlayer.duration - 20);
                        currentPlayer.currentTime = startPoint;
                        currentPlayer.play().catch(e => console.log("Abspielen fehlgeschlagen."));
                    } else {
                        currentPlayer.currentTime = 0;
                        currentPlayer.play().catch(e => console.log("Abspielen fehlgeschlagen."));
                    }
                };

                const songSnapshotCard = currentCard;
                const songSnapshotBtn = clickedBtn;

                currentPlayer.onplay = () => {
                    if (songSnapshotBtn) {
                        songSnapshotBtn.innerText = '⏹️';
                        songSnapshotBtn.classList.add('playing');
                    }
                    if (songSnapshotCard) {
                        songSnapshotCard.classList.add('is-playing');
                    }
                };

                currentPlayer.onended = () => {
                    if (songSnapshotBtn) {
                        songSnapshotBtn.innerText = '▶️';
                        songSnapshotBtn.classList.remove('playing');
                    }
                    if (songSnapshotCard) {
                        songSnapshotCard.classList.remove('is-playing');
                    }
                };

                currentPlayer.ontimeupdate = () => {
                    if (isAutoplayNext) {
                        if (currentPlayer.currentTime >= 20) {
                            currentPlayer.pause();
                            currentPlayer.ontimeupdate = null; 
                            
                            if (songSnapshotBtn) {
                                songSnapshotBtn.innerText = '▶️';
                                songSnapshotBtn.classList.remove('playing');
                            }
                            if (songSnapshotCard) {
                                songSnapshotCard.classList.remove('is-playing');
                            }
                            
                            activePlayBtn = null; 
                            return;
                        }
                    } else {
                        const timeLeft = currentPlayer.duration - currentPlayer.currentTime;
                        
                        if (timeLeft <= currentCrossfadeTime && !nextSongTriggered) {
                            nextSongTriggered = true; 
                            
                            const naechsteKarte = findeNaechsteKarte(songSnapshotBtn);
                            if (naechsteKarte) {
                                const naechsterTitle = naechsteKarte.querySelector('.song-title-text').innerText;
                                const naechsterArtistEl = naechsteKarte.querySelector('.song-artist-text');
                                const naechsterArtist = naechsterArtistEl ? naechsterArtistEl.innerText : '';
                                
                                window.playPreview(
                                    null, 
                                    naechsterTitle, 
                                    naechsterArtist, 
                                    true,               
                                    isCrossfadeDisabled,
                                    currentCrossfadeTime
                                );
                            }
                        }

                        if (currentPlayer.volume <= 0.05) {
                            if (songSnapshotBtn && songSnapshotBtn.innerText === '⏹️') {
                                songSnapshotBtn.innerText = '▶️';
                                songSnapshotBtn.classList.remove('playing');
                            }
                            if (songSnapshotCard) {
                                songSnapshotCard.classList.remove('is-playing');
                            }
                        }
                    }
                };
            } catch (err) {
                console.error("Fehler beim Lesen des Ordners:", err);
            }
        } else {
            alert("Bitte verknüpfe zuerst einen Ordner über das Ordner-Symbol links neben dem Suchfeld!");
            if (clickedBtn) clickedBtn.innerText = '▶️';
            activePlayBtn = null;
        }
    };
</script>

<script>
    const folderColors = ['var(--f-none)', 'var(--f-blue)', 'var(--f-red)', 'var(--f-green)', 'var(--f-gold)'];
    let blocklistMasterSortable;
    let currentUser = 'dj1'; 
    let expandedBlockIds = new Set(); 
    let currentDiffFilter = 'all'; 

    let diffCollapsedState = { 'onlyMarc': false, 'onlyGunnar': false };

    let userStates = {
        'dj1': { isLocked: true, editMode: false, allCollapsed: true, cleanMode: false },
        'dj2': { isLocked: true, editMode: false, allCollapsed: true, cleanMode: false },
        'diff': { isLocked: true, editMode: false, allCollapsed: false }
    };

    window.addEventListener('click', function(e) {
        const dropdown = document.getElementById('save-dropdown');
        const saveBtn = document.getElementById('header-btn-save');
        
        if (dropdown && dropdown.classList.contains('active')) {
            if (!dropdown.contains(e.target) && !saveBtn.contains(e.target)) {
                dropdown.classList.remove('active');
            }
        }
    });

    window.toggleDropdown = function() {
        if (currentUser === 'diff') {
            alert("Im Differenz-Modus können keine Sets gespeichert oder geladen werden.");
            return;
        }
        const dropdown = document.getElementById('save-dropdown');
        
        if (!dropdown.classList.contains('active')) {
            if (typeof window.loadSavedTemplatesList === 'function') {
                window.loadSavedTemplatesList(); 
            }
        }
        dropdown.classList.toggle('active');
    };

    window.headerActionLeft = function() {
        if (currentUser === 'diff') {
            if(confirm("Möchtest du die Setlisten jetzt als PDF exportieren?\nEs wird eine Datei mit 3 getrennten Seiten erstellt.")) {
                window.generatePDFExport();
            }
        } else {
            userStates[currentUser].editMode = !userStates[currentUser].editMode;
            window.applyUserStatesToUI();
        }
    };

    window.headerActionRight = function() {
        if (currentUser === 'diff') {
            const marcSection = document.getElementById('onlyMarc');
            const gunnarSection = document.getElementById('onlyGunnar');
            
            let targetCollapse = false;
            if (marcSection) {
                targetCollapse = !marcSection.classList.contains('collapsed');
            } else if (gunnarSection) {
                targetCollapse = !gunnarSection.classList.contains('collapsed');
            }
            
            ['onlyMarc', 'onlyGunnar'].forEach(id => {
                const section = document.getElementById(id);
                if (section) {
                    const header = section.previousElementSibling;
                    const icon = header.querySelector('.collapse-icon');
                    
                    if (targetCollapse) {
                        section.classList.add('collapsed');
                        if (icon) icon.style.transform = "rotate(-90deg)";
                        diffCollapsedState[id] = true;
                    } else {
                        section.classList.remove('collapsed');
                        if (icon) icon.style.transform = "rotate(0deg)";
                        diffCollapsedState[id] = false;
                    }
                }
            });
        } else {
            window.toggleAllBlocks();
        }
    };

    window.toggleCleanMode = function() {
        if (currentUser === 'diff') {
            if (currentDiffFilter === 'all') currentDiffFilter = 'blocks';
            else if (currentDiffFilter === 'blocks') currentDiffFilter = 'singles';
            else currentDiffFilter = 'all';
            
            window.applyUserStatesToUI();
            if (window.renderCurrentState) window.renderCurrentState();
            return; 
        } 
        
        userStates[currentUser].cleanMode = !userStates[currentUser].cleanMode;
        const eyeBtn = document.getElementById('header-btn-eye');
        if (userStates[currentUser].cleanMode) {
            document.body.classList.add('clean-mode');
            eyeBtn.style.background = "var(--accent-color)";
            eyeBtn.style.color = "white";
            document.querySelectorAll('.block-item').forEach(block => { block.classList.remove('collapsed'); });
        } else {
            document.body.classList.remove('clean-mode');
            eyeBtn.style.background = "#333";
            eyeBtn.style.color = "inherit";
            if (window.renderCurrentState) window.renderCurrentState();
        }
    };

    window.toggleLock = function() {
    // 1. Status umschalten
    userStates[currentUser].isLocked = !userStates[currentUser].isLocked;
    
    // 2. Visuelles Feedback (Lock-Icon etc.)
    window.applyUserStatesToUI();
    
    // 3. Neu rendern (Hier wird der Container gelöscht und neu gefüllt)
    if (typeof window.renderCombinedUI === 'function') {
        window.renderCombinedUI();
    }

    // 4. WICHTIG: Das DOM muss erst fertig geladen sein, bevor Sortable startet
    setTimeout(() => {
        if (typeof window.initBlocklistMasterSortable === 'function') {
            window.initBlocklistMasterSortable();
        }
        console.log("UI entsperrt & Sortable neu initialisiert.");
    }, 100); // 100ms Verzögerung sorgt für Stabilität
};

    window.applyUserStatesToUI = function() {
        const state = userStates[currentUser];
        const lockIcon = document.getElementById('lock-icon');
        const header = document.querySelector('header');
        const btnLeft = document.getElementById('header-btn-left');
        const btnRight = document.getElementById('header-btn-right');
        const btnEye = document.getElementById('header-btn-eye');
        const btnSave = document.getElementById('header-btn-save');
        const btnFolder = document.getElementById('btn-folder-select'); 
        
        document.body.classList.remove('user-dj1', 'user-dj2', 'user-diff');
        document.body.classList.add(`user-${currentUser}`);

        if (currentUser === 'diff') {
            document.body.classList.remove('edit-mode', 'clean-mode'); 
            btnEye.style.display = 'flex'; 
            btnSave.style.display = 'none'; 
            if (btnFolder) btnFolder.style.display = 'none'; 
            btnLeft.innerText = "📄";
            btnLeft.style.background = "#333";
            
            btnEye.style.background = currentDiffFilter !== 'all' ? "var(--accent-color)" : "#333";
            if (currentDiffFilter === 'all') btnEye.innerText = "👁️";
            else if (currentDiffFilter === 'blocks') btnEye.innerText = "📁";
            else if (currentDiffFilter === 'singles') btnEye.innerText = "🎵";
            
            btnRight.innerText = "↕️";
            btnRight.style.background = "#333";
        } else {
            btnEye.style.display = 'flex'; 
            btnSave.style.display = 'flex'; 
            if (btnFolder) btnFolder.style.display = 'flex'; 
            btnEye.innerText = "👁️‍🗨️";
            
            if (state.cleanMode) {
                document.body.classList.add('clean-mode');
                btnEye.style.background = "var(--accent-color)";
            } else {
                document.body.classList.remove('clean-mode');
                btnEye.style.background = "#333";
            }

            btnLeft.innerText = "✏️";
            btnRight.innerText = "↕️";
            btnRight.style.background = "#333";

            if (state.editMode) document.body.classList.add('edit-mode');
            else document.body.classList.remove('edit-mode');
        }

        lockIcon.innerText = state.isLocked ? "🔒" : "🔓";
        header.style.borderBottomColor = state.isLocked ? "var(--lock-color)" : "var(--accent-color)";
        
        if (blocklistMasterSortable) blocklistMasterSortable.option("disabled", (currentUser === 'diff' || state.isLocked));
        
        document.querySelectorAll('.block-sortable-list').forEach(el => {
            const sortableInstance = Sortable.get(el);
            if (sortableInstance) sortableInstance.option("disabled", (currentUser === 'diff' || state.isLocked));
        });
    };

    function initBlocklistMasterSortable() {
    const el = document.getElementById('blocklist-container');
    if (blocklistMasterSortable) blocklistMasterSortable.destroy();
    
    // Nur DJ1 und DJ2 dürfen sortieren, 'diff' (Zuschauer) nicht
    if (currentUser === 'diff') return;

    blocklistMasterSortable = new Sortable(el, {
    group: 'shared-list', 
    animation: 150, 
    handle: '.drag-handle, .song-details', 
    ghostClass: 'sortable-ghost',
    disabled: userStates[currentUser].isLocked, 
    onEnd: function(evt) {
        // WICHTIG: Besitzer im DOM sofort aktualisieren!
        // Sobald du den Song loslässt, gehört er dir (bzw. dem aktuellen User).
        evt.item.setAttribute('data-owner', currentUser);
        
        // Erst danach speichern
        window.saveData(); 
    },
    onMove: function (evt) {
        const isDraggingBlock = evt.dragged.classList.contains('block-item');
        const targetIsNested = evt.to.classList.contains('block-sortable-list');

        // Verhindert, dass Blöcke in andere Blöcke geschoben werden
        if (isDraggingBlock && targetIsNested) {
            return false;
        }
    }
});
}

    window.toggleAllBlocks = function() {
        userStates[currentUser].allCollapsed = !userStates[currentUser].allCollapsed;
        expandedBlockIds.clear(); 
        document.querySelectorAll('.block-item').forEach(block => {
            if (userStates[currentUser].allCollapsed) block.classList.add('collapsed');
            else { block.classList.remove('collapsed'); expandedBlockIds.add(block.id); }
        });
    };

    window.toggleSingleBlock = function(blockElement) {
        if (userStates[currentUser].cleanMode) return; 
        blockElement.classList.toggle('collapsed');
        const blockId = blockElement.id;
        
        if (blockElement.classList.contains('collapsed')) expandedBlockIds.delete(blockId);
        else expandedBlockIds.add(blockId);
    };

    window.toggleDiffSection = function(sectionId, headerEl) {
        const contentDiv = document.getElementById(sectionId);
        const iconEl = headerEl.querySelector('.collapse-icon');
        const isCurrentlyCollapsed = contentDiv.classList.contains('collapsed');
        
        if (isCurrentlyCollapsed) { contentDiv.classList.remove('collapsed'); iconEl.style.transform = "rotate(0deg)"; diffCollapsedState[sectionId] = false; }
        else { contentDiv.classList.add('collapsed'); iconEl.style.transform = "rotate(-90deg)"; diffCollapsedState[sectionId] = true; }
    };

    window.renameBlockPrompt = function(blockElement) {
        if (!userStates[currentUser].editMode) return; 
        const titleEl = blockElement.querySelector('strong');
        const countSpan = titleEl.querySelector('.block-song-count');
        let currentTitle = titleEl.innerText;
        if (countSpan) currentTitle = currentTitle.replace(countSpan.innerText, '').trim();
        
        const newTitle = prompt("Neuen Namen für den Block eingeben:", currentTitle);
        if (newTitle !== null && newTitle.trim() !== '') {
            titleEl.innerHTML = newTitle.trim() + (countSpan ? countSpan.outerHTML : '');
            window.saveData();
        }
    };

    window.editSongPrompt = function(detailsElement) {
        if (!userStates[currentUser].editMode) return;
        const titleEl = detailsElement.querySelector('.song-title-text');
        const artistEl = detailsElement.querySelector('.song-artist-text');
        
        const currentTitle = titleEl.innerText;
        const currentArtist = artistEl ? artistEl.innerText : '';
        
        const newTitle = prompt("Songtitel bearbeiten:", currentTitle);
        if (newTitle === null || newTitle.trim() === '') return;
        const newArtist = prompt("Interpret eingeben (leer lassen für keinen):", currentArtist);
        
        titleEl.innerText = newTitle.trim();
        if (newArtist && newArtist.trim() !== '') {
            if (!artistEl) {
                const newArtistSpan = document.createElement('span');
                newArtistSpan.className = 'song-artist-text';
                newArtistSpan.innerText = newArtist.trim();
                detailsElement.appendChild(newArtistSpan);
            } else artistEl.innerText = newArtist.trim();
        } else if (artistEl) artistEl.remove();
        
        window.saveData();
    };

    // Fallback: Wenn kein owner mitgegeben wurde (z.B. beim ersten Erstellen),

    // Status für Einklappen/Ausklappen (bleibt bei deiner Logik)
    const isExpanded = userStates[currentUser].cleanMode || (!userStates[currentUser].allCollapsed) || expandedBlockIds.has(blockId);
    
    // Das Div konfigurieren - Wichtig: ownerClass hinzugefügt
    div.className = `block-item ${ownerClass} ${isExpanded ? '' : 'collapsed'}`;
    div.id = blockId;
    div.dataset.colorIndex = colorIdx;
    div.style.background = folderColors[colorIdx];
    
    // Song-Randfarbe passend zum Besitzer des Blocks
    const songBorderColor = (blockOwner === 'dj2') ? 'var(--dj2-color)' : 'var(--accent-color)';
    const songCount = songs.length;

    div.innerHTML = `
        <div class="block-header">
            <span class="collapse-icon" onclick="window.toggleSingleBlock(this.closest('.block-item'))">▼</span>

                ${title}<span class="block-song-count"> (${songCount})</span>

            <div style="display:flex; align-items:center; gap: 12px;" onclick="event.stopPropagation()">
                <div class="color-dot" style="width:18px; height:18px;" onclick="cycleColorGenericBlock('${blockId}')"></div>
                <span class="delete-btn" style="color:var(--delete-red); font-size:22px;" 
                      onclick="if(confirm('Block löschen?')) { this.closest('.block-item').remove(); window.saveData(); }">✕</span>
                <span class="drag-handle">☰</span>
            </div>
        </div>
        <div class="block-content">
            <div id="${listId}" class="block-sortable-list">
                ${songs.map(s => {
                    const sTitle = (typeof s === 'string') ? s : (s.title || '');
                    const sArtist = (typeof s === 'object' && s.artist) ? s.artist : '';
                    const sCrossfade = (typeof s === 'object' && s.cf !== undefined) ? s.cf : DEFAULT_CROSSFADE;
                    const disabledClass = sCrossfade === 0 ? 'disabled' : '';
                    return `
                    <div class="song-card" style="border-left: 3px solid ${songBorderColor};">
                        <div class="song-details" onclick="window.editSongPrompt(this)">
                            <span class="song-title-text">${sTitle}</span>
                            ${sArtist ? `<span class="song-artist-text">${sArtist}</span>` : ''}
                        </div>
                        <div class="crossfade-btn-group">
                            <span class="crossfade-toggle-btn ${disabledClass}">🔀</span>
                            <span class="crossfade-time-display">${sCrossfade}s</span>
                        </div>
                        <span class="play-preview-btn">▶️</span>
                        <span class="delete-btn" onclick="window.deleteSongCard(this)">×</span>
                    </div>`;
                }).join('')}
            </div>
        </div>`;
    
    // Event-Listener für Songs (Vorschau & Crossfade)
    const songCards = div.querySelectorAll('.song-card');
    songCards.forEach((card, idx) => {
        const s = songs[idx];
        const sTitle = (typeof s === 'string') ? s : (s.title || '');
        const sArtist = (typeof s === 'object' && s.artist) ? s.artist : '';
        const pBtn = card.querySelector('.play-preview-btn');
        pBtn.addEventListener('click', (e) => window.playPreview(e, sTitle, sArtist));
        window.setupCrossfadeEvents(card);
    });

    // In den Container einfügen
    document.getElementById('blocklist-container').appendChild(div);

    // SortableJS Initialisierung
    if (currentUser !== 'diff') {
        new Sortable(document.getElementById(listId), { 
            group: 'shared-list', 
            animation: 150, 
            disabled: userStates[currentUser].isLocked, 
            onEnd: () => {
                document.querySelectorAll('.block-item').forEach(b => {
                    const countSpan = b.querySelector('.block-song-count');
                    const list = b.querySelector('.block-sortable-list');
                    if (countSpan && list) countSpan.innerText = ` (${list.children.length})`;
                });
                window.saveData();
            },
            onMove: function (evt) { if (evt.dragged.classList.contains('block-item')) return false; }
        });
    }
};



    window.cycleColorGenericBlock = function(id) {

</script>

    const firebaseConfig = {

    const app = initializeApp(firebaseConfig);

    // --- 1. ECHTZEIT-SYNC MIT DUBLETTEN-FILTER ---

    function renderCombinedUI() {
    const bContainer = document.getElementById('blocklist-container');
    if (!bContainer) return;

    // 1. Daten sicher abrufen
    const list1 = (Array.isArray(window.dataDJ1) && window.dataDJ1.length > 0) 
                  ? window.dataDJ1 
                  : (window.lastKnownDJ1 || []);
                  
    const list2 = (Array.isArray(window.dataDJ2) && window.dataDJ2.length > 0) 
                  ? window.dataDJ2 
                  : (window.lastKnownDJ2 || []);

    // 2. HIER WIRD 'combined' DEFINIERT! (Das fehlte in deinem Snippet)
    const combined = [...list1, ...list2];

    console.log("RENDER DEBUG: DJ1(Global):", list1.length, "DJ2(Global):", list2.length, "Combined:", combined.length);

    bContainer.innerHTML = '';
    const renderedFingerprints = new Set();

    // 3. Sicherheits-Check: Ist die Liste leer?
    if (combined.length === 0) {
        console.log("Render-Abbruch: Keine Daten zum Anzeigen.");
        return;
    }

    // 4. Liste rendern
    combined.forEach((item) => {
        if (!item) return;

        let elementKey = item.id || `single-${item.t || item.title}-${item.a || item.artist}`;
        if (renderedFingerprints.has(elementKey)) return;
        renderedFingerprints.add(elementKey);

        if (item.type === 'block' && Array.isArray(item.s)) {
            const seenInBlock = new Set();
            const cleanSongs = item.s.filter(song => {
                const songKey = `${(song.title || song.t || "").toLowerCase()}-${(song.artist || song.a || "").toLowerCase()}`.replace(/\s+/g, '');
                if (seenInBlock.has(songKey)) return false;
                seenInBlock.add(songKey);
                return true;
            });
            window.addBlockToBlocklistUI(item.t, cleanSongs, item.cIdx || 0, item.id, item.createdBy);
        } else if (item.type === 'single') {
            const singleEl = document.createElement('div');
            singleEl.className = 'block-item single-song-card'; 
            singleEl.setAttribute('data-id', item.id);
            singleEl.setAttribute('data-owner', item.createdBy || 'dj1');
            singleEl.innerHTML = `
                <div class="block-header" style="display: flex; align-items: center; gap: 10px; padding: 10px; background: #2a2a2a; border-radius: 8px; border-left: 4px solid #ffcc00;">
                    <div class="drag-handle" style="cursor: grab;">☰</div>
                    <div style="flex-grow: 1;">
                        <span style="font-weight: bold;">${item.t || item.title}</span><br>
                        <small style="opacity: 0.7;">${item.a || item.artist || 'Unbekannt'}</small>
                    </div>
                    <div class="block-actions">
                        <button onclick="window.playPreview(event, '${item.t || item.title}', '${item.a || item.artist || ''}')" class="btn-sm">▶️</button>
                        <button onclick="deleteItem('${item.id}')" class="btn-sm">❌</button>
                    </div>
                </div>
            `;
            bContainer.appendChild(singleEl);
        }
    });
}

async function handleUnlock() {
    // 1. Status auf "unlocked" setzen (oder was auch immer deine Logik ist)
    userStates[currentUser].isLocked = false;
    
    // 2. UI neu zeichnen
    renderCombinedUI();
    
    // 3. Kurz warten, damit der Browser die neuen Elemente im DOM erstellt hat
    await new Promise(resolve => setTimeout(resolve, 100)); 
    
    // 4. Jetzt erst Sortable wieder aktivieren
    initBlocklistMasterSortable();
    
    console.log("UI entsperrt und Sortable neu initialisiert.");
}

onSnapshot(doc(db, "mojoblox", "set1_dj1"), (docSnap) => {

onSnapshot(doc(db, "mojoblox", "set1_dj2"), (docSnap) => {
