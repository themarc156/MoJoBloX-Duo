<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>DJ-Tool Pro</title>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --panel-bg: #1a1a1a;
            --border-color: #333;
            --accent: #ff9800;
            --text: #e0e0e0;
        }

        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg-color); color: var(--text); margin: 0; padding: 15px; height: 100vh; box-sizing: border-box; }
        .app-container { display: flex; flex-direction: column; height: 100%; gap: 15px; }

        /* Header */
        .header-row { display: flex; align-items: flex-end; gap: 20px; padding-bottom: 5px; }
        .dj-header-group { flex: 1; display: flex; flex-direction: column; gap: 8px; }
        h2 { text-align: center; color: var(--accent); margin: 0; font-size: 1.1em; letter-spacing: 1px; text-transform: uppercase; }

        .toolbar-panel { 
        display: flex; 
        /* justify-content: center; <-- Entfernen */
        gap: 6px; 
        background: var(--panel-bg); 
        padding: 10px; 
        border-radius: 8px; 
        border: 1px solid var(--border-color);
        box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        width: 100%; /* Sicherstellen, dass die Toolbar voll ausnutzt */
        box-sizing: border-box;
    }

    .toolbar-panel button { 
        flex: 1; /* <-- Das bewirkt, dass die Buttons den Platz teilen */
        background: #2a2a2a; 
        border: 1px solid #444; 
        color: white; 
        padding: 6px 0; /* Padding angepasst, da flex:1 die Breite steuert */
        border-radius: 4px; 
        cursor: pointer; 
        transition: all 0.2s ease;
    }
        .toolbar-panel button:hover { background: #444; border-color: #666; }
        .toolbar-panel button:active { background: var(--accent); transform: translateY(1px); }

        .logo-center { width: 80px; display: flex; justify-content: center; flex-shrink: 0; }
        .logo-center img { width: 90px; height: auto; filter: drop-shadow(0 0 5px rgba(255,152,0,0.2)); }

        /* Content */
        .content-row { display: flex; flex: 1; gap: 15px; min-height: 0; }
        .dj-column { flex: 1; display: flex; flex-direction: column; gap: 10px; min-height: 0; }
        .content-area { flex: 1; background: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 8px; overflow-y: auto; padding: 10px; min-height: 200px; }
        
        /* Song & Block Design */
        .block { background: #252525; margin: 10px 0; border-radius: 5px; border: 1px solid #444; }
        .block-header { height: 25px; display: flex; align-items: center; padding: 0 8px; cursor: grab; gap: 10px; }
        
        .song-list { min-height: 50px; padding: 5px; border: 1px dashed transparent; }
        .song-list.drag-over { border-color: var(--accent); }
        
        .song-item { background: #333; height: 25px; margin: 5px 0; border-radius: 3px; cursor: grab; display: flex; align-items: center; padding: 0 8px; gap: 10px; }
        .song-item.dragging { opacity: 0.5; border: 1px dashed var(--accent); }
        
        .song-info { flex-grow: 1; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; font-size: 0.85em; }
        .controls-wrapper { display: flex; gap: 5px; align-items: center; }
        
        .play-btn { background: #444; color: var(--accent); border: none; width: 25px; height: 15px; cursor: pointer; border-radius: 3px; font-size: 0.7em; }
        .delete-btn { display: none; background: #ff4444; color: white; border: none; padding: 0px 8px; cursor: pointer; height: 15px; font-size: 0.8em; }
        
        /* Hier wird die Klasse aktiv */
        .col-dj.edit-mode .delete-btn { display: block; }
        
        .toggle-btn { background: none; border: none; color: white; cursor: pointer; font-size: 0.8em; padding: 5px; }

        /* FLAT VIEW */
        .col-dj.flat-view .block-header { display: none; }
        .col-dj.flat-view .block { background: transparent; border: none; margin: 0; }
        .col-dj.flat-view .song-list { display: block !important; padding: 0; }

        .header-main {
    display: flex;
    align-items: center; /* Zentriert Namen, Icon und Statuspunkt */
    gap: 10px;           /* Abstand zwischen den Elementen */
    margin-bottom: 5px;  /* Abstand zur Toolbar darunter */
}

.folder-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 1.2rem;
    padding: 0;
}
    </style>
</head>
<body>

<div class="app-container">
    <div class="header-row">
    <div class="dj-header-group">
        <div class="header-main">
            <h2>DJ Marc</h2>
            <button class="folder-btn" onclick="selectMusicFolder('marc')" title="Musikordner wählen">📂</button>
            <span id="status-marc" title="Ordner-Status">⚪</span>
        </div>
        <div class="toolbar-panel">
            <input type="file" id="inputMarc" style="display:none" multiple accept="audio/*" onchange="addSongs(this, 'content-dj1')">
            <button onclick="document.getElementById('inputMarc').click()">🎵+</button>
            <button onclick="addBlock('content-dj1')">📁+</button>
            <button onclick="toggleEditMode('col-dj1')">✏️</button>
            <button onclick="saveAsTemplate('dj1')">💾</button>
            <button onclick="toggleFlatView('col-dj1')">👁️</button>
            <button onclick="toggleAllBlocks('col-dj1')">↕️</button>
        </div>
    </div>

    <div class="logo-center"><img src="icon.png" alt="Logo"></div>

    <div class="dj-header-group">
        <div class="header-main">
            <h2>DJ Gunnar</h2>
            <button class="folder-btn" onclick="selectMusicFolder('gunnar')" title="Musikordner wählen">📂</button>
            <span id="status-gunnar" title="Ordner-Status">⚪</span>
        </div>
        <div class="toolbar-panel">
            <input type="file" id="inputGunnar" style="display:none" multiple accept="audio/*" onchange="addSongs(this, 'content-dj2')">
            <button onclick="document.getElementById('inputGunnar').click()">🎵+</button>
            <button onclick="addBlock('content-dj2')">📁+</button>
            <button onclick="toggleEditMode('col-dj2')">✏️</button>
            <button onclick="saveAsTemplate('dj2')">💾</button>
            <button onclick="toggleFlatView('col-dj2')">👁️</button>
            <button onclick="toggleAllBlocks('col-dj2')">↕️</button>
        </div>
    </div>
</div>

    <div class="content-row">
        <div class="dj-column col-dj" id="col-dj1">
            <div id="content-dj1" class="content-area" ondragover="handleDragOver(event)"></div>
        </div>
        <div class="dj-column col-dj" id="col-dj2">
            <div id="content-dj2" class="content-area" ondragover="handleDragOver(event)"></div>
        </div>
    </div>
</div>

<script type="module">
    let draggedElement = null;

// Firebase Imports
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// Firebase Config
const firebaseConfig = { 
    apiKey: "AIzaSyDCZXd7ghAG7CbAwlushzifcCznLslLack", 
    authDomain: "mymojoblox.firebaseapp.com", 
    projectId: "mymojoblox", 
    storageBucket: "mymojoblox.firebasestorage.app", 
    messagingSenderId: "191559552869", 
    appId: "1:191559552869:web:0f212fc5f6fb7338621b8c" 
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);



// Laden-Funktion
window.loadDJData = async (djId) => {
    const docRef = doc(db, "mojoblox", `set_${djId}`);
    const docSnap = await getDoc(docRef);
    
    // Mapping: Welches djId gehört zu welchem Benutzer?
    const djKey = (djId === 'dj1') ? 'marc' : 'gunnar'; 
    
    if (docSnap.exists()) {
        const data = docSnap.data();
        const container = document.getElementById(`content-${djId}`);
        container.innerHTML = ''; // Vorher leeren
        
        // Durch alle Items (Blöcke ODER Songs) in der DB loopen
        data.blocklist.forEach(item => {
            
            if (item.type === 'block') {
                // --- BLOCK RENDERN ---
                const div = document.createElement('div');
                div.className = 'block';
                div.draggable = true;
                div.id = item.id || 'block-' + Date.now();
                div.ondragstart = (e) => { draggedElement = e.target; e.target.classList.add('dragging'); };
                div.ondragend = (e) => { e.target.classList.remove('dragging'); };
                
                div.innerHTML = `
                    <div class="block-header">
                        <button class="toggle-btn" onclick="toggleSingleBlock(this)">▼</button>
                        <strong>${item.title}</strong>
                        <button class="delete-btn" onclick="deleteItem(this.closest('.block'))">❌</button>
                    </div>
                    <div class="song-list" ondragover="handleDragOver(event)"></div>`;
                
                const songList = div.querySelector('.song-list');
                // Songs im Block hinzufügen (mit djKey!)
                item.songs.forEach(song => {
                    songList.appendChild(createSongElementFromData(song.title, djKey));
                });
                container.appendChild(div);

            } else if (item.type === 'song') {
                // --- LOSEN SONG RENDERN (mit djKey!) ---
                container.appendChild(createSongElementFromData(item.title, djKey));
            }
        });
        console.log(`Set für ${djId} geladen (Mapping zu ${djKey}).`);
    }
};

// Hilfsfunktion zum Erstellen der Song-Elemente beim Laden
function createSongElementFromData(title, djKey) {
    const div = document.createElement('div');
    div.className = 'song-item';
    div.draggable = true;
    div.ondragstart = (e) => { draggedElement = e.target; e.target.classList.add('dragging'); };
    div.ondragend = (e) => { e.target.classList.remove('dragging'); };
    
    div.innerHTML = `
    <div class="song-info" title="${title}">${title}</div>
    <div class="controls-wrapper">
        <button class="play-btn" onclick="toggleSong(this, '${title}', '${djKey}')">▶</button>
        <button class="delete-btn" onclick="deleteItem(this.closest('.song-item'))">❌</button>
    </div>`;
    return div;
}



// Hilfsfunktion zum Auslesen der aktuellen Daten pro DJ
function getDOMData(djId) {
    const container = document.getElementById(`content-${djId}`);
    const data = { blocklist: [], timestamp: Date.now() };

    // Alle direkten Kinder durchgehen (Blöcke oder einzelne Songs)
    container.querySelectorAll(':scope > .block, :scope > .song-item').forEach(el => {
        if (el.classList.contains('block')) {
            const songs = Array.from(el.querySelectorAll('.song-item')).map(song => ({
                title: song.querySelector('.song-info').innerText
            }));
            data.blocklist.push({
                type: 'block',
                id: el.id,
                title: el.querySelector('strong').innerText,
                songs: songs
            });
        } else if (el.classList.contains('song-item')) {
            // Loser Song speichern
            data.blocklist.push({
                type: 'song',
                title: el.querySelector('.song-info').innerText
            });
        }
    });
    return data;
}

// Die zentrale Sync-Funktion
async function syncToFirebase(djId) {
    const data = getDOMData(djId);
    try {
        await setDoc(doc(db, "mojoblox", `set_${djId}`), data);
        console.log(`Auto-Save für ${djId} erfolgreich.`);
    } catch (e) { console.error("Sync-Fehler:", e); }
}

    function toggleFlatView(colId) { document.getElementById(colId).classList.toggle('flat-view'); }
    function toggleEditMode(colId) { document.getElementById(colId).classList.toggle('edit-mode'); }
    
    function toggleAllBlocks(colId) {
        const container = document.getElementById(colId);
        const lists = container.querySelectorAll('.song-list');
        const shouldExpand = lists.length > 0 && lists[0].style.display === 'none';
        lists.forEach(l => {
            l.style.display = shouldExpand ? 'block' : 'none';
            const btn = l.previousElementSibling.querySelector('.toggle-btn');
            if (btn) btn.textContent = shouldExpand ? '▼' : '▶';
        });
    }

    function toggleSingleBlock(btn) {
        const list = btn.parentElement.nextElementSibling;
        const isHidden = list.style.display === 'none';
        list.style.display = isHidden ? 'block' : 'none';
        btn.textContent = isHidden ? '▼' : '▶';
    }

    function addSongs(input, targetId) {
        const container = document.getElementById(targetId);
        Array.from(input.files).filter(f => f.type.startsWith('audio/')).forEach(file => { container.appendChild(createSongElement(file)); });
        input.value = "";

        // Nach dem Hinzufügen: Auto-Save triggern
    const djId = targetId.replace('content-', ''); 
    syncToFirebase(djId);
    }

    function addBlock(targetId) {
        const name = prompt("Name des Blocks:");
        if (!name) return;
        const container = document.getElementById(targetId);
        const div = document.createElement('div');
        div.className = 'block';
        div.draggable = true;
        div.ondragstart = (e) => { draggedElement = e.target; e.target.classList.add('dragging'); };
        div.ondragend = (e) => { e.target.classList.remove('dragging'); };
        div.innerHTML = `
            <div class="block-header">
                <button class="toggle-btn" onclick="toggleSingleBlock(this)">▼</button>
                <strong>${name}</strong>
<button class="delete-btn" onclick="deleteItem(this.closest('.block'))">❌</button>
            </div>
            <div class="song-list" ondragover="handleDragOver(event)"></div>`;
        container.appendChild(div);

        // Nach dem Hinzufügen: Auto-Save triggern
    const djId = targetId.replace('content-', ''); 
    syncToFirebase(djId);
    }

// Funktion zum Speichern eines Snapshots als Vorlage
window.saveAsTemplate = async (djId) => {
    const templateName = prompt("Name für dieses Set-Preset (z.B. 'Party 2026'):");
    if (!templateName || templateName.trim() === '') return;

    // Wir nutzen hier dieselbe Logik wie beim Auto-Save, um die Daten zu holen
    const data = getDOMData(djId); 
    data.templateName = templateName.trim();
    data.owner = djId; // Speichert den DJ als Besitzer

    try {
        // Speichern in der Collection 'mojoblox_templates'
        await setDoc(doc(db, "mojoblox_templates", `${djId}_${Date.now()}`), data);
        alert(`Preset "${templateName}" erfolgreich gespeichert!`);
    } catch (e) { 
        console.error("Fehler beim Speichern der Vorlage:", e); 
        alert("Fehler beim Speichern.");
    }
};

    function createSongElement(file) {
        const div = document.createElement('div');
        div.className = 'song-item';
        div.draggable = true;
        div.ondragstart = (e) => { draggedElement = e.target; e.target.classList.add('dragging'); };
        div.ondragend = (e) => { e.target.classList.remove('dragging'); };
        const url = URL.createObjectURL(file);
        const name = file.name.replace(/\.[^/.]+$/, "");
        div.innerHTML = `
            <div class="song-info" title="${name}">${name}</div>
            <div class="controls-wrapper">
                <button class="play-btn" onclick="togglePlay(this, '${url}')">▶</button>
<button class="delete-btn" onclick="deleteItem(this.closest('.song-item'))">❌</button>
            </div>`;
        return div;
    }

// Diese Funktion ersetzt das direkte .remove()
window.deleteItem = (element) => {
    const container = element.closest('.content-area');
    element.remove();
    if (container) {
        const djId = container.id.replace('content-', '');
        syncToFirebase(djId);
    }
};

    function togglePlay(btn, url) {
        if (!btn.audio) btn.audio = new Audio(url);
        if (btn.audio.paused) { btn.audio.play(); btn.textContent = '■'; } 
        else { btn.audio.pause(); btn.textContent = '▶'; }
    }

    
    // 1. Die visuelle Sortier-Logik (unverändert lassen!)
function handleDragOver(e) {
    e.preventDefault(); 
    e.stopPropagation();
    
    // Visuelles Feedback entfernen
    document.querySelectorAll('.song-list').forEach(list => list.classList.remove('drag-over'));
    
    const container = e.currentTarget;
    container.classList.add('drag-over');
    
    // Hier berechnet der Browser, wo das Element hingehört
    const afterElement = [...container.querySelectorAll(':scope > .song-item, :scope > .block')].reduce((closest, child) => {
        if (child === draggedElement) return closest;
        const box = child.getBoundingClientRect();
        const offset = e.clientY - box.top - box.height / 2;
        return (offset < 0 && offset > closest.offset) ? { offset, element: child } : closest;
    }, { offset: Number.NEGATIVE_INFINITY }).element;
    
    if (afterElement == null) container.appendChild(draggedElement);
    else container.insertBefore(draggedElement, afterElement);
}

// 2. Der Sync-Event-Listener (der "Auto-Save" Button)
document.addEventListener('dragend', (e) => {
    // Visuelle Spuren löschen
    document.querySelectorAll('.song-list').forEach(list => list.classList.remove('drag-over'));
    
    // Herausfinden, in welcher Spalte der Drop stattgefunden hat
    const container = e.target.closest('.content-area');
    if (container) {
        // Die ID ist z.B. 'content-dj1', wir brauchen 'dj1'
        const djId = container.id.replace('content-', ''); 
        
        // Sync auslösen (Jetzt erst wird in die DB geschrieben!)
        syncToFirebase(djId);
    }
});

// Beim Laden der Seite automatisch Daten abrufen
window.addEventListener('DOMContentLoaded', () => {
    loadDJData('dj1');
    loadDJData('dj2');
});

// Hier speichern wir die Bibliotheken (Mapping: Dateiname -> FileHandle)
const djLibraries = {
    marc: new Map(),
    gunnar: new Map()
};

async function selectMusicFolder(djKey) {
    try {
        const dirHandle = await window.showDirectoryPicker();
        const lib = djLibraries[djKey];
        
        lib.clear(); // Alte Bibliothek leeren
        
        for await (const entry of dirHandle.values()) {
            // Nur Audio-Dateien indexieren
            if (entry.kind === 'file' && entry.name.match(/\.(mp3|wav|ogg|flac|m4a)$/i)) {
                const cleanName = entry.name.replace(/\.[^/.]+$/, "");
                lib.set(cleanName, entry);
            }
        }
        
        // Status-Icon auf grün setzen
        const statusSpan = document.getElementById(`status-${djKey}`);
        if(statusSpan) statusSpan.innerText = "🟢";
        
        alert(`Bibliothek für ${djKey} geladen: ${lib.size} Songs gefunden.`);
    } catch (err) {
        console.error("Ordnerzugriff abgebrochen:", err);
    }
}

async function toggleSong(btn, title, djKey) {
    // 1. Wenn der Button bereits spielt (Status "true"), dann stoppen
    if (btn.dataset.isPlaying === "true") {
        const audio = btn.dataset.audioObj;
        audio.pause();
        audio.currentTime = 0; // Zurück zum Anfang
        btn.innerText = "▶";    // Icon wieder auf Play
        btn.dataset.isPlaying = "false";
        return;
    }

    // 2. Wenn gestoppt, dann starten
    const lib = djLibraries[djKey];
    if (lib && lib.has(title)) {
        const fileHandle = lib.get(title);
        const file = await fileHandle.getFile();
        const url = URL.createObjectURL(file);
        const audio = new Audio(url);

        // Audio-Objekt und Status am Button speichern
        btn.dataset.audioObj = audio;
        btn.dataset.isPlaying = "true";
        btn.innerText = "⏹"; // Icon auf Stop/Pause ändern

        audio.play();

        // Wenn Song von alleine zu Ende ist, Button zurücksetzen
        audio.onended = () => {
            btn.innerText = "▶";
            btn.dataset.isPlaying = "false";
            URL.revokeObjectURL(url);
        };
    } else {
        alert("Song nicht gefunden. Bitte Ordner prüfen.");
    }
}

// Funktionen für das HTML global sichtbar machen
window.addSongs = addSongs;
window.addBlock = addBlock;
window.deleteItem = deleteItem;
window.toggleFlatView = toggleFlatView;
window.toggleEditMode = toggleEditMode;
window.toggleAllBlocks = toggleAllBlocks;
window.toggleSingleBlock = toggleSingleBlock;
window.togglePlay = togglePlay;
window.saveAsTemplate = saveAsTemplate;
window.handleDragOver = handleDragOver;
window.createSongElementFromData = createSongElementFromData;
window.loadDJData = loadDJData;
window.selectMusicFolder = selectMusicFolder;
window.toggleSong = toggleSong;

</script>
</body>
</html>
