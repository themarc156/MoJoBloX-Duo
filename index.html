    <style>
        :root {
            --bg-color: #121212;
            --accent-color: #00adb5;
            --lock-color: #ff4d4d;
            --text-color: #eeeeee;
            --card-bg: #2a2a2a;
            --delete-red: #ff4d4d;
            --f-none: #1e1e1e; --f-blue: #0a2647; --f-red: #4a0e0e; --f-green: #0e3a1a; --f-gold: #3d3000;
            --safe-track-color: #00adb5;
            --dj2-color: #ffaa00;
            --success-green: #2ecc71;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-color); color: var(--text-color); margin: 0; user-select: none; touch-action: pan-y; overflow-y: scroll; overflow-x: hidden; padding-bottom: 70px; }

        /* Wenn aktiv, wird das Scrollen der Liste verhindert */
        body.lock-scroll {
            overflow: hidden !important;
            touch-action: none !important;
        }

/* Neuer Header-Container */
/* Header Hauptcontainer */
.main-header {
    display: grid;
    grid-template-columns: 1fr auto 1fr; /* Links - Mitte - Rechts */
    align-items: center;
    background: #222;
    padding: 0 12px;
    border-bottom: 2px solid var(--accent-color);
    position: sticky;
    top: 0;
    z-index: 1002;
    height: 44px;
    color: var(--accent-color);
}

/* Die Gruppen (Links/Rechts) */
.header-side {
    display: flex;
    align-items: center;
    gap: 6px; /* Abstand zwischen Label und Buttons */
}

.header-side.right {
    justify-content: flex-end;
}

/* Die Mitte */
.header-center {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: bold;
    letter-spacing: 1px;
    justify-self: center; /* Erzwingt Zentrierung im Grid */
}

/* Buttons (Immer exakt 28x28px für Stabilität) */
.header-btn {
    font-size: 16px;
    cursor: pointer;
    background: #333;
    border-radius: 5px;
    border: 1px solid var(--accent-color);
    display: flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    color: white;
}

/* Spezielle Buttons */
.lock-btn { border-color: #ff4d4d; color: #ff4d4d; }

/* Labels (Marc/Gunnar) */
.dj-label {
    font-size: 0.85rem;
    font-weight: bold;
    color: #eee;
    margin: 0 5px;
    white-space: nowrap;
}

        body.edit-mode #header-btn-left { background: var(--accent-color); color: white; }

        .page { padding: 2px; } 
        
        .input-section { 
            display: flex; 
            gap: 8px; 
margin-bottom: 5px !important; 
           position: sticky; 
            top: 44px; 
            z-index: 1001; 
            background: var(--bg-color); 
            padding: 8px 0; 
            align-items: center;
            padding-top: 2px !important; 
    padding-bottom: 2px !important;
        }
        
        input[type="text"] { padding: 6px; border-radius: 6px; border: 1px solid #444; background: #252525; color: white; outline: none; font-size: 16px; flex-grow: 1; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .btn-plus { background: var(--accent-color); color: white; border: none; width: 45px; height: 40px; border-radius: 6px; font-weight: bold; font-size: 22px; cursor: pointer; }

        .btn-folder-select {
            background: #252525;
            color: #aaa;
            border: 1px solid #444;
            width: 45px;
            height: 40px;
            border-radius: 6px;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;

        }
        .btn-folder-select.active {
            border-color: var(--success-green);
            color: var(--success-green);
            background: #1a2e22;
        }

        .btn-add-block { 
            background: #1e1e1e; 
            color: var(--accent-color); 
            border: 1px solid var(--accent-color); 
            padding: 10px; 
            border-radius: 8px; 
            width: 100%; 
            font-weight: bold; 
margin-bottom: 5px !important; 
           cursor: pointer;
            position: sticky; 
            top: 22px; 
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .song-card { 
    background: var(--card-bg); 
margin-bottom: 1px !important; 
   padding: 4px 10px;  /* Deutlich weniger Padding (oben/unten 4px) */
    border-radius: 4px; 
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
    font-size: 0.85rem; /* Etwas kleinere Grundschrift */

    cursor: grab;

}
        .song-card:active { cursor: grabbing; }

.song-details {
    display: flex;
    flex-direction: column;
    gap: 0px; /* Abstand zwischen Titel und Interpret entfernt */
    flex-grow: 1;
    overflow: hidden;
    padding-right: 10px; 
}

        .song-title-text {
    font-weight: bold;
    font-size: 0.9rem;
    line-height: 1.2;
}

.song-artist-text {
    font-size: 0.7rem; /* Interpret noch ein Stück kleiner */
    color: #999;
    line-height: 1.1;
}
        body.edit-mode .song-details { cursor: pointer; }
        body.edit-mode .song-details:hover .song-title-text { text-decoration: underline dotted var(--accent-color); }

        body.user-dj1 .song-card.match-found { border: 1.5px solid var(--safe-track-color) !important; box-shadow: 0 0 5px rgba(0, 173, 181, 0.3); }
        body.user-dj2 .song-card.match-found { border: 1.5px solid var(--dj2-color) !important; box-shadow: 0 0 5px rgba(255, 170, 0, 0.3); }
        
        .color-dot { width: 24px; height: 24px; border-radius: 50%; border: 2px solid #fff; cursor: pointer; }
        .sortable-ghost { opacity: 0.1; background: var(--accent-color) !important; }
        
        #blocklist-container > .song-card { border-left: 4px solid var(--accent-color); }
        body.user-dj2 #blocklist-container > .song-card { border-left: 4px solid var(--dj2-color) !important; }

        .block-item { margin-bottom: 4px; position: relative; border-radius: 8px; overflow: hidden; }
        .block-item.collapsed { background: #1a1a1a !important; }
        .block-item.collapsed .block-header strong { text-decoration: none !important; }
        .block-header { padding: 8px 12px; display: flex; justify-content: space-between; align-items: center; }
        .block-header strong { font-size: 1rem; flex-grow: 1; cursor: pointer; padding: 3px; }
        body.edit-mode .block-header strong { cursor: cell; text-decoration: underline dotted var(--accent-color); }

        .block-song-count { font-size: 0.85rem; opacity: 0.7; margin-left: 4px; font-weight: normal; }
        .block-content { padding: 8px; padding-bottom: 4px; } 
        .block-item.collapsed .block-content { display: none; }
        .block-item:not(.collapsed) .block-content { display: block; }

        .collapse-icon { transition: transform 0.3s; margin-right: 12px; font-size: 1.1rem; cursor: pointer; padding: 3px; transform: rotate(-90deg); }
        .block-item:not(.collapsed) .collapse-icon { transform: rotate(0deg); }
        .block-sortable-list { min-height: 20px; }

        .delete-btn { 
            display: none !important; 
            color: var(--delete-red); 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 24px; 
            padding: 10px 15px; 
            margin: -10px -10px -10px auto; 
            pointer-events: auto !important; 
        }
        body.edit-mode .delete-btn { display: inline-block !important; }
        
        .color-dot { display: none !important; }
        body.edit-mode .color-dot { display: block !important; }

        .play-preview-btn {
            display: inline-block;
            color: var(--accent-color);
            cursor: pointer;
            font-size: 16px;
            padding: 8px 12px;
            margin: -10px auto -10px 5px;
            border-radius: 4px;
            transition: background 0.2s;
            user-select: none;
            -webkit-user-select: none;
        }
        .play-preview-btn:hover {
            background: rgba(255, 255, 255, 0.05);
        }
        .play-preview-btn.playing {
            color: var(--success-green);
        }
        body.edit-mode .play-preview-btn { display: none !important; }
        body.user-diff .play-preview-btn { display: none !important; }

        .drag-handle { cursor: grab; font-size: 18px; color: #666; padding: 5px 8px; margin-left: 12px; }
        .drag-handle:active { cursor: grabbing; }

        footer {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: #1a1a1a; border-top: 1px solid #333;
            display: flex; justify-content: space-around; padding: 10px; z-index: 1003;
        }
        .footer-btn {
            background: #252525; color: #aaa; border: 1px solid #444; padding: 6px 12px;
            border-radius: 15px; font-size: 0.9rem; cursor: pointer; font-weight: bold;
            transition: all 0.2s; min-width: 80px; text-align: center;
            display: flex; flex-direction: column; align-items: center; gap: 2px;
        }
        .footer-btn.active { background: var(--accent-color); color: white; border-color: var(--accent-color); }
        .btn-counter { font-size: 0.7rem; opacity: 0.7; font-weight: normal; }
        .footer-btn.active .btn-counter { opacity: 0.9; }
        
        .safe-tag { 
            color: #fff; 
            font-size: 0.85rem; 
            font-weight: bold; 
            position: absolute;
            right: 155px; 
            top: 50%;
            transform: translateY(-50%);
            white-space: nowrap;
        }

        body.user-dj1 .safe-tag { background: var(--safe-track-color); }
        body.user-dj2 .safe-tag { background: var(--dj2-color); color: #121212; }

        .drop-target-area {
            background: #1e1e1e; border: 2px dashed var(--accent-color); border-radius: 8px;
            padding: 15px; text-align: center; color: var(--accent-color); font-weight: bold; margin-bottom: 15px;
            transition: all 0.3s; position: sticky; top: 48px; z-index: 1001; box-shadow: 0 4px 10px rgba(0,0,0,0.5); 
        }
        
        .song-type-icon { margin-left: auto; margin-right: 10px; opacity: 0.6; font-size: 0.9rem; }
        body.user-diff .song-card { cursor: default !important; user-select: none !important; -webkit-user-drag: none !important; }

        .diff-section-header { display: flex; align-items: center; opacity: 0.7; margin-top: 15px; margin-bottom: 5px; font-size: 0.9rem; cursor: pointer; padding: 4px 0; }
        .diff-section-header .collapse-icon { margin-right: 6px; }
        .diff-section-content { display: block; }
        .diff-section-content.collapsed { display: none; }

        .diff-takeover-btn {
            background: #333; color: var(--accent-color); border: 1px solid var(--accent-color);
            border-radius: 4px; padding: 4px 8px; font-size: 0.8rem; font-weight: bold;
            cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center;
        }
        .diff-takeover-btn:active { transform: scale(0.95); background: var(--accent-color); color: #fff; }

        #pdf-template { display: none; color: #000; background: #fff; padding: 15px; font-family: Arial, sans-serif; }
        #pdf-template h1 { font-size: 20px; border-bottom: 2px solid #000; padding-bottom: 5px; margin-bottom: 10px; }
        #pdf-template h2 { font-size: 15px; margin-top: 15px; border-bottom: 1px solid #999; padding-bottom: 3px; margin-bottom: 8px; color: #333; }
        #pdf-template h3 { font-size: 12px; margin-top: 10px; margin-bottom: 4px; color: #555; text-transform: uppercase; }
        #pdf-template .pdf-page { page-break-before: always; }
        #pdf-template .pdf-page:first-child { page-break-before: auto; }
        
        .pdf-auto-columns { columns: 2; column-gap: 30px; column-fill: auto; height: 240mm; orphans: 1; widows: 1; }
        .pdf-columns-container { display: grid; grid-template-columns: 1fr 1fr; column-gap: 30px; align-items: start; }
        .pdf-song-item { padding: 3px 0; border-bottom: 1px solid #eee; font-size: 12px; color: #333; }
        .pdf-block-title { font-weight: bold; margin-top: 8px; font-size: 13px; text-decoration: underline; color: #000; }
        .pdf-keep-together { break-inside: avoid-column; page-break-inside: avoid; margin-bottom: 10px; }

        body.clean-mode .block-header { display: none !important; }
        body.clean-mode .block-item { background: transparent !important; margin-bottom: 0px; border-radius: 0; overflow: visible; border-bottom: 1px dashed #444; padding-bottom: 6px; margin-top: 6px; }
        body.clean-mode .block-content { padding: 0; }
        body.clean-mode .block-item:last-child { border-bottom: none; }

        .dropdown-menu {
            display: none;
            position: absolute;
            top: 35px;
            left: 0;
            background: #252525;
            border: 1px solid var(--accent-color);
            border-radius: 6px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            z-index: 2000;
            min-width: 190px;
            max-height: 300px;
            overflow-y: auto;
        }
        .dropdown-menu.active { display: block; }
        .dropdown-item {
            padding: 10px 15px;
            font-size: 0.9rem;
            color: #eee;
            cursor: pointer;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .dropdown-item:hover { background: #333; }
        .dropdown-item.action-save { color: var(--accent-color); font-weight: bold; }
        .dropdown-item .delete-saved { color: var(--delete-red); font-size: 1.2rem; padding: 0 5px; }
        .dropdown-item .delete-saved:hover { color: #fff; }

        .crossfade-btn-group {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-left: auto;
            margin-right: 5px;
            background: rgba(255, 255, 255, 0.03);
            padding: 2px 6px;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            user-select: none;
        }
        
        .crossfade-toggle-btn {
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
            color: #FF5500;
            transition: color 0.2s;
            font-size: 14px;
        }
        
        .crossfade-toggle-btn.disabled {
            color: #666 !important;
            opacity: 0.5;
        }

        .crossfade-time-display {
            font-size: 0.75rem;
            font-weight: bold;
            color: #aaa;
            min-width: 24px;
            text-align: center;
            cursor: pointer;
        }

        /* IDEE 1: Senkrechtes Popup am Finger */
                /* IDEE 1: Jetzt fest links neben der Skala positioniert */
        .crossfade-popup-slider {
            position: fixed;
            background: #252525;
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid var(--accent-color);
            z-index: 2000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.15s ease, top 0.05s ease; /* top-transition für flüssiges Mitgleiten */
            transform: translate(-100%, -50%); /* Schiebt das Popup komplett links neben den Ankerpunkt */
            margin-left: -10px; /* Kleiner Abstand zur Linie */
        }
        
        .crossfade-popup-slider.active { opacity: 1; }
        
        .popup-label { font-size: 0.9rem; font-weight: bold; color: #fff; }

        
                /* Senkrechte Führungslinie links vom Button */
        .vertical-scale-guide {
            position: fixed;
            width: 4px;
            background: #444;
            border-radius: 2px;
            z-index: 1999;
            pointer-events: none;
            display: none;
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
        }
        
        .vertical-scale-guide.active { display: block; }
        
        .vertical-scale-marker {
            position: absolute;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--accent-color);
            left: -4px;
            transform: translateY(-50%);
            transition: top 0.1s ease;
        }

        /* AB HIER NEU: Beschriftung der Skala */
        .vertical-scale-guide::before,
        .vertical-scale-guide::after {
            position: absolute;
            left: -35px; /* Schiebt den Text links neben die Linie */
            font-size: 0.75rem;
            font-weight: bold;
            color: #aaa;
            width: 30px;
            text-align: right;
            transform: translateY(-50%);
        }

        .vertical-scale-guide::before {
            content: "16s"; /* Oben an der Leiste */
            top: 0;
        }

        .vertical-scale-guide::after {
            content: "0s"; /* Unten an der Leiste */
            top: 100%;
        }


        body.edit-mode .crossfade-btn-group { display: none !important; }
        body.user-diff .crossfade-btn-group { display: none !important; }

        @keyframes atmen-cyan {
            0% { box-shadow: 0 0 5px rgba(0, 173, 181, 0.4); border-color: var(--accent-color); }
            50% { box-shadow: 0 0 20px rgba(0, 173, 181, 0.9); border-color: #00fff2; }
            100% { box-shadow: 0 0 5px rgba(0, 173, 181, 0.4); border-color: var(--accent-color); }
        }

        @keyframes atmen-orange {
            0% { box-shadow: 0 0 5px rgba(255, 170, 0, 0.4); border-color: var(--dj2-color); }
            50% { box-shadow: 0 0 20px rgba(255, 170, 0, 0.9); border-color: #ffd000; }
            100% { box-shadow: 0 0 5px rgba(255, 170, 0, 0.4); border-color: var(--dj2-color); }
        }

        body.user-dj1 .song-card.is-playing {
            animation: atmen-cyan 2s infinite ease-in-out;
            border: 1px solid var(--accent-color);
        }

        body.user-dj2 .song-card.is-playing {
            animation: atmen-orange 2s infinite ease-in-out;
            border: 1px solid var(--dj2-color);
        }

        /* Container für die Teilung */
/* --- KOMPAKTE AKTIONS-ZEILE (UNTER HEADER) --- */

.split-action-row {
    display: flex;
    gap: 8px;
    padding: 2px 10px;
    background-color: #121212; /* Tiefes Dunkel */
    align-items: center;
    height: 48px; /* Sehr flach und platzsparend */
}

.split-half {
    flex: 1;
    display: flex;
    flex-direction: column; /* <-- DAS ist der entscheidende Befehl! */
    gap: 10px;              /* Gibt den Elementen etwas Luft zum Atmen */
    padding: 10px;
    box-sizing: border-box;
}

/* Damit die Drop-Zones (Listen) Platz haben */
.drop-zone {
    flex-grow: 1;           /* Nimmt den restlichen Platz ein */
    min-height: 300px;      /* Damit man immer was sieht */
    border: 1px dashed #444; /* Nur zur Kontrolle, kannst du später entfernen */
    margin-top: 10px;
}


/* Linker Button: Neuer Block */
.btn-add-block {
    width: 100%;
    height: 32px; /* Einheitliche Höhe */
    background: transparent;
    border: 1px solid #00a0a0;
    color: #00a0a0;
    border-radius: 4px;
    font-size: 10px;
    font-weight: bold;
    cursor: pointer;
    text-transform: uppercase;
    display: flex;
    align-items: center;

}

/* Rechte Seite: Input Gruppe */
.input-section {
    display: flex;
    width: 100%;

    align-items: center;
}

/* Ordner-Button */
.btn-folder-select {
    background: #222;
    border: 1px solid #444;
    height: 32px;
    width: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 4px;

/* Song Eingabefeld */
#blocklistInputGlobal {

}

/* Der Plus-Button ganz rechts */
.btn-plus {
    background-color: #00a0a0;

    border: none;

/* Der Container, der alle Blöcke hält */
/* --- ZWEI-SPALTEN-LAYOUT FÜR DJ-BLÖCKE --- */
/* --- ZWEI-SPALTEN-LAYOUT: MARC LINKS, GUNNAR RECHTS --- */
#blocklist-container {
    display: grid;
    /* Fest auf 2 Spalten eingestellt - 1fr 1fr sorgt für 50/50 Teilung */
    grid-template-columns: 1fr 1fr; 
gap: 8px !important;    padding: 10px;
    align-items: flex-start;
}

/* Die einzelnen Blöcke (Ordner) */
.block-item {
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 6px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    margin-bottom: 5px !important;
}

/* Erzwingt, dass Marc-Blöcke in der linken Spalte (1) landen */
.block-item.owner-marc {
    grid-column: 1;
    border-top: 3px solid var(--accent-color);
}

/* Erzwingt, dass Gunnar-Blöcke in der rechten Spalte (2) landen */
.block-item.owner-gunnar {
    grid-column: 2;
    border-top: 3px solid var(--dj2-color);
}

/* Kompakter Block-Header */
.block-header {
    padding: 2px 10px;
    background: rgba(255, 255, 255, 0.05);
    display: flex;
    align-items: center;
    min-height: 30px;
}

.block-header strong {
    font-size: 0.9rem;
    letter-spacing: 0.5px;
}

/* Platzersparnis im Block-Inhalt */
.block-content {
    padding: 4px;
}

.locked-container {
    border: 1px solid #ff4444; /* Ein roter Rahmen, wenn gesperrt */
    background: rgba(255, 0, 0, 0.05); /* Dezenter roter Hintergrund */
    pointer-events: none; /* Verhindert Klicks auf die Liste */
}
/* Aber die Toolbar soll natürlich bedienbar bleiben! */
.locked-container .dj-toolbar {
    pointer-events: auto;
}

/* Layout für die beiden Spalten - Zusammengefasst */
.dj-column {
    flex: 1; /* Beide nehmen gleich viel Platz ein */
    min-width: 300px; 
    display: flex;
    flex-direction: column;
    padding: 2px;
    /* Optional: Trennung optisch unterstreichen */
}

<script>
    let DEFAULT_CROSSFADE = 8;   
    let directoryHandle = null; 
    let activePlayBtn = null;

    let longPressTimer = null;
    let currentlyEditingSongCard = null; 
    let currentObjectUrl = null; 

    let audio1 = new Audio();
    let audio2 = new Audio();
    let currentPlayer = audio1;
    let nextPlayer = audio2;

    let fadeInInterval = null;
    let nextSongTriggered = false; 
    

window.dataDJ1 = []; 
window.dataDJ2 = [];
window.lastKnownDJ1 = [];
window.lastKnownDJ2 = [];
window.sortableDJ1 = null;
window.sortableDJ2 = null;

window.isAppReady = false; // Wir sind noch nicht bereit

    window.toggleCrossfadeState = function(cardElement) {
        const toggleBtn = cardElement.querySelector('.crossfade-toggle-btn');
        const display = cardElement.querySelector('.crossfade-time-display');
        
        if (!toggleBtn || !display) return;

        if (toggleBtn.classList.contains('disabled')) {
            toggleBtn.classList.remove('disabled');
            let sVal = parseInt(display.innerText);
            if (sVal === 0) display.innerText = DEFAULT_CROSSFADE + 's';
        } else {
            toggleBtn.classList.add('disabled');
            display.innerText = '0s';
        }
        window.saveData();
    };

    window.setupCrossfadeEvents = function(cardElement) {
        const cfGroup = cardElement.querySelector('.crossfade-btn-group');
        if (!cfGroup) return;

        cfGroup.addEventListener('click', (e) => {
            e.stopPropagation();
            if (longPressTimer) clearTimeout(longPressTimer);
            window.toggleCrossfadeState(cardElement);
        });
    };

window.toggleExpandAll = function(djId) {
    const container = document.getElementById(djId + '-container');
    if (!container) {
        console.warn(`Container für ${djId} nicht gefunden.`);
        return;
    }

    // 1. Suche alle Blöcke NUR in diesem Container
    const items = container.querySelectorAll('.block-item');
    
    // 2. Prüfe, ob sie aktuell alle eingeklappt sind (um den Toggle-Status zu bestimmen)
    // Wenn alle 'collapsed' haben, wollen wir aufklappen. Sonst: alles einklappen.
    const allCollapsed = Array.from(items).every(item => item.classList.contains('collapsed'));

    items.forEach(block => {
        const icon = block.querySelector('.collapse-icon');
        
        if (allCollapsed) {
            block.classList.remove('collapsed');
            if (icon) icon.style.transform = "rotate(0deg)";
        } else {
            block.classList.add('collapsed');
            if (icon) icon.style.transform = "rotate(-90deg)";
        }
    });
};

// In deiner Render-Funktion für die Blöcke:
function renderBlocks() {
    const container = document.getElementById('blocklist-container');
    if (!container) return;
    container.innerHTML = '';

    allBlocks.forEach((block, index) => {
        const blockDiv = document.createElement('div');
        
        // Bestimmung der Klasse basierend auf dem Ersteller
        // Falls 'createdBy' nicht existiert, wird standardmäßig Marc (dj1) genommen
        const userClass = (block.createdBy === 'dj2') ? 'owner-gunnar' : 'owner-marc';
        
        // Klassen zuweisen (inkl. collapsed-Status, falls vorhanden)
        blockDiv.className = `block-item ${userClass} ${block.collapsed ? 'collapsed' : ''}`;
        blockDiv.dataset.index = index; // Wichtig für spätere Zuordnung

        // --- HIER FOLGT DEIN BESTEHENDER CODE FÜR HEADER & SONGS ---
        // Beispielhaft:
        // const header = createBlockHeader(block, index); 
        // const content = createBlockContent(block, index);
        // blockDiv.appendChild(header);
        // blockDiv.appendChild(content);
        
        container.appendChild(blockDiv);
    });
}

window.toggleSaveDropdown = function(djId) {
    const container = document.getElementById(djId + '-container');
    if (!container) {
        console.warn(`Container für ${djId} nicht gefunden.`);
        return;
    }

    // Suche das Dropdown NUR innerhalb dieses Containers
    const dropdown = container.querySelector('.save-dropdown');
    
    if (!dropdown) {
        console.warn(`Dropdown für ${djId} nicht gefunden. Stelle sicher, dass die Klasse '.save-dropdown' im HTML existiert.`);
        return;
    }

    // Toggle die Sichtbarkeit (nutzt CSS für das Ein-/Ausblenden)
    dropdown.classList.toggle('show');
};

    // Global irgendwo oben in deinem Skript definieren:
window.folderHandles = {}; 

window.triggerFolderSelection = async function(djId) {
    const container = document.getElementById(djId + '-container');
    if (!container) return;

    const btn = container.querySelector('.btn-folder-select');
    if (!btn) return;
    
    try {
        // HIER: Speichere das Handle spezifisch für den DJ
        window.folderHandles[djId] = await window.showDirectoryPicker();
        
        btn.classList.add('active');
        // Visuelles Feedback
        btn.setAttribute('title', 'Ordner verknüpft'); 
        alert("Ordner erfolgreich für " + djId + " verknüpft!");
    } catch (err) {
        console.log("Ordnerauswahl abgebrochen.", err);
        btn.classList.remove('active');
    }
};

    function findeNaechsteKarte(aktuellerButton) {
        const aktuelleKarte = aktuellerButton.closest('.song-card');
        if (!aktuelleKarte) return null;

        const container = document.getElementById('blocklist-container');
        const alleElemente = Array.from(container.children);
        const alleSongKarten = [];
        
        alleElemente.forEach(element => {
            if (element.classList.contains('song-card')) {
                alleSongKarten.push(element);
            } else if (element.classList.contains('block-item')) {
                const songsImBlock = element.querySelectorAll('.block-sortable-list .song-card');
                songsImBlock.forEach(song => alleSongKarten.push(song));
            }
        });

        const aktuellerIndex = alleSongKarten.indexOf(aktuelleKarte);
        
        if (aktuellerIndex !== -1 && aktuellerIndex < alleSongKarten.length - 1) {
            return alleSongKarten[aktuellerIndex + 1];
        }
        return null; 
    }

    function fadeInPlayer(player, durationSec) {
        if (fadeInInterval) clearInterval(fadeInInterval);
        
        player.volume = 0;
        player.play().catch(e => console.log("Autoplay blockiert oder Datei defekt."));

        const step = 0.02; 
        const intervalTime = (durationSec * 1000) * step; 
        
        fadeInInterval = setInterval(() => {
            if (player.volume < 1 - step) {
                player.volume += step;
            } else {
                player.volume = 1;
                clearInterval(fadeInInterval);
            }
        }, intervalTime);
    }

    window.playPreview = async function(e, title, artist = '', isAutoplayNext = false, forceDisabled = false, forcedCfTime = 8) {
        if (e) e.stopPropagation(); 
        let clickedBtn = e ? e.currentTarget : null;
        let currentCard = clickedBtn ? clickedBtn.closest('.song-card') : null;

        if (isAutoplayNext && !clickedBtn) {
            const alleKarten = document.querySelectorAll('.song-card');
            for (let karte of alleKarten) {
                const titleText = karte.querySelector('.song-title-text').innerText;
                if (titleText === title) {
                    currentCard = karte;
                    clickedBtn = karte.querySelector('.play-preview-btn');
                    break;
                }
            }
        }

        if (!isAutoplayNext && activePlayBtn === clickedBtn) {
            audio1.pause(); audio1.src = ''; audio1.volume = 1;
            audio2.pause(); audio2.src = ''; audio2.volume = 1;
            audio1.ontimeupdate = null; audio2.ontimeupdate = null;
            audio1.onended = null; audio2.onended = null;
            audio1.onloadedmetadata = null; audio2.onloadedmetadata = null;
            if (fadeInInterval) clearInterval(fadeInInterval);
            
            if (currentObjectUrl) { URL.revokeObjectURL(currentObjectUrl); currentObjectUrl = null; }
            
            clickedBtn.innerText = '▶️';
            clickedBtn.classList.remove('playing');
            if (currentCard) currentCard.classList.remove('is-playing');
            
            activePlayBtn = null;
            return;
        }

        if (activePlayBtn && activePlayBtn !== clickedBtn) {
            activePlayBtn.innerText = '▶️';
            activePlayBtn.classList.remove('playing');

            const oldCard = activePlayBtn.closest('.song-card');
            if (oldCard) oldCard.classList.remove('is-playing');
        }

        if (clickedBtn) {
            clickedBtn.innerText = '⏳'; 
            activePlayBtn = clickedBtn;
        }

        let currentCrossfadeTime = isAutoplayNext ? forcedCfTime : DEFAULT_CROSSFADE;
        let isCrossfadeDisabled = isAutoplayNext ? forceDisabled : false;

        if (!isAutoplayNext && currentCard) {
            const timeDisplay = currentCard.querySelector('.crossfade-time-display');
            const toggleBtn = currentCard.querySelector('.crossfade-toggle-btn');
            
            if (timeDisplay) currentCrossfadeTime = parseInt(timeDisplay.innerText) || 0;
            if (toggleBtn && toggleBtn.classList.contains('disabled')) {
                isCrossfadeDisabled = true;
            }
        }
        
        if (currentCrossfadeTime === 0) currentCrossfadeTime = 5; 
        if (currentCrossfadeTime > 20) currentCrossfadeTime = 20; 

        if (directoryHandle) {
            try {
                const searchName = title.toLowerCase().trim();
                let fileToPlay = null;

                for await (const entry of directoryHandle.values()) {
                    if (entry.kind === 'file') {
                        const lowerName = entry.name.toLowerCase();
                        if (lowerName.includes(searchName) && (lowerName.endsWith('.mp3') || lowerName.endsWith('.m4a'))) {
                            fileToPlay = await entry.getFile();
                            break;
                        }
                    }
                }

                if (!fileToPlay) {
                    alert(`Datei für "${title}" wurde im Ordner nicht gefunden.`);
                    if (clickedBtn) clickedBtn.innerText = '▶️';
                    if (currentCard) currentCard.classList.remove('is-playing');
                    activePlayBtn = null;
                    return;
                }

                if (!isAutoplayNext && currentObjectUrl) {
                    URL.revokeObjectURL(currentObjectUrl);
                }

                const url = URL.createObjectURL(fileToPlay);
                currentObjectUrl = url;

                if (isAutoplayNext) {
                    currentPlayer = (currentPlayer === audio1) ? audio2 : audio1;
                    currentPlayer.src = url;
                    
                    if (isCrossfadeDisabled) {
                        if (fadeInInterval) clearInterval(fadeInInterval);
                        currentPlayer.volume = 1;
                        currentPlayer.play().catch(e => console.log("Autoplay blockiert oder gescheitert."));
                    } else {
                        fadeInPlayer(currentPlayer, currentCrossfadeTime);
                    }
                    
                } else {
                    if (fadeInInterval) clearInterval(fadeInInterval);
                    audio1.pause(); audio2.pause();
                    audio1.ontimeupdate = null; audio2.ontimeupdate = null;
                    audio1.onended = null; audio2.onended = null;
                    audio1.onloadedmetadata = null; audio2.onloadedmetadata = null;
                    audio1.volume = 1; audio2.volume = 1;
                    currentPlayer = audio1;
                    nextPlayer = audio2;
                    
                    currentPlayer.src = url;
                }

                nextSongTriggered = false; 

                currentPlayer.onloadedmetadata = () => {
                    if (!isAutoplayNext) {
                        const startPoint = Math.max(0, currentPlayer.duration - 20);
                        currentPlayer.currentTime = startPoint;
                        currentPlayer.play().catch(e => console.log("Abspielen fehlgeschlagen."));
                    } else {
                        currentPlayer.currentTime = 0;
                        currentPlayer.play().catch(e => console.log("Abspielen fehlgeschlagen."));
                    }
                };

                const songSnapshotCard = currentCard;
                const songSnapshotBtn = clickedBtn;

                currentPlayer.onplay = () => {
                    if (songSnapshotBtn) {
                        songSnapshotBtn.innerText = '⏹️';
                        songSnapshotBtn.classList.add('playing');
                    }
                    if (songSnapshotCard) {
                        songSnapshotCard.classList.add('is-playing');
                    }
                };

                currentPlayer.onended = () => {
                    if (songSnapshotBtn) {
                        songSnapshotBtn.innerText = '▶️';
                        songSnapshotBtn.classList.remove('playing');
                    }
                    if (songSnapshotCard) {
                        songSnapshotCard.classList.remove('is-playing');
                    }
                };

                currentPlayer.ontimeupdate = () => {
                    if (isAutoplayNext) {
                        if (currentPlayer.currentTime >= 20) {
                            currentPlayer.pause();
                            currentPlayer.ontimeupdate = null; 
                            
                            if (songSnapshotBtn) {
                                songSnapshotBtn.innerText = '▶️';
                                songSnapshotBtn.classList.remove('playing');
                            }
                            if (songSnapshotCard) {
                                songSnapshotCard.classList.remove('is-playing');
                            }
                            
                            activePlayBtn = null; 
                            return;
                        }
                    } else {
                        const timeLeft = currentPlayer.duration - currentPlayer.currentTime;
                        
                        if (timeLeft <= currentCrossfadeTime && !nextSongTriggered) {
                            nextSongTriggered = true; 
                            
                            const naechsteKarte = findeNaechsteKarte(songSnapshotBtn);
                            if (naechsteKarte) {
                                const naechsterTitle = naechsteKarte.querySelector('.song-title-text').innerText;
                                const naechsterArtistEl = naechsteKarte.querySelector('.song-artist-text');
                                const naechsterArtist = naechsterArtistEl ? naechsterArtistEl.innerText : '';
                                
                                window.playPreview(
                                    null, 
                                    naechsterTitle, 
                                    naechsterArtist, 
                                    true,               
                                    isCrossfadeDisabled,
                                    currentCrossfadeTime
                                );
                            }
                        }

                        if (currentPlayer.volume <= 0.05) {
                            if (songSnapshotBtn && songSnapshotBtn.innerText === '⏹️') {
                                songSnapshotBtn.innerText = '▶️';
                                songSnapshotBtn.classList.remove('playing');
                            }
                            if (songSnapshotCard) {
                                songSnapshotCard.classList.remove('is-playing');
                            }
                        }
                    }
                };
            } catch (err) {
                console.error("Fehler beim Lesen des Ordners:", err);
            }
        } else {
            alert("Bitte verknüpfe zuerst einen Ordner über das Ordner-Symbol links neben dem Suchfeld!");
            if (clickedBtn) clickedBtn.innerText = '▶️';
            activePlayBtn = null;
        }
    };
</script>

<script>
    const folderColors = ['var(--f-none)', 'var(--f-blue)', 'var(--f-red)', 'var(--f-green)', 'var(--f-gold)'];
    let blocklistMasterSortable;
    let currentUser = 'dj1'; 
    let expandedBlockIds = new Set(); 
    let currentDiffFilter = 'all'; 

    let diffCollapsedState = { 'onlyMarc': false, 'onlyGunnar': false };

    let userStates = {
        'dj1': { isLocked: true, editMode: false, allCollapsed: true, cleanMode: false },
        'dj2': { isLocked: true, editMode: false, allCollapsed: true, cleanMode: false },
        'diff': { isLocked: true, editMode: false, allCollapsed: false }
    };

    window.addEventListener('click', function(e) {
        const dropdown = document.getElementById('save-dropdown');
        const saveBtn = document.getElementById('header-btn-save');
        
        if (dropdown && dropdown.classList.contains('active')) {
            if (!dropdown.contains(e.target) && !saveBtn.contains(e.target)) {
                dropdown.classList.remove('active');
            }
        }
    });

    window.toggleDropdown = function() {
        if (currentUser === 'diff') {
            alert("Im Differenz-Modus können keine Sets gespeichert oder geladen werden.");
            return;
        }
        const dropdown = document.getElementById('save-dropdown');
        
        if (!dropdown.classList.contains('active')) {
            if (typeof window.loadSavedTemplatesList === 'function') {
                window.loadSavedTemplatesList(); 
            }
        }
        dropdown.classList.toggle('active');
    };

    window.headerActionLeft = function(djId) {
    // Falls du den 'diff'-Modus noch brauchst, behandeln wir ihn separat
    if (djId === 'diff') {
        if(confirm("Möchtest du die Setlisten jetzt als PDF exportieren?\nEs wird eine Datei mit 3 getrennten Seiten erstellt.")) {
            window.generatePDFExport();
        }
        return;
    }

    // Standard-Logik: Nur für den übergebenen DJ
    if (userStates && userStates[djId]) {
        userStates[djId].editMode = !userStates[djId].editMode;
        // WICHTIG: Hier muss dein Update-Aufruf auch das djId erhalten!
        window.applyUserStatesToUI(djId); 
    }
};

    window.headerActionRight = function(djId) {
    if (djId === 'diff') {
        // Hier behalten wir deine alte Logik bei, falls du sie für den Vergleich brauchst
        // (Ich habe sie hier nur kurz angedeutet, da sie spezifisch bleibt)
        console.log("Diff-Modus aktiv - spezifische Logik erforderlich.");
        return;
    }

    // Finde den Container für diesen DJ
    const container = document.getElementById(djId + '-container');
    if (!container) return;

    // Suche die Liste in DIESEM Container
    const list = container.querySelector('.drop-zone');
    
    // Toggle die 'collapsed'-Klasse
    if (list) {
        list.classList.toggle('collapsed');
        // Falls du Icons hast, die sich drehen sollen:
        const icon = container.querySelector('.collapse-icon');
        if (icon) {
            icon.style.transform = list.classList.contains('collapsed') 
                ? "rotate(-90deg)" 
                : "rotate(0deg)";
        }
    }
};

    window.toggleCleanMode = function(owner) {
    // 1. Spezialfall: Diff-Ansicht
    if (owner === 'diff') {
        if (currentDiffFilter === 'all') currentDiffFilter = 'blocks';
        else if (currentDiffFilter === 'blocks') currentDiffFilter = 'singles';
        else currentDiffFilter = 'all';
        
        // HIER: Das 'diff' Argument mitgeben!
        window.applyUserStatesToUI('diff'); 
        
        if (window.renderCurrentState) window.renderCurrentState();
        return; 
    }

    function initMasterSortables() {
    const el1 = document.getElementById('dj1-list');
    const el2 = document.getElementById('dj2-list');

    // Alte Instanzen zerstören, falls sie existieren
    if (window.sortableDJ1) window.sortableDJ1.destroy();
    if (window.sortableDJ2) window.sortableDJ2.destroy();
    
    // Nur DJ1 und DJ2 dürfen sortieren, 'diff' (Zuschauer) nicht
    if (currentUser === 'diff') return;

    const sortableOptions = {
        group: 'shared-list', // Beide müssen die gleiche Gruppe haben, um zwischen den Listen zu wechseln!
        animation: 150, 
        handle: '.drag-handle, .song-details', 
        ghostClass: 'sortable-ghost',
        disabled: userStates[currentUser].isLocked, 
        onEnd: function(evt) {
            // WICHTIG: Besitzer im DOM sofort aktualisieren!
            // Wenn man einen Block verschiebt, gehört er jetzt dem aktiven User (bzw. 
            // man könnte hier auch logisch prüfen, in welcher Liste er gelandet ist)
            evt.item.setAttribute('data-owner', currentUser);
            
            // Erst danach speichern
            window.saveData(); 
        },
        onMove: function (evt) {
            const isDraggingBlock = evt.dragged.classList.contains('block-item');
            const targetIsNested = evt.to.classList.contains('block-sortable-list');

            // Verhindert, dass Blöcke in andere Blöcke geschoben werden
            if (isDraggingBlock && targetIsNested) {
                return false;
            }
        }
    };

    // Initialisierung für BEIDE Container
    if (el1) window.sortableDJ1 = new Sortable(el1, sortableOptions);
    if (el2) window.sortableDJ2 = new Sortable(el2, sortableOptions);
}

    window.deleteItem = async function(id) {
    if (!id) {
        console.warn("Löschen abgebrochen: Keine ID übergeben.");
        return;
    }
    
    console.log("Lösche Element mit ID:", id);
    
    // Sicherheit: Fallback auf leere Arrays, falls Daten noch nicht geladen sind
    const list1 = window.dataDJ1 || [];
    const list2 = window.dataDJ2 || [];

    let targetDoc = null;
    let newData = null;

    // Suche in DJ1
    if (list1.find(item => item.id === id)) {
        targetDoc = "set1_dj1";
        newData = list1.filter(item => item.id !== id);
    } 
    // Suche in DJ2
    else if (list2.find(item => item.id === id)) {
        targetDoc = "set1_dj2";
        newData = list2.filter(item => item.id !== id);
    }

    // Wenn gefunden: Datenbank-Update
    if (targetDoc && newData) {
        try {
            await updateDoc(doc(db, "mojoblox", targetDoc), {
                blocklist: newData
            });
            console.log("Erfolgreich aus DB gelöscht.");
        } catch (error) {
            console.error("Fehler beim Löschen:", error);
            alert("Löschen fehlgeschlagen: " + error.message);
        }
    } else {
        console.warn("Element mit ID", id, "wurde in den globalen Daten nicht gefunden.");
    }
};

    function renderCombinedUI() {
    const bContainer = document.getElementById('blocklist-container');
    if (!bContainer) return;

    // 1. Daten sicher abrufen
    const list1 = (Array.isArray(window.dataDJ1) && window.dataDJ1.length > 0) 
                  ? window.dataDJ1 
                  : (window.lastKnownDJ1 || []);
                  
    const list2 = (Array.isArray(window.dataDJ2) && window.dataDJ2.length > 0) 
                  ? window.dataDJ2 
                  : (window.lastKnownDJ2 || []);

    // 2. HIER WIRD 'combined' DEFINIERT! (Das fehlte in deinem Snippet)
    const combined = [...list1, ...list2];

    console.log("RENDER DEBUG: DJ1(Global):", list1.length, "DJ2(Global):", list2.length, "Combined:", combined.length);

    bContainer.innerHTML = '';
    const renderedFingerprints = new Set();

    // 3. Sicherheits-Check: Ist die Liste leer?
    if (combined.length === 0) {
        console.log("Render-Abbruch: Keine Daten zum Anzeigen.");
        return;
    }

    // 4. Liste rendern
    combined.forEach((item) => {
        if (!item) return;

        let elementKey = item.id || `single-${item.t || item.title}-${item.a || item.artist}`;
        if (renderedFingerprints.has(elementKey)) return;
        renderedFingerprints.add(elementKey);

        if (item.type === 'block' && Array.isArray(item.s)) {
            const seenInBlock = new Set();
            const cleanSongs = item.s.filter(song => {
                const songKey = `${(song.title || song.t || "").toLowerCase()}-${(song.artist || song.a || "").toLowerCase()}`.replace(/\s+/g, '');
                if (seenInBlock.has(songKey)) return false;
                seenInBlock.add(songKey);
                return true;
            });
            window.addBlockToBlocklistUI(item.t, cleanSongs, item.cIdx || 0, item.id, item.createdBy);
        } else if (item.type === 'single') {
            const singleEl = document.createElement('div');
            singleEl.className = 'block-item single-song-card'; 
            singleEl.setAttribute('data-id', item.id || 'no-id');
            singleEl.setAttribute('data-owner', item.createdBy || 'dj1');
            
            // --- HIER DIE ÄNDERUNG ---
            // Wir prüfen, ob eine ID da ist. Wenn nicht, zeigen wir kein "X" an.
            const deleteButtonHtml = item.id 
                ? `<button onclick="deleteItem('${item.id}')" class="btn-sm">❌</button>` 
                : `<span class="btn-sm">⚠️</span>`;

            singleEl.innerHTML = `

                        <small style="opacity: 0.7;">${item.a || item.artist || 'Unbekannt'}</small>
                    </div>
                    <div class="block-actions">
                        <button onclick="window.playPreview(event, '${item.t || item.title}', '${item.a || item.artist || ''}')" class="btn-sm">▶️</button>
                        ${deleteButtonHtml}
                    </div>
                </div>
            `;
            bContainer.appendChild(singleEl);
        }
    });
}

    // --- 2. SAVE DATA (GEFILTERT) ---

window.saveData = async () => {
    // 1. SICHERHEIT: Wenn die App noch lädt, darf nicht gespeichert werden!
    if (!window.isAppReady) {
        console.warn("SICHERHEIT: Speichern abgebrochen: App ist noch nicht bereit.");

        return;
    }

    if (currentUser === 'diff') return;

    // 2. DOM lesen: Wir suchen jetzt in BEIDEN Listen nach .block-item
    const elements = document.querySelectorAll('#dj1-list .block-item, #dj2-list .block-item');
    
    // 3. SICHERHEIT: Wenn wir absolut gar keine Elemente finden, könnte ein Ladefehler vorliegen.
    // Aber Achtung: Wenn du bewusst eine leere Liste speichern willst, wäre das hier zu streng.
    // Falls das UI bei dir "Lade Daten..." zeigt, schützt uns isAppReady oben.
    if (elements.length === 0 && window.isAppReady) {
        console.warn("HINWEIS: Keine Elemente gefunden, speichere leere Liste.");
    }

    const allItems = [...(window.dataDJ1 || []), ...(window.dataDJ2 || [])];
    const itemMap = new Map(allItems.map(i => [i.id, i]));

    const myFilteredList = [];

    elements.forEach(el => {
        const owner = el.getAttribute('data-owner');
        const id = el.getAttribute('data-id');

        // Wir sammeln nur die Items, die dem aktuellen User gehören
        if (owner === currentUser) {
            const originalItem = itemMap.get(id);
            if (originalItem) {
                myFilteredList.push(originalItem);
            }
        }
    });

    const docName = currentUser === 'dj1' ? "set1_dj1" : "set1_dj2";
    
    try {
        await setDoc(doc(db, "mojoblox", docName), {
            blocklist: myFilteredList,
            timestamp: Date.now()
        });
        console.log(`Daten für ${currentUser} wurden erfolgreich in Firebase gespeichert.`);
    } catch (e) {
        console.error("Fehler beim Speichern:", e);
    }
};

    // --- 3. BUILD DATA (MIT OWNER-ERKENNUNG) ---

    window.buildCurrentData = () => {
        const container = document.getElementById('blocklist-container');
        const data = { blocklist: [], timestamp: Date.now() };
        
        container.childNodes.forEach(node => {
            if(node.nodeType !== 1) return;
            
            if(node.classList.contains('block-item')) {
                // Wer ist der Besitzer laut CSS Klasse?
                let owner = node.classList.contains('owner-gunnar') ? 'dj2' : 'dj1';

                const list = node.querySelector('.block-sortable-list');
                const songObjects = Array.from(list.querySelectorAll('.song-card')).map(card => {
                    const details = card.querySelector('.song-details');
                    const isOff = card.querySelector('.crossfade-toggle-btn').classList.contains('disabled');
                    const cfTime = isOff ? 0 : (parseInt(card.querySelector('.crossfade-time-display').innerText) || 5);
                    return { 
                        title: details.querySelector('.song-title-text').innerText, 
                        artist: details.querySelector('.song-artist-text')?.innerText || '',
                        cf: cfTime
                    };
                });

                const titleEl = node.querySelector('strong');
                let rawTitle = titleEl.innerText;
                const countSpan = titleEl.querySelector('.block-song-count');
                if (countSpan) rawTitle = rawTitle.replace(countSpan.innerText, '').trim();

                data.blocklist.push({ 
                    type: 'block', 
                    id: node.id, 
                    t: rawTitle, 
                    s: songObjects, 
                    cIdx: node.dataset.colorIndex || 0,
                    createdBy: owner 
                });

            } else if(node.classList.contains('song-card')) {
                const details = node.querySelector('.song-details');
                const isOff = node.querySelector('.crossfade-toggle-btn').classList.contains('disabled');
                const cfTime = isOff ? 0 : (parseInt(node.querySelector('.crossfade-time-display').innerText) || 5);
                data.blocklist.push({ 
                    type: 'single', 
                    title: details.querySelector('.song-title-text').innerText,
                    artist: details.querySelector('.song-artist-text')?.innerText || '',
                    cf: cfTime
                });
            }
        });
        return data;
    };

    // --- 4. TEMPLATES & VORLAGEN ---

    window.saveCurrentAsTemplate = async () => {
        const templateName = prompt("Name für dieses Set:");
        if (!templateName?.trim()) return;

        const data = window.buildCurrentData();
        data.templateName = templateName.trim();
        data.owner = currentUser; 

        try {
            await setDoc(doc(db, "mojoblox_templates", `${currentUser}_${Date.now()}`), data);
            alert("Vorlage gespeichert!");
        } catch (e) { console.error(e); }
    };

    window.loadSavedTemplatesList = async () => {
        const container = document.getElementById('saved-lists-container');
        if (!container) return;
        container.innerHTML = 'Lade...';
        
        try {
            const q = query(collection(db, "mojoblox_templates"), where("owner", "==", currentUser));
            const querySnapshot = await getDocs(q);
            container.innerHTML = '';

            if (querySnapshot.empty) {
                container.innerHTML = '<div class="dropdown-item">Keine Vorlagen</div>';

    window.deleteTemplate = async (event, docId, name) => {
        event.stopPropagation(); 
        if (!confirm(`Möchtest du das gespeicherte Set "${name}" wirklich löschen?`)) return;
        
        try {

    function extractAllSongsWithMetadata(blocklist) {
        let songs = [];
        if (!blocklist) return songs;
        blocklist.forEach(item => {
            if (item.type === 'block' && item.s) {
                item.s.forEach(song => {
                    const sTitle = (typeof song === 'string') ? song : (song.title || '');
                    const sArtist = (typeof song === 'object' && song.artist) ? song.artist : '';
                    songs.push({ title: sTitle, artist: sArtist, parentType: 'block' });
                });
            }
            if (item.type === 'single' && item.title) {
                songs.push({ title: item.title, artist: item.artist || '', parentType: 'single' });
            }
        });
        return songs;
    }

    function extractAllSongs(blocklist) { return extractAllSongsWithMetadata(blocklist).map(s => s.title); }

            if (!list || list.length === 0) return '<p><i>Keine Songs</i></p>';

            let hasBlocks = false; let hasSingles = false;

            list.forEach((item) => {
                if (item.type === 'single') {
                    hasSingles = true;
                    singleHtml += `<div class="pdf-song-item">${item.title}${item.artist ? ` <span style="font-size:10px; color:#666;">(${item.artist})</span>` : ''}</div>`;
                } else if (item.type === 'block') {
                    hasBlocks = true;
                    let html = `<div class="pdf-keep-together">`;
                    html += `<div class="pdf-block-title">${item.t}</div>`;
                    if (item.s && item.s.length > 0) {
                        item.s.forEach(s => {
                            const sTitle = (typeof s === 'string') ? s : (s.title || '');
                            const sArtist = (typeof s === 'object' && s.artist) ? s.artist : '';
                            html += `<div class="pdf-song-item" style="padding-left:10px;">- ${sTitle}${sArtist ? ` <span style="font-size:10px; color:#666;">(${sArtist})</span>` : ''}</div>`;
                        });
                    } else html += `<div class="pdf-song-item" style="padding-left:10px; opacity:0.5;"><i>(Leerer Block)</i></div>`;
                    html += `</div>`;
                    blockHtml += html;
                }
            });

            let finalHtml = '';
            if (hasBlocks) finalHtml += `<h2>Songs in Blöcken</h2><div class="pdf-auto-columns">${blockHtml}</div>`;
            if (hasSingles) finalHtml += `<h2>Lose Songs</h2><div class="pdf-auto-columns">${singleHtml}</div>`;
            return finalHtml || '<p><i>Keine Songs</i></p>';
        };

        const buildDiffColumnContent = (onlyList) => {
            if (onlyList.length === 0) return '<p><i>Keine</i></p>';
            let blockSongs = onlyList.filter(s => s.parentType === 'block');
            let singleSongs = onlyList.filter(s => s.parentType === 'single');
            let html = '';
            const getDisplayString = (s) => s.artist ? `${s.title} <span style="font-size:10px; color:#666;">(${s.artist})</span>` : s.title;
            
            if (blockSongs.length > 0) { html += `<h3>In Blöcken:</h3>`; blockSongs.forEach(s => html += `<div class="pdf-song-item">${getDisplayString(s)}</div>`); }
            if (singleSongs.length > 0) { html += `<h3>Lose Songs:</h3>`; singleSongs.forEach(s => html += `<div class="pdf-song-item">${getDisplayString(s)}</div>`); }
            return html;
        };

        let page1 = document.createElement('div'); page1.className = 'pdf-page';
        page1.innerHTML = `<h1>Setliste - Marc</h1>` + buildSongListHTML(dataDJ1.blocklist);
        pdfContainer.appendChild(page1);

        let page2 = document.createElement('div'); page2.className = 'pdf-page';
        page2.innerHTML = `<h1>Setliste - Gunnar</h1>` + buildSongListHTML(dataDJ2.blocklist);
        pdfContainer.appendChild(page2);

        const songsWithMetaDJ1 = extractAllSongsWithMetadata(dataDJ1.blocklist);
        const songsWithMetaDJ2 = extractAllSongsWithMetadata(dataDJ2.blocklist);
        const onlyDJ1 = songsWithMetaDJ1.filter(s => !songsWithMetaDJ2.some(s2 => s2.title.toLowerCase().trim() === s.title.toLowerCase().trim()));
        const onlyDJ2 = songsWithMetaDJ2.filter(s => !songsWithMetaDJ1.some(s1 => s1.title.toLowerCase().trim() === s.title.toLowerCase().trim()));

        let page3 = document.createElement('div'); page3.className = 'pdf-page';
        page3.innerHTML = `<h1>Differenzen</h1>`;
        page3.innerHTML += `
            <div class="pdf-columns-container">
                <div><h2>Nur bei Marc:</h2>${buildDiffColumnContent(onlyDJ1)}</div>
                <div><h2>Nur bei Gunnar:</h2>${buildDiffColumnContent(onlyDJ2)}</div>
            </div>`;
        pdfContainer.appendChild(page3);

        const opt = { margin: 10, filename: 'MoJoBloX_Duo_Setlisten.pdf', image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2, useCORS: true }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } };
        pdfContainer.style.display = 'block';
        setTimeout(() => { html2pdf().set(opt).from(pdfContainer).save().then(() => { pdfContainer.style.display = 'none'; }).catch(err => { console.error(err); pdfContainer.style.display = 'none'; }); }, 500);
    };

    window.executeQuickAdd = async (songTitle, songArtist, originalOwner) => {
        const targetUser = (originalOwner === 'dj1') ? 'dj2' : 'dj1';

        try {
            const docRef = doc(db, "mojoblox", docName);
            const docSnap = await getDoc(docRef);

            if (extractAllSongs(targetData.blocklist).some(s => s.toLowerCase().trim() === songTitle.toLowerCase().trim())) { alert("Dieser Song existiert bereits in der Zielliste!"); return; }
            targetData.blocklist.push({ type: 'single', title: songTitle, artist: songArtist || '', cf: DEFAULT_CROSSFADE });

            await setDoc(docRef, targetData);
        } catch (error) { console.error(error); }

    window.renderCurrentState = () => {

        const songsWithMetaDJ2 = extractAllSongsWithMetadata(dataDJ2.blocklist);
        const songsDJ1 = songsWithMetaDJ1.map(s => s.title);
        const songsDJ2 = songsWithMetaDJ2.map(s => s.title);
        const safeTracks = songsDJ1.filter(s => songsDJ2.some(s2 => s2.toLowerCase().trim() === s.toLowerCase().trim()));
        const onlyDJ1 = songsWithMetaDJ1.filter(s => !songsDJ2.some(s2 => s2.toLowerCase().trim() === s.title.toLowerCase().trim()));

        if (currentUser === 'diff') {

            if (onlyDJ1.length === 0 && onlyDJ2.length === 0) { bContainer.innerHTML = '<p style="text-align:center; opacity:0.5;">Keine Differenzen. Ihr habt exakt die gleichen Songs!</p>'; return; }

            const renderDiffCard = (songObj, owner) => {
                const icon = songObj.parentType === 'block' ? '📁' : '🎵';
                if (currentDiffFilter === 'blocks' && songObj.parentType !== 'block') return '';
                if (currentDiffFilter === 'singles' && songObj.parentType !== 'single') return '';
                return `<div class="song-card" style="border-left: 3px solid ${owner === 'dj1' ? 'var(--accent-color)' : 'var(--dj2-color)'};">

                            <div style="display:flex; align-items:center; gap:10px; margin-left:auto;"><span class="song-type-icon">${icon}</span>${!userStates['diff'].isLocked ? `<button class="diff-takeover-btn" onclick="window.executeQuickAdd('${songObj.title.replace(/'/g, "\\'")}', '${songObj.artist ? songObj.artist.replace(/'/g, "\\'") : ''}', '${owner}')">+</button>` : ''}</div>

            if (htmlDJ1 !== '') {

        const activeData = currentUser === 'dj1' ? dataDJ1 : dataDJ2;

        bContainer.innerHTML = ''; 

// Ein Set, um Dubletten während des Ladevorgangs zu verhindern

            // =================================================================
    // NEU: ZENTRALE EVENT-DELEGATION MIT OFFSET-POPUP & FIXES
    // =================================================================
    
    const bContainerForPopup = document.getElementById('blocklist-container');
    const popup = document.getElementById('crossfade-popup');
    const popupVal = document.getElementById('popup-val-display');
    const guide = document.getElementById('vertical-guide');
    const guideMarker = document.getElementById('guide-marker');
    
    let isDragging = false;
    let startY = 0;
    let currentCardForPopup = null;
    let guideLeftPos = 0; // Merken uns die X-Position der Leiste

    // Der feste Bereich in Pixeln für die Skala von 0s bis 16s
    const TOTAL_HEIGHT = 200; 

    bContainerForPopup.addEventListener('touchstart', function(e) {
        if (userStates[currentUser].editMode) return;
        
        const cfGroup = e.target.closest('.crossfade-btn-group');
        if (!cfGroup) return;
        
        const cardElement = cfGroup.closest('.song-card');
        const display = cardElement.querySelector('.crossfade-time-display');
        currentCardForPopup = cardElement;

        const touch = e.touches[0];
        
        longPressTimer = setTimeout(() => {
            isDragging = true;
            
            let currentVal = parseInt(display.innerText) || DEFAULT_CROSSFADE;
            
            // Scrollen der Seite für die Dauer des Slidens blockieren
            document.body.classList.add('lock-scroll');
            
            // Führungslinie links neben der Button-Gruppe positionieren
            const groupRect = cfGroup.getBoundingClientRect();
            guideLeftPos = groupRect.left - 20;
            
            guide.style.left = guideLeftPos + 'px'; 
            guide.style.top = (touch.clientY - (TOTAL_HEIGHT / 2)) + 'px';
            guide.style.height = TOTAL_HEIGHT + 'px';
            
            // Berechnen, wo der Marker anhand des aktuellen Wertes stehen muss
            const percent = 100 - (currentVal / 16 * 100);
            guideMarker.style.top = percent + '%';
            
            // Die Start-Y Position für die Wisch-Berechnung kalibrieren
            startY = touch.clientY + (percent - 50) * (TOTAL_HEIGHT / 100);
            
            guide.classList.add('active');
            
            // Popup FEST links neben der Leiste andocken (auf Höhe des Fingers)
            popup.style.left = guideLeftPos + 'px';
            popup.style.top = touch.clientY + 'px';
            popupVal.innerText = currentVal + 's';
            popup.classList.add('active');
            
            if (window.navigator.vibrate) window.navigator.vibrate(50);
        }, 600); 
    }, { passive: true });

    bContainerForPopup.addEventListener('touchmove', function(e) {
        if (!isDragging) {
            clearTimeout(longPressTimer);
            return;
        }
        
        const touch = e.touches[0];
        
        // Das Popup bleibt auf der X-Achse der Leiste, folgt auf der Y-Achse aber dem Finger
        popup.style.left = guideLeftPos + 'px';
        popup.style.top = touch.clientY + 'px';
        
        const diffY = startY - touch.clientY; 
        
        // Prozentuale Position auf der Leiste berechnen (0 bis 100)
        let percent = 50 - ((diffY / TOTAL_HEIGHT) * 100);
        if (percent < 0) percent = 0;
        if (percent > 100) percent = 100;
        
        guideMarker.style.top = percent + '%';
        
        // Wert anhand der Prozent-Position auf der Skala ermitteln
        let newVal = 16 - Math.round((percent / 100) * 16);
        
        if (newVal < 0) newVal = 0;
        if (newVal > 16) newVal = 16;
        
        popupVal.innerText = newVal + 's';
        
        if (currentCardForPopup) {
            const display = currentCardForPopup.querySelector('.crossfade-time-display');
            const toggleBtn = currentCardForPopup.querySelector('.crossfade-toggle-btn');
            if (display) display.innerText = newVal + 's';
            
            if (toggleBtn) {
                if (newVal === 0) {
                    toggleBtn.classList.add('disabled');
                } else {
                    toggleBtn.classList.remove('disabled');
                }
            }
        }
    }, { passive: true });

    bContainerForPopup.addEventListener('touchend', () => {
        clearTimeout(longPressTimer);
        if (isDragging) {
            isDragging = false;
            popup.classList.remove('active');
            guide.classList.remove('active');
            
            document.body.classList.remove('lock-scroll');
            
            window.saveData(); 
            currentCardForPopup = null;
        }
    });

    bContainerForPopup.addEventListener('touchcancel', () => {
        clearTimeout(longPressTimer);
        if (isDragging) {
            isDragging = false;
            popup.classList.remove('active');
            guide.classList.remove('active');
            
            document.body.classList.remove('lock-scroll');
            
            currentCardForPopup = null;
        }
    });
